# Modern independent-window ABFE env (replaces the Yank env in environment-fep.yml). CLEAN — drops EVERY Yank
# pin (py3.9 / openmmtools=0.21.2 / libnetcdf<4.9 / setuptools<81 / pymbar<4). Maintained stack only.
#
#   conda env create -n abfe -f environment-abfe.yml
#
# Used by:
#   - entry_abfe.py runtime `conda create` (same package list) when no pre-baked image is passed;
#   - Dockerfile.sagemaker-abfe to PRE-BAKE the env into an ECR image (skips the ~10-min solve per job).
# The .github/workflows/abfe-modern-smoke.yml free CPU smoke builds the SAME core (openmm/openmmtools/pymbar)
# every push, so a solve break is caught for free before any GPU spend.
name: abfe
channels:
  - conda-forge
dependencies:
  - python=3.11
  - openmm            # latest maintained; CUDA platform on the g5
  - cuda-version=12.6 # pin CUDA <= g5 driver (12.8) so OpenMM's CUDA build's PTX loads (mirror environment-rbfe.yml).
                      # Makes the require-CUDA default (OPENMM_REQUIRE_CUDA=1, trimcrae 2026-07-16) safe: the ABFE
                      # runtime now HARD-FAILS instead of silently using the ~1.3-2x-slower OpenCL fallback, so this
                      # pin must stay <= the driver (else fix it, or set OPENMM_REQUIRE_CUDA=0 for one run).
  - ocl-icd-system    # OpenCL vendor ICD — only used if OPENMM_REQUIRE_CUDA=0 explicitly allows the fallback
  - openmmtools       # AbsoluteAlchemicalFactory / AlchemicalState (alchemy)
  - pymbar>=4         # MBAR reducer (snake_case API)
  - openmmforcefields # SystemGenerator (amber14SB + gaff-2.11 via OpenFF) — same params as mmgbsa
  - openff-toolkit    # ligand Molecule from SDF
  - pdbfixer          # receptor prep (missing atoms/H)
  - mdtraj            # trajectory/geometry utilities
  - numpy
  - scipy
