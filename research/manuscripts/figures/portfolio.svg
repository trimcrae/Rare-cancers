<text x="452" y="142" font-size="10.5" fill="#444">EMC responder + fusion-TF mechanism</text>
<rect x="688" y="96" width="236" height="66" rx="7" fill="#e6f4ea" stroke="#2e7d32" stroke-width="1"/>
