<text x="202" y="142" font-size="10.5" fill="#444">ImmunoSarc: an EMC partial response</text>
<rect x="438" y="96" width="236" height="66" rx="7" fill="#e6f4ea" stroke="#2e7d32" stroke-width="1"/>
