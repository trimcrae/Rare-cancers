<text x="702" y="142" font-size="10.5" fill="#444">active across 2 patient-derived EMC models</text>
<text x="22" y="212" font-size="15" font-weight="700">Tier 2</text>
<text x="22" y="230" font-size="10.5" fill="#666"><tspan x="22" dy="0">Driver-directed, high ceil</tspan><tspan x="22" dy="13">ing</tspan></text>
