<svg xmlns="http://www.w3.org/2000/svg" width="766" height="443" viewBox="0 0 766 443" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<rect width="766" height="443" fill="#ffffff"/>
<text x="16" y="26" font-size="15.5" font-weight="700" fill="#202124">EMC candidates by EMC-specific evidence × novelty — not a score ranking</text>
<text x="16" y="45" font-size="11.5" fill="#5f6368">Rows: how strong the EMC evidence is (top = strongest). Columns: how novel the hypothesis is.</text>
<text x="16" y="60" font-size="11.5" fill="#1b7837">Green = novel + functional EMC evidence = the actionable leads. Amber = evidenced but already known.</text>
<text x="255" y="70" font-size="11.5" font-weight="700" fill="#202124" text-anchor="middle">Known (tried)</text>
<text x="453" y="70" font-size="11.5" font-weight="700" fill="#202124" text-anchor="middle">Partly novel</text>
<text x="651" y="70" font-size="11.5" font-weight="700" fill="#202124" text-anchor="middle">Novel (untried)</text>
<text x="148" y="99" font-size="11" font-weight="700" fill="#202124" text-anchor="end">Clinical (EMC patient)</text>
<rect x="156" y="78" width="192" height="30" rx="4" fill="#fff7e0" stroke="#e0e0e0" stroke-width="1"/>
<text x="165" y="95" font-size="9.7" fill="#202124">• Imatinib (KIT-mut)</text>
<rect x="354" y="78" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="552" y="78" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="648" y="99" font-size="10" font-style="italic" fill="#c5221f" text-anchor="middle">— none —</text>
<text x="148" y="135" font-size="11" font-weight="700" fill="#202124" text-anchor="end">Clinical (class)</text>
<rect x="156" y="114" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="354" y="114" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="363" y="131" font-size="9.7" fill="#202124">• VEGFR-TKIs (rego/cabo/lenva…)</text>
<rect x="552" y="114" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="648" y="135" font-size="10" font-style="italic" fill="#c5221f" text-anchor="middle">— none —</text>
<text x="148" y="171" font-size="11" font-weight="700" fill="#202124" text-anchor="end">In-vivo (animal EMC)</text>
<rect x="156" y="150" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="354" y="150" width="192" height="30" rx="4" fill="#e6f4ea" stroke="#e0e0e0" stroke-width="1"/>
<rect x="552" y="150" width="192" height="30" rx="4" fill="#e6f4ea" stroke="#e0e0e0" stroke-width="1"/>
<text x="561" y="167" font-size="9.7" fill="#202124">• Zaltoprofen (PPARγ)</text>
<text x="148" y="228" font-size="11" font-weight="700" fill="#202124" text-anchor="end">Ex-vivo (EMC models)</text>
<rect x="156" y="186" width="192" height="72" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="354" y="186" width="192" height="72" rx="4" fill="#e6f4ea" stroke="#e0e0e0" stroke-width="1"/>
<text x="363" y="203" font-size="9.7" fill="#202124">• Anthracycline + carfilzomib/venetoclax</text>
<rect x="552" y="186" width="192" height="72" rx="4" fill="#e6f4ea" stroke="#e0e0e0" stroke-width="1"/>
<text x="561" y="203" font-size="9.7" fill="#202124">• HDAC (romidepsin/panobinostat)</text>
<text x="561" y="218" font-size="9.7" fill="#202124">• Venetoclax</text>
<text x="561" y="233" font-size="9.7" fill="#202124">• Brigatinib</text>
<text x="561" y="248" font-size="9.7" fill="#202124">• Carfilzomib</text>
<text x="148" y="285" font-size="11" font-weight="700" fill="#202124" text-anchor="end">Genomic / IHC</text>
<rect x="156" y="264" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="354" y="264" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="552" y="264" width="192" height="30" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="561" y="281" font-size="9.7" fill="#202124">• CDK4/6 (palbociclib)</text>
<text x="148" y="349.5" font-size="11" font-weight="700" fill="#202124" text-anchor="end">Mechanistic only</text>
<rect x="156" y="300" width="192" height="87" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="354" y="300" width="192" height="87" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="552" y="300" width="192" height="87" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="561" y="317" font-size="9.7" fill="#202124">• Pioglitazone (PPARγ)</text>
<text x="561" y="332" font-size="9.7" fill="#202124">• NTRK (laro/entrectinib)</text>
<text x="561" y="347" font-size="9.7" fill="#202124">• NR4A3/NOR1 modulation</text>
<text x="561" y="362" font-size="9.7" fill="#202124">• BET / CDK7–9</text>
<text x="561" y="377" font-size="9.7" fill="#202124">• mRNA-vaccine + checkpoint</text>
<text x="16" y="427" font-size="10.5" fill="#c5221f">The “novel × clinical” cells are empty: no new drug has EMC clinical evidence — the field's core gap.</text>
</svg>
