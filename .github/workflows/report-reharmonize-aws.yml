name: Report NR4A3 pocket re-harmonize audit (AWS)

# Read-only: pulls s3://<default-bucket>/<output_prefix>/pocket-reharmonize-summary.json (the harmonized,
# score-independent orthosteric-pocket detection table written by the reharmonize job) and prints the
# consolidated both-denominator detection across every load-bearing NR4A3 ensemble, plus the pinned
# fpocket version + match params. This is GATE-1 of the ensemble-robust redesign (confirm the canonical
# site + a defensible conformer panel). Also dumps the raw summary JSON between sentinels so it can be
# committed into the repo. REQUIRES secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY. Commits nothing.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false
      output_prefix:
        description: "S3 prefix the reharmonize job wrote to"
        default: "nr4a3-pocket-reharmonize"
        required: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: Read + print reharmonize summary JSON
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY repo secrets first."
            exit 1
          fi
          python research/modalities/report_reharmonize.py
