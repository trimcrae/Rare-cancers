name: List in-progress SageMaker jobs (AWS, read-only)

# Read-only: show all in-progress spot training jobs and how many instances they consume, to reason about
# free slots against the account 'instances across all spot training jobs' (=10) quota. Starts nothing.
# REQUIRES secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (region is a workflow input).

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false
      s3_prefix:
        description: "optional: list this S3 prefix (under the default bucket) and return, instead of jobs"
        default: ""
        required: false
      mode:
        description: "'savings' = realized managed-spot discount (billable vs training time) for recent completed jobs; blank = in-progress jobs"
        default: ""
        required: false
      instance_filter:
        description: "savings mode only: restrict to instance types containing this string, e.g. ml.g5.xlarge"
        default: ""
        required: false
      ses_probe:
        description: "set '1' to also report SES sending state (quota/sandbox/verified identities); '2' to verify MAIL_TO"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: List SageMaker jobs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          S3_PREFIX: ${{ inputs.s3_prefix }}
          MODE: ${{ inputs.mode }}
          INSTANCE_FILTER: ${{ inputs.instance_filter }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY repo secrets first."
            exit 1
          fi
          python research/modalities/list_sagemaker.py
      - name: SES probe / verify (optional; for daily-email delivery setup)
        if: ${{ inputs.ses_probe == '1' || inputs.ses_probe == '2' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          MODE: ${{ inputs.ses_probe == '2' && 'verify' || 'probe' }}
          MAIL_TO: ${{ vars.MAIL_TO }}
        run: python research/modalities/daily_status_email.py
