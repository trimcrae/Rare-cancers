name: Fetch literature

# TEMPORARILY REPURPOSED on branch claude/add-skill-my44c1 to fetch the official
# OpenExO ExO 3.0 / building-an-exo Claude Skill from a runner (unrestricted
# internet; the dev sandbox egress proxy 403s openexo.com). This edit lives ONLY
# on the feature branch and is reverted after the download; main is untouched.
# Dispatch with ref=claude/add-skill-my44c1 so GitHub runs this branch's version.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "unused (repurposed for skill fetch)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: fetch-exo-skill
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Discover + download the official ExO 3.0 skill
        run: node scripts/fetch-exo-skill.mjs

      - name: Keep raw artifact (ephemeral)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exo-skill-${{ github.run_id }}
          path: out
          retention-days: 14
          if-no-files-found: warn

      - name: Commit the skill to this branch
        run: |
          set -e
          if [ ! -f out/building-an-exo.skill ]; then
            echo "No skill file downloaded (likely gated). Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          dest=".claude/skills/building-an-exo"
          mkdir -p "$dest"
          # Prefer the extracted tree (real SKILL.md etc.); always keep the raw .skill too.
          if [ -d out/extracted ] && [ -n "$(find out/extracted -name SKILL.md -print -quit)" ]; then
            # Copy the directory that actually contains SKILL.md (handles a wrapper folder).
            skdir=$(dirname "$(find out/extracted -name SKILL.md -print -quit)")
            cp -r "$skdir"/. "$dest"/
          else
            echo "WARNING: no SKILL.md found in archive; keeping raw file only."
          fi
          cp out/building-an-exo.skill "$dest/building-an-exo.skill"

          git add -A "$dest"
          git commit -m "Add official OpenExO ExO 3.0 (building-an-exo) Claude Skill

Downloaded from the OpenExO Resource Hub via a CI runner (sandbox egress proxy
blocks openexo.com). Raw .skill archive kept alongside the extracted SKILL.md." \
            || { echo "No changes to commit"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
