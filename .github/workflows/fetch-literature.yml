name: Fetch literature

# Pulls open-access research papers from the GitHub-hosted runner (which has
# full internet access - no sandbox egress allowlist needed) using the Europe
# PMC API via scripts/fetch-paper.mjs. The fetched corpus is published to the
# `literature-cache` branch, which Pages never serves (pages.yml only copies
# index.html, 404.html, assets/, data/, cancers/). A Claude session then does
# `git fetch origin literature-cache` and extracts cited data into data/cancers/.
#
# Raw full text is a working cache, not site content. Record each paper's
# licence when promoting facts into a cancer page; cite every clinical value.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Europe PMC search query"
        required: true
        default: '"extraskeletal myxoid chondrosarcoma" OR "extra-skeletal myxoid chondrosarcoma" OR "chordoid sarcoma" OR (NR4A3 AND chondrosarcoma)'
      slug:
        description: "Output folder under literature/ (defaults to a slug derived from the query)"
        required: false
        default: "extraskeletal-myxoid-chondrosarcoma"

permissions:
  contents: write

concurrency:
  group: fetch-literature
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # TEMPORARY (branch claude/add-skill-my44c1 only): fetch the official
      # OpenExO ExO 3.0 / building-an-exo Claude Skill. The dev sandbox egress
      # proxy 403s openexo.com; this runner has open internet. Reverted after.
      # The Resource Hub is a JS SPA, so render it with a real browser.
      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Discover + download the official ExO 3.0 skill (headless browser)
        run: node scripts/fetch-exo-skill-browser.mjs

      - name: Keep raw artifact (ephemeral)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exo-skill-${{ github.run_id }}
          path: out
          retention-days: 14
          if-no-files-found: warn

      - name: Commit the skill to this branch
        run: |
          set -e
          if [ ! -f out/building-an-exo.skill ]; then
            echo "No skill file downloaded (likely gated). Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          dest=".claude/skills/building-an-exo"
          mkdir -p "$dest"
          if [ -d out/extracted ] && [ -n "$(find out/extracted -name SKILL.md -print -quit)" ]; then
            skdir=$(dirname "$(find out/extracted -name SKILL.md -print -quit)")
            cp -r "$skdir"/. "$dest"/
          else
            echo "WARNING: no SKILL.md found in archive; keeping raw file only."
          fi
          cp out/building-an-exo.skill "$dest/building-an-exo.skill"
          git add -A "$dest"
          git commit -m "Add official OpenExO ExO 3.0 (building-an-exo) Claude Skill" \
            || { echo "No changes to commit"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
