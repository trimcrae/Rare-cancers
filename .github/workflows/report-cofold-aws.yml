name: Report EWSR1::NR4A3 fusion co-fold (AWS)

# Read-only: pulls s3://<default-bucket>/<output_prefix>/ (the Boltz-2 fusion apo co-fold output) and
# reports, per construct, whether the fused halves fold together into a composite junction interface
# (per-block pLDDT, inter-block PAE, ordered inter-block contacts, verdict). Commits nothing.
# REQUIRES secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false
      output_prefix:
        description: "S3 prefix the co-fold job wrote to"
        default: "fusion-cofold"
        required: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 gemmi numpy
      - name: Read + report fusion co-fold output
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY repo secrets first."
            exit 1
          fi
          python research/modalities/report_cofold.py
