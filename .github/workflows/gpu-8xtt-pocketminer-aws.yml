name: NR4A3 8XTT PocketMiner cross-check (AWS SageMaker)

# Re-runs the orthogonal cryptic-pocket GNN (PocketMiner; Meller et al., Nat Commun 2023; MIT) on the
# EXPERIMENTAL apo NR4A3 LBD (PDB 8XTT NMR ensemble) instead of the AF2 model — the 2026-07-10 review's
# explicit ask. Per conformer it maps scores UniProt<->8XTT and reports the Pocket-5-over-LBD enrichment as
# a DISTRIBUTION across the scored conformers. CPU work (ml.c5.2xlarge) — does NOT touch the GPU quota.
# Fetches 8XTT (RCSB) + AF-Q92570 (AFDB) at runtime; output uploaded CONTINUOUSLY. REQUIRES secrets:
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN (region is a workflow input).
# Output: s3://<default-bucket>/nr4a3-8xtt-pocketminer/nr4a3-8xtt-pocketminer.json
#
# NOTE: the PocketMiner env is TensorFlow-based and version-fragile — VALIDATE with one run before relying
# on the numbers (research/modalities/pocketminer-run-notes.md).

on:
  workflow_dispatch:
    inputs:
      instance:
        description: "SageMaker CPU instance type (ml.c5.2xlarge default; c5.xlarge also fine)"
        default: "ml.c5.2xlarge"
        required: false
      models:
        description: "8XTT conformers to score: '2,8,20,6' (>=0.53-druggable, default) or 'all' for all 20"
        default: "2,8,20,6"
        required: false
      tf_version:
        description: "TensorFlow version for the PocketMiner env (author-tested: 2.1.0 / 2.6.2 / 2.9.1)"
        default: "2.9.1"
        required: false
      region:
        description: "AWS region — must match where you deployed the stack + got quota"
        default: "us-east-2"
        required: false
      git_ref:
        description: "repo ref the job clones + runs (branch/tag/sha)"
        default: "main"
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3   # v2 SDK (v3 dropped FrameworkProcessor/PyTorch)
      - name: Submit 8XTT PocketMiner cross-check job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          INSTANCE: ${{ inputs.instance }}
          PM8_MODELS: ${{ inputs.models }}
          PM_TF_VERSION: ${{ inputs.tf_version }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first. See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_8xtt_pocketminer_sagemaker.py
