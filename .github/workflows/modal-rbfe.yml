name: Modal RBFE — step1 cmpd19 pilot (L4, Modal credits)

# RUNG 2 step1_pilot_cmpd19 on a Modal serverless GPU (burns Modal free credits instead of AWS). Runs the same
# OpenFE RBFE engine as the AWS/GCP lanes (nr4a3_rbfe.py) on the pilot edge zaienne_cmpd19 → cw_ev_5nh2.
#   mode=tiny  (default, and what PUSH runs) : FREE plumbing shakeout — env solve + S3 stage + LOMAP map +
#              hybrid-topology + a 2.5ps/10ps CUDA MD + analyze on the real complex edge. ~$0.05.
#   mode=real  : the paid ~$30 pilot — full 5ns sampling, ONE leg per dispatch (leg=complex|solvent),
#              spot-safe S3 checkpoint/resume + idempotent skip. Then mode=reduce → ΔΔG_bind.
#   mode=reduce: CPU — combine complex+solvent legs.
# Secrets: MODAL_TOKEN_ID, MODAL_TOKEN_SECRET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (S3 checkpoint store).
#
# NEW workflow → not API-dispatchable from a feature branch. The FREE tiny shakeout auto-runs on PUSH (paths =
# the app + this file). The paid mode=real needs workflow_dispatch (available once this file is on the default
# branch) — the real spend is the gate anyway.

on:
  workflow_dispatch:
    inputs:
      mode:      { description: "tiny | real | reduce | tail | stop | bench (ns/$ across GPUs)", default: "tiny", required: true }
      leg:       { description: "complex | solvent (mode=real)", default: "complex", required: false }
      n_windows: { description: "λ-windows over the A→B morph", default: "12", required: false }
      gpu:       { description: "Modal GPU: L4 | A10G | A100 | A100-80GB | L40S | H100", default: "L4", required: false }
      git_ref:   { description: "repo ref the Modal job clones + runs", default: "claude/rung-2-parallel-7asnpk", required: false }
  push:
    branches: [claude/rung-2-parallel-7asnpk]
    paths:
      # NOT the .yml itself (avoid re-running the shakeout on workflow edits) — only the Modal app.
      - research/modalities/nr4a3_rbfe_modal.py

permissions:
  contents: read

concurrency:
  # Include the leg so complex + solvent (both mode=real) run CONCURRENTLY on Modal's serverless GPUs instead
  # of the solvent GH job serializing behind the still-streaming complex one — the two legs are independent
  # (they only combine at reduce), so parallelizing halves step1 wall-clock and burns the fixed Modal credit
  # sooner. Distinct legs => distinct groups; same leg still can't double-run (idempotent S3 skip guards anyway).
  group: modal-rbfe-${{ github.event.inputs.mode || 'tiny' }}-${{ github.event.inputs.leg || 'na' }}
  cancel-in-progress: false

jobs:
  modal-rbfe:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install -q modal boto3
      - name: Run Modal RBFE (${{ github.event.inputs.mode || 'tiny (push)' }})
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          GIT_REF: ${{ github.event.inputs.git_ref || github.ref_name }}
          MODE: ${{ github.event.inputs.mode || 'tiny' }}
          LEG: ${{ github.event.inputs.leg || 'complex' }}
          NW: ${{ github.event.inputs.n_windows || '12' }}
          MODAL_GPU: ${{ github.event.inputs.gpu || 'L4' }}
        run: |
          # mode=bench: GPU ns/$ benchmark (Modal-only; no AWS/S3). MODAL_GPU carries the comma-separated list.
          if [ "$MODE" = "bench" ]; then
            if [ -z "$MODAL_TOKEN_ID" ]; then echo "::error::MODAL_TOKEN_ID/SECRET missing."; exit 1; fi
            modal run research/modalities/modal_gpu_bench.py --gpus "$MODAL_GPU"
            exit 0
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::AWS creds missing — the RBFE checkpoint store is on S3."; exit 1
          fi
          # mode=tail: read-only S3 checkpoint census (live progress of the running Modal leg) — no Modal, no GPU.
          if [ "$MODE" = "tail" ]; then
            python research/modalities/rbfe_s3_census.py
            exit 0
          fi
          if [ -z "$MODAL_TOKEN_ID" ]; then
            echo "::error::MODAL_TOKEN_ID/SECRET missing — add them in repo Settings → Secrets → Actions."; exit 1
          fi
          if [ "$MODE" = "list" ]; then
            # LIST-ONLY (no stop): shows currently-running Modal apps so we can tell whether a leg's function is
            # still executing (billing) or has stopped. Answers "were we paying for idle GPU?" without killing
            # anything. Each `modal run` invocation is an ephemeral app (ap-...); a stopped/crashed function
            # disappears from this list (Modal bills per-second of EXECUTION, so a vanished app = not billing).
            echo "--- currently RUNNING Modal apps (nr4a3-rbfe = our step1 leg functions) ---"
            modal app list 2>&1 || true
            exit 0
          fi
          if [ "$MODE" = "stop" ]; then
            # Ephemeral `modal run` apps are addressed by App ID (ap-...), NOT by name — parse the list + stop each
            # nr4a3-rbfe app by ID so no stale invocation keeps writing the S3 checkpoint prefix.
            echo "--- running Modal apps ---"; modal app list 2>&1 | tee /tmp/apps.txt || true
            IDS=$(grep -i "nr4a3-rbfe" /tmp/apps.txt | grep -oE 'ap-[A-Za-z0-9]+' | sort -u)
            [ -z "$IDS" ] && { echo "no running nr4a3-rbfe apps"; exit 0; }
            for A in $IDS; do echo "stopping $A"; modal app stop "$A" -y 2>&1 | tail -3 || echo "  stop $A no-op"; done
            sleep 5; echo "--- after stop ---"; modal app list 2>&1 | grep -i nr4a3-rbfe || echo "  (none running)"
            exit 0
          fi
          [ "$MODE" = "real" ] && echo "::warning::mode=real launches the PAID ~\$30 pilot leg on Modal credits (GPU=${MODAL_GPU})."
          modal run research/modalities/nr4a3_rbfe_modal.py --mode "$MODE" --leg "$LEG" --n-windows "$NW"
