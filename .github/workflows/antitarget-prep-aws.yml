name: Anti-target panel PREP (fetch RCSB receptors -> S3)

# Survivor-independent: fetch each off-target/anti-target receptor from RCSB, isolate the ligand-bearing
# chain, define the docking box centre, and upload clean receptor PDBs + a manifest to S3 for the panel dock.
# Plain GitHub runner (boto3 only; RCSB fetch needs the runner's internet). REQUIRES secrets:
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      output_prefix:
        description: "S3 prefix for the prepared panel receptors + manifest"
        default: "nr4a3-antitarget-panel"
        required: false
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false

permissions:
  contents: read

jobs:
  prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: Prepare panel receptors
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY repo secrets first."
            exit 1
          fi
          python research/modalities/antitarget_prep.py
