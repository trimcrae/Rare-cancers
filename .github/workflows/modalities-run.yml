name: Modalities — structure & neoantigen

# Runs the EWSR1::NR4A3 target-assessment compute that the dev sandbox can't:
#   - nr4a3_structure.py : AlphaFold (AFDB) pLDDT + fpocket druggability of NR4A3
#   - fusion_neoantigen.py: UniProt sequences + MHCflurry junction-neoantigen prediction
# CI has internet (sandbox egress is git-hosts only). Results JSON are pushed to the
# `modalities-cache` branch; snapshot them onto the feature branch from there:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/

on:
  workflow_dispatch:
  # push-triggered workflows run from the pushed branch (no default-branch dependency),
  # so this fires on the feature branch without putting the file on main. Scoped to the
  # modalities paths so unrelated pushes don't re-run the heavy MHCflurry install.
  push:
    branches: [claude/rare-cancer-info-hub-vb8uui]
    paths:
      - research/modalities/**
      - .github/workflows/modalities-run.yml

permissions:
  contents: write

concurrency:
  group: modalities-run
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fpocket (conda-forge via micromamba)
        run: |
          set -e
          cd "$RUNNER_TEMP"
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
          ./bin/micromamba create -y -p "$RUNNER_TEMP/menv" -c conda-forge fpocket
          echo "$RUNNER_TEMP/menv/bin" >> "$GITHUB_PATH"

      - name: Install MHCflurry
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install "mhcflurry==2.1.4" "tensorflow-cpu<2.16" pandas matplotlib biopython ViennaRNA
          mhcflurry-downloads fetch models_class1_presentation

      - name: Structure / druggability (NR4A3, EWSR1)
        continue-on-error: true
        run: |
          which fpocket && fpocket -h >/dev/null 2>&1 || echo "fpocket check"
          python research/modalities/nr4a3_structure.py

      - name: NR4A1/2/3 selectivity scaffold (degrader warhead design prep)
        continue-on-error: true
        run: python research/modalities/nr4a_selectivity.py

      - name: Fusion-junction neoantigen prediction
        continue-on-error: true
        run: python research/modalities/fusion_neoantigen.py

      - name: Fusion-junction ASO design
        continue-on-error: true
        run: python research/modalities/junction_aso.py

      - name: Fusion-junction ASO in-silico evaluation (off-target + accessibility)
        continue-on-error: true
        run: python research/modalities/aso_insilico.py

      - name: Breakpoint-resolved junction neoantigens (Ensembl exon structure)
        continue-on-error: true
        run: python research/modalities/fusion_breakpoints.py

      - name: HLA population coverage of the junction neoepitopes (AFND)
        continue-on-error: true
        run: python research/modalities/hla_coverage.py

      - name: Coverage vs. number-of-alleles curve + chart (broad HLA panel)
        continue-on-error: true
        run: python research/modalities/coverage_scan.py

      - name: Candidate vaccine construct (minimal SLP + string-of-beads)
        continue-on-error: true
        run: python research/modalities/vaccine_construct.py

      - name: Per-patient neoepitope shortlister — worked demo (e7::e3 + common HLA)
        continue-on-error: true
        run: |
          python research/modalities/patient_neoepitopes.py \
            --partner EWSR1 --partner-exon 7 --nr4a3-exon 3 \
            --hla "A*02:01,A*11:01,B*07:02,B*08:01" \
            --out research/modalities/patient-neoepitopes-demo.json

      - name: TAF15::NR4A3 variant demo (find an in-frame TAF15 exon)
        continue-on-error: true
        run: |
          for e in 4 5 6 7 8 9 10 11 12; do
            if python research/modalities/patient_neoepitopes.py \
                 --partner TAF15 --partner-exon "$e" --nr4a3-exon 3 \
                 --hla "A*02:01,A*11:01,B*07:02,B*08:01" \
                 --out research/modalities/patient-neoepitopes-taf15-demo.json; then
              echo "TAF15 exon $e :: NR4A3 e3 is in-frame — demo written"; break
            fi
          done

      - name: CD4 / class-II helper-epitope demo (py3.10 env, MHCnuggets)
        continue-on-error: true
        run: |
          # MHCnuggets uses the old Keras optimizer 'lr=' arg, removed in Keras>=2.11
          # (which py3.11 forces). Pin Python 3.10 + TensorFlow 2.10 via micromamba.
          "$RUNNER_TEMP/bin/micromamba" create -y -p /tmp/cd4 -c conda-forge "python=3.10"
          /tmp/cd4/bin/pip install -q "tensorflow-cpu==2.10" "numpy<1.24" "protobuf<3.20" mhcnuggets || echo "cd4 install issue"
          /tmp/cd4/bin/python research/modalities/patient_cd4_epitopes.py \
            --partner EWSR1 --partner-exon 7 --nr4a3-exon 3 \
            --hla2 "DRB1*15:01,DRB1*03:01,DRB1*07:01" \
            --out research/modalities/patient-cd4-demo.json || true

      - name: Publish results to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/nr4a3-structure-assessment.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/nr4a-selectivity.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/fusion-neoantigen-predictions.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-aso-designs.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/aso-insilico-evaluation.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/fusion-breakpoint-neoantigens.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/hla-coverage.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/epitope-allele-matrix.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/coverage-curve.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/coverage-curve.png "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/vaccine-construct.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/patient-neoepitopes-demo.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/patient-neoepitopes-taf15-demo.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/patient-cd4-demo.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          cp "$RUNNER_TEMP"/res/*.png research/modalities/ 2>/dev/null || true
          git add research/modalities/*.json
          git add research/modalities/*.png 2>/dev/null || true
          git commit -m "Modalities compute: NR4A3 structure + fusion neoantigen results" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
