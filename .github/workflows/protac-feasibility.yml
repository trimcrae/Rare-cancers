name: PROTAC assembly feasibility (RDKit, CPU)

# Next CPU step of in-silico degrader molecule design: maps each top warhead scaffold's exit-vector
# handles and predicts the assembled PROTAC property envelope per E3-ligand x linker (warheads + E3
# ligands fetched live from ChEMBL; additive estimate, not a bonded SMILES). Needs internet + RDKit ->
# GitHub-hosted runner. No GPU/AWS. Result -> modalities-cache branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/protac-feasibility.json

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: protac-feasibility
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RDKit
        run: |
          python -m pip install --upgrade pip
          pip install rdkit

      - name: PROTAC assembly feasibility (exit vectors + property envelope)
        working-directory: research/modalities
        run: python protac_feasibility.py

      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/protac-feasibility.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/protac-feasibility.json 2>/dev/null || true
          git commit -m "PROTAC assembly feasibility (RDKit)" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
