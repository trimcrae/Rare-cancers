name: Ternary calib pair freeze (RCSB + RDKit, CPU, free)

# valB_mini prerequisite: fetch the bound-PROTAC chemistry for the SMARCA2–VHL hi/lo calibration anchors
# (P1/9HYN, P5/9HYP) from RCSB, RDKit-validate, and MCS-map them to decide whether P1→P5 is a mappable
# congeneric RBFE edge (or fall back per ternary-calib-pair-draft.md). Free CPU; the dev sandbox can't reach
# RCSB (egress proxy), so it runs on a GitHub runner. Prints the full freeze JSON to the log AND publishes it
# to the modalities-cache branch for durable provenance. No structure is fabricated.
#
# NEW workflow → not API-dispatchable from a feature branch (404), so it runs on PUSH to the branch. The paths
# filter is the workflow + the freeze script only, so the committed output never re-triggers it.

on:
  workflow_dispatch:
    inputs:
      run_search:
        description: "also run the (slow) RCSB congeneric search + alpha fetch"
        default: "false"
        required: false
  push:
    branches: [claude/rung-2-parallel-7asnpk]
    paths:
      - .github/workflows/ternary-calib-freeze.yml
      - research/modalities/ternary_calib_freeze.py
      - research/modalities/ternary_calib_search.py
      - research/modalities/ternary_calib_alpha_fetch.py
      - research/modalities/ternary_calib_epimer_freeze.py
      - research/modalities/wurz_calib_freeze.py

permissions:
  contents: write

concurrency:
  group: ternary-calib-freeze
  cancel-in-progress: true

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install RDKit
        run: |
          python -m pip install --upgrade pip
          pip install rdkit
      - name: Fetch + validate + MCS-map the calib hi/lo pair
        working-directory: research/modalities
        run: python ternary_calib_freeze.py
      - name: Freeze the reviewer-approved epimer edge (PROTAC 2 -> cis-PROTAC 2, 6HAX)
        if: always()
        working-directory: research/modalities
        run: python ternary_calib_epimer_freeze.py
      - name: Freeze the reviewer-approved Wurz cmpd1->cmpd4 edge (8G1Q; diagnostic + freeze)
        if: always()
        working-directory: research/modalities
        env:
          WURZ_LINKER_N_IDX: ${{ vars.WURZ_LINKER_N_IDX }}   # unset on first pass => diagnostic-only enumeration
        run: python wurz_calib_freeze.py || true             # exit 2 (INCOMPLETE, linker not yet chosen) is expected first pass
      - name: Search RCSB for a congeneric VHL-PROTAC cooperativity pair (slow; opt-in)
        if: ${{ github.event.inputs.run_search == 'true' }}
        working-directory: research/modalities
        run: python ternary_calib_search.py
      - name: Fetch cooperativity evidence (slow; opt-in)
        if: ${{ github.event.inputs.run_search == 'true' }}
        working-directory: research/modalities
        run: python ternary_calib_alpha_fetch.py
      - name: Publish frozen pair to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/ternary-calib-pair-frozen.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/ternary-calib-congeneric-search.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/ternary-calib-alpha-evidence.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/ternary-calib-epimer-frozen.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/wurz-calib-frozen.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/wurz-calib-diagnostic.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          ls "$RUNNER_TEMP/res/" | grep -q json || { echo "no json produced"; exit 0; }
          git fetch origin modalities-cache || true
          git reset --hard
          git clean -fd research/modalities/   # drop untracked outputs so the cache-branch checkout doesn't abort
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/ternary-calib-pair-frozen.json research/modalities/ternary-calib-congeneric-search.json research/modalities/ternary-calib-alpha-evidence.json research/modalities/ternary-calib-epimer-frozen.json research/modalities/wurz-calib-frozen.json research/modalities/wurz-calib-diagnostic.json 2>/dev/null || true
          git commit -m "Ternary calib: freeze panel_sweep + congeneric VHL-PROTAC search (RCSB+RDKit) [skip ci]" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
