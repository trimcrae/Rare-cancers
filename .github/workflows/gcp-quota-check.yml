name: GCP quota check (L4 / G2, us-central1)

# Read-only: prints the project's L4-GPU + G2-CPU quotas (limit vs usage) for us-central1 so we know exactly what
# on-demand vs spot capacity we're allowed, and whether billing is enabled. Touches nothing.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  quota:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878095411563/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gpu-runner@project-a7ebde30-e2ed-4b8d-9a9.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Print L4/G2 quotas + billing
        run: |
          set +e
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          gcloud config set project "$PROJECT" 2>/dev/null
          echo "=== project (name | id) ==="
          gcloud projects describe "$PROJECT" --format="value(name,projectId)" 2>/dev/null || echo "(no projects.get perm)"
          echo "=== billing (enabled | account) ==="
          gcloud beta billing projects describe "$PROJECT" --format="value(billingEnabled,billingAccountName)" 2>/dev/null || echo "(no billing perm — check console)"
          echo "=== full us-central1 GPU/G2 quota rows (metric limit usage) ==="
          gcloud compute regions describe us-central1 --flatten="quotas[]" \
            --format="value(quotas.metric, quotas.limit, quotas.usage)" 2>/tmp/qerr \
            | grep -iE "L4|G2|GPU" | sort || { echo "describe failed:"; cat /tmp/qerr; }
          echo "=== [QUOTA-SUMMARY] (the ones that matter for on-demand L4) ==="
          Q=$(gcloud compute regions describe us-central1 --flatten="quotas[]" \
                --format="value(quotas.metric, quotas.limit, quotas.usage)" 2>/dev/null)
          for M in NVIDIA_L4_GPUS PREEMPTIBLE_NVIDIA_L4_GPUS G2_CPUS PREEMPTIBLE_G2_CPUS; do
            LINE=$(printf '%s\n' "$Q" | awk -v m="$M" '$1==m {print "limit="$2" usage="$3}')
            echo "  ${M}: ${LINE:-NOT PRESENT}"
          done
