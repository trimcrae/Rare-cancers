name: FEP training-job status (diagnostic)

# Read-only: describe the most recent FEP training jobs (status + secondary status + failure reason) so we
# can see whether shards are running, completed, or failed — and WHY. REQUIRES secrets: AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "TrainingJob NameContains filter"
        default: "nr4a3-fep"
        required: false
      n:
        description: "how many recent jobs to describe"
        default: "10"
        required: false
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: Describe recent FEP training jobs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          TAG: ${{ inputs.tag }}
          N: ${{ inputs.n }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then echo "::error::add AWS secrets"; exit 1; fi
          python - <<'PY'
          import os, boto3
          tag = os.environ.get("TAG", "nr4a3-fep"); n = int(os.environ.get("N", "10"))
          sm = boto3.client("sagemaker")
          jobs = sm.list_training_jobs(NameContains=tag, SortBy="CreationTime",
                                       SortOrder="Descending", MaxResults=n).get("TrainingJobSummaries", [])
          print(f"recent '{tag}' training jobs: {len(jobs)}")
          for j in jobs:
              d = sm.describe_training_job(TrainingJobName=j["TrainingJobName"])
              print("=" * 80)
              print(f"{j['TrainingJobName']}")
              print(f"  status={d['TrainingJobStatus']} secondary={d.get('SecondaryStatus')}")
              print(f"  created={d.get('CreationTime')} ended={d.get('TrainingEndTime')}")
              if d.get("FailureReason"):
                  print(f"  FAILURE: {d['FailureReason']}")
              tr = d.get("SecondaryStatusTransitions", [])
              for t in tr[-4:]:
                  print(f"    [{t.get('Status')}] {t.get('StatusMessage','')}")
          PY
