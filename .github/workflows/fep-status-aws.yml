name: FEP training-job status (diagnostic)

# Read-only: describe the most recent FEP training jobs (status + secondary status + failure reason) so we
# can see whether shards are running, completed, or failed — and WHY. REQUIRES secrets: AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "TrainingJob NameContains filter"
        default: "nr4a3-fep"
        required: false
      n:
        description: "how many recent jobs to describe"
        default: "10"
        required: false
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false
      ckpt_prefix:
        description: "if set, list+cat the setup LEaP/frcmod/*.in logs under this checkpoint S3 prefix (e.g. nr4a3-fep/ckpt/0)"
        default: ""
        required: false
      pdb_resrange:
        description: "optional 'first-last' residue range to restrict the PDB-geom extent (e.g. 373-626 for the NR4A3 LBD)"
        default: ""
        required: false
      stop_names:
        description: "comma-sep EXACT training-job names to StopTrainingJob (free a parked spot prefix before an on-demand relaunch)"
        default: ""
        required: false
      cw_job:
        description: "tail LIVE CloudWatch of this running job (name/prefix), filtered to yank progress (iteration/ns-day/ΔG)"
        default: ""
        required: false
      clear_prefix:
        description: "DELETE all S3 objects under this checkpoint prefix (e.g. nr4a3-fep-trim/ckpt/1/nr4a1/experiments to wipe a corrupt yank sampling state, preserving setup) before a clean relaunch"
        default: ""
        required: false
      analyze_receptor:
        description: "if set (e.g. nr4a3), build the fep env + run MBAR on the LIVE S3 checkpoint → emit one ANALYZE_POINT {iter,dg,se} convergence sample"
        default: ""
        required: false
      analyze_shard:
        description: "shard index for analyze_receptor (nr4a3=0, nr4a1=1, nr4a2=2)"
        default: "0"
        required: false

permissions:
  contents: read

jobs:
  analyze:
    if: ${{ inputs.analyze_receptor != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install miniforge
        run: |
          curl -L -o /tmp/mf.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
          bash /tmp/mf.sh -b -p "$HOME/mf"
          echo "$HOME/mf/bin" >> "$GITHUB_PATH"
      - name: Build fep env from frozen lock
        run: conda create -y -n fep --file research/modalities/sagemaker_src/fep.lock
      - name: MBAR on live checkpoint → ANALYZE_POINT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          TAG: ${{ inputs.tag }}
          SHARD: ${{ inputs.analyze_shard }}
          RCP: ${{ inputs.analyze_receptor }}
        run: |
          set -e
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then echo "::error::add AWS secrets"; exit 1; fi
          conda run -n fep pip install --quiet "awscli<2" boto3 || true
          ACCT=$(conda run -n fep python -c "import boto3;print(boto3.client('sts').get_caller_identity()['Account'])" | tail -1)
          BUCKET="sagemaker-${AWS_DEFAULT_REGION}-${ACCT}"
          SRC="s3://${BUCKET}/${TAG}/ckpt/${SHARD}/${RCP}/experiments"
          echo "sync from $SRC"
          mkdir -p /tmp/exp
          conda run -n fep aws s3 sync "$SRC" /tmp/exp --only-show-errors || echo "(sync partial)"
          echo "=== S3 .nc freshness (mtime tells us how far the checkpoint sync has advanced) ==="
          ls -la --time-style=full-iso /tmp/exp || true
          # Write the analyzer to a FILE — `conda run python - <<EOF` does NOT forward the heredoc to stdin
          # (python reads empty input, silent no-op, exits 0 = false pass). Same bug hit + fixed in yank-env-check.
          cat > /tmp/analyze_fep.py <<'PY'
          import subprocess, re, json, glob, os
          d = "/tmp/exp"
          niter = -1
          try:
              import netCDF4
              for f in sorted(glob.glob(os.path.join(d, "*.nc"))):
                  if f.endswith("_checkpoint.nc"):
                      continue
                  ds = netCDF4.Dataset(f, "r")
                  if "iteration" in ds.dimensions:
                      niter = max(niter, len(ds.dimensions["iteration"]) - 1)  # dim includes iteration 0
                  ds.close()
          except Exception as e:
              print("iter-read warn:", e)
          r = subprocess.run(["yank", "analyze", "--store", d], capture_output=True, text=True)
          txt = (r.stdout or "") + "\n" + (r.stderr or "")
          m = re.search(r"free energy of binding[:\s]+(-?\d+\.?\d*)\s*(?:\+/-|\+-|±)\s*(\d+\.?\d*)\s*kcal", txt, re.I)
          if m:
              print("ANALYZE_POINT " + json.dumps({"iter": niter, "dg": float(m.group(1)), "se": float(m.group(2))}))
          else:
              print("ANALYZE_FAIL niter=%d (no ΔG line — too few iterations synced, or analyze error)" % niter)
              print(txt[-1500:])
          PY
          conda run --no-capture-output -n fep python /tmp/analyze_fep.py

  status:
    if: ${{ inputs.analyze_receptor == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: Describe recent FEP training jobs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          TAG: ${{ inputs.tag }}
          N: ${{ inputs.n }}
          CKPT_PREFIX: ${{ inputs.ckpt_prefix }}
          PDB_RESRANGE: ${{ inputs.pdb_resrange }}
          STOP_NAMES: ${{ inputs.stop_names }}
          CW_JOB: ${{ inputs.cw_job }}
          CLEAR_PREFIX: ${{ inputs.clear_prefix }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then echo "::error::add AWS secrets"; exit 1; fi
          python - <<'PY'
          import os, boto3
          tag = os.environ.get("TAG", "nr4a3-fep"); n = int(os.environ.get("N", "10"))
          sm = boto3.client("sagemaker")
          logs = boto3.client("logs")
          # Optional: StopTrainingJob on exact job names (comma-sep). Used to free a parked spot job's
          # checkpoint prefix before relaunching it on-demand on the SAME prefix (avoids a duplicate-writer
          # collision if spot capacity later returns). Only acts on InProgress jobs; already-terminal are skipped.
          _stop = [s.strip() for s in os.environ.get("STOP_NAMES", "").split(",") if s.strip()]
          for _name in _stop:
              try:
                  _st = sm.describe_training_job(TrainingJobName=_name)["TrainingJobStatus"]
                  if _st == "InProgress":
                      sm.stop_training_job(TrainingJobName=_name)
                      print(f"# STOP requested for {_name} (was InProgress)")
                  else:
                      print(f"# skip stop {_name}: status={_st} (not InProgress)")
              except Exception as _e:  # noqa: BLE001
                  print(f"# stop {_name} failed: {_e}")
          # Optional: tail the LIVE CloudWatch stdout of a RUNNING job (CW_JOB = exact/prefix name) filtered to
          # yank progress lines — iteration count (→ %/ETA), ns/day rate, and any online ΔG estimate (→ converge
          # /diverge read). The failed-job dump lower down only fires on Failed; this works on InProgress.
          _cw = os.environ.get("CW_JOB", "").strip()
          if _cw:
              import re as _re
              grp = "/aws/sagemaker/TrainingJobs"
              try:
                  strs = logs.describe_log_streams(logGroupName=grp, logStreamNamePrefix=_cw).get("logStreams", [])
                  sig = _re.compile(r"(iteration|replica|online|estimate|kcal|kT|Delta|ΔG|f_k|free energy|"
                                    r"ns/day|mixing|state|swap|MBAR|Trailblaz|Equilibrat|Minimiz|Production|"
                                    r"reached|converg)", _re.I)
                  for s in strs[:1]:
                      ev = logs.get_log_events(logGroupName=grp, logStreamName=s["logStreamName"],
                                               startFromHead=False, limit=1500).get("events", [])
                      m = [e["message"].rstrip() for e in ev if sig.search(e["message"])]
                      print(f"# CW LIVE tail for {_cw} ({s['logStreamName']}): {len(m)}/{len(ev)} progress lines")
                      for x in m[-60:]:
                          print("  " + x)
              except Exception as _e:  # noqa: BLE001
                  print(f"# CW tail {_cw} failed: {_e}")
          # Optional: DELETE every S3 object under CLEAR_PREFIX (wipe a corrupt yank sampling state so a relaunch
          # rebuilds trailblaze fresh; point it at .../experiments to preserve the setup/ tree). Guard: refuse a
          # too-short prefix so a typo can't nuke the bucket.
          _clr = os.environ.get("CLEAR_PREFIX", "").strip().lstrip("/")
          if _clr:
              s3d = boto3.client("s3"); std = boto3.client("sts")
              reg = os.environ.get("AWS_DEFAULT_REGION", "us-east-2")
              bkt = f"sagemaker-{reg}-{std.get_caller_identity()['Account']}"
              if _clr.count("/") < 2:
                  print(f"# REFUSE clear '{_clr}': too broad (need >=2 '/' segments)")
              else:
                  pg = s3d.get_paginator("list_objects_v2"); dels, n = [], 0
                  for page in pg.paginate(Bucket=bkt, Prefix=_clr):
                      for o in page.get("Contents", []):
                          dels.append({"Key": o["Key"]}); n += 1
                          if len(dels) == 1000:
                              s3d.delete_objects(Bucket=bkt, Delete={"Objects": dels}); dels = []
                  if dels:
                      s3d.delete_objects(Bucket=bkt, Delete={"Objects": dels})
                  print(f"# CLEARED {n} objects under s3://{bkt}/{_clr}")
          # Optional: pull the small setup logs (LEaP transcripts, frcmod, leap.in) straight from the
          # checkpoint S3 prefix — the definitive per-leg diagnostic (complex leg fails via check_output, whose
          # stdout yank swallows, so the CloudWatch tail can't show it; the on-disk log DID sync to S3).
          _rr = os.environ.get("PDB_RESRANGE", "").strip()
          RES_LO, RES_HI = (None, None)
          if "-" in _rr:
              try:
                  RES_LO, RES_HI = (int(x) for x in _rr.split("-", 1))
              except ValueError:
                  pass
          ckpt = os.environ.get("CKPT_PREFIX", "").strip()
          if ckpt:
              s3 = boto3.client("s3"); sts = boto3.client("sts")
              region = os.environ.get("AWS_DEFAULT_REGION", "us-east-2")
              bucket = f"sagemaker-{region}-{sts.get_caller_identity()['Account']}"
              print(f"# S3 setup-log inspect: s3://{bucket}/{ckpt}/")
              paginator = s3.get_paginator("list_objects_v2")
              all_objs = []
              for pg in paginator.paginate(Bucket=bucket, Prefix=ckpt):
                  all_objs.extend((o["Key"], o["Size"]) for o in pg.get("Contents", []))
              print(f"# MANIFEST ({len(all_objs)} objects under prefix):")
              for k, sz in sorted(all_objs):
                  print(f"#   {sz:>10}  {k}")
              # cat the TAIL of every log/in/frcmod (LEaP errors cluster at the end); skip the successful
              # solvent leg to focus on the complex-leg failure.
              # per-receptor RESULT jsons (the ΔG_bind payload) + the usual setup/diagnostic files.
              wanted = (".log", "leap.in", ".in", ".frcmod", "fes.dat", "manifest.json", "_rg_rep",
                        ".progress.json", "nr4a1.json", "nr4a2.json", "nr4a3.json")
              cat = [(k, sz) for k, sz in sorted(all_objs)
                     if any(k.endswith(w) for w in wanted) and "solvent.leap.log" not in k and sz < 5_000_000]
              for k, sz in cat:
                  body = s3.get_object(Bucket=bucket, Key=k)["Body"].read().decode("utf-8", "replace")
                  show = body if len(body) < 5000 else ("...<head-snip>...\n" + body[-4500:])
                  print(f"\n===== S3 {k} ({sz} bytes, tail) =====\n{show}")
              # PDB geometry stats (spot a wrapped/stray atom that balloons the solvation box): for each .pdb,
              # count ATOM records + protein residues and report the per-axis coordinate extent (Å).
              for k, sz in sorted(all_objs):
                  if not k.endswith(".pdb") or sz > 20_000_000:
                      continue
                  body = s3.get_object(Bucket=bucket, Key=k)["Body"].read().decode("utf-8", "replace")
                  xs, ys, zs, resset, natom = [], [], [], set(), 0
                  for ln in body.splitlines():
                      if ln.startswith(("ATOM", "HETATM")):
                          if RES_LO is not None:
                              try:
                                  rn = int(ln[22:26])
                              except ValueError:
                                  continue
                              if rn < RES_LO or rn > RES_HI:
                                  continue
                          try:
                              xs.append(float(ln[30:38])); ys.append(float(ln[38:46])); zs.append(float(ln[46:54]))
                          except ValueError:
                              continue
                          natom += 1
                          resset.add((ln[21:22], ln[22:27]))
                  if xs:
                      ext = [round(max(a) - min(a), 1) for a in (xs, ys, zs)]
                      print(f"\n----- PDB GEOM {k}: {natom} atoms, {len(resset)} residues, "
                            f"extent(Å) x={ext[0]} y={ext[1]} z={ext[2]} "
                            f"(bbox {round(min(xs),1)}..{round(max(xs),1)}, {round(min(ys),1)}..{round(max(ys),1)}, "
                            f"{round(min(zs),1)}..{round(max(zs),1)})")
                      # WRAPPING TEST: sequential CA-CA distances. A PBC-wrapped chain shows ONE huge jump
                      # (~box length); a genuinely extended fold keeps every CA-CA ~3.8 Å. Decides re-image vs
                      # re-extract for the FEP box blow-up.
                      cas = []
                      for ln in body.splitlines():
                          if ln.startswith("ATOM") and ln[12:16].strip() == "CA":
                              try:
                                  cas.append((float(ln[30:38]), float(ln[38:46]), float(ln[46:54])))
                              except ValueError:
                                  pass
                      jumps = []
                      for a, b in zip(cas, cas[1:]):
                          d = sum((a[i] - b[i]) ** 2 for i in range(3)) ** 0.5
                          jumps.append(d)
                      if jumps:
                          bigs = sorted(((d, i) for i, d in enumerate(jumps) if d > 5.0), reverse=True)
                          print(f"       CA-CA: n={len(jumps)} max={round(max(jumps),1)}Å  "
                                f"jumps>5Å: {[(round(d,1), 'after CA#'+str(i)) for d, i in bigs[:6]]}  "
                                f"({'WRAP-LIKE: one/few huge jumps' if bigs and max(jumps) > 15 else 'continuous chain: real elongation'})")
                      # Locate the floppy segment for a clean FEP trim: centroid of all CAs, then the 1-based
                      # sequence positions whose CA is >25 Å from centroid (the extended tail). Contiguous runs
                      # at the sequence start/end are the trimmable hinge.
                      if cas:
                          cx = sum(a[0] for a in cas) / len(cas)
                          cy = sum(a[1] for a in cas) / len(cas)
                          cz = sum(a[2] for a in cas) / len(cas)
                          far = [i + 1 for i, a in enumerate(cas)
                                 if ((a[0]-cx)**2 + (a[1]-cy)**2 + (a[2]-cz)**2) ** 0.5 > 25.0]
                          def _runs(xs):
                              r, cur = [], []
                              for v in xs:
                                  if cur and v == cur[-1] + 1:
                                      cur.append(v)
                                  else:
                                      if cur:
                                          r.append((cur[0], cur[-1]))
                                      cur = [v]
                              if cur:
                                  r.append((cur[0], cur[-1]))
                              return r
                          print(f"       FAR-FROM-CORE CA (>25Å from centroid): {len(far)} residues; "
                                f"contiguous runs (1-based seq pos): {_runs(far)}")
              print("#" * 80)
          jobs = sm.list_training_jobs(NameContains=tag, SortBy="CreationTime",
                                       SortOrder="Descending", MaxResults=n).get("TrainingJobSummaries", [])
          print(f"recent '{tag}' training jobs: {len(jobs)}")
          # compact summary printed at the END too (get_job_logs is tail-only, so the top describe scrolls off)
          _summary = []
          for _j in jobs:
              _d = sm.describe_training_job(TrainingJobName=_j["TrainingJobName"])
              _inst = _d.get("ResourceConfig", {}).get("InstanceType", "?")
              _sec = _d.get("SecondaryStatus", "")
              _summary.append(f"{_j['TrainingJobName']}  {_d['TrainingJobStatus']}/{_sec}  {_inst}")
          # describe all, then dump CloudWatch stdout for the FIRST failed one (the real traceback)
          first_failed = None
          for j in jobs:
              d = sm.describe_training_job(TrainingJobName=j["TrainingJobName"])
              print("=" * 80)
              print(f"{j['TrainingJobName']}  status={d['TrainingJobStatus']}/{d.get('SecondaryStatus')}")
              # SecondaryStatusTransitions carry the WHY behind a long 'Starting' — e.g. "Insufficient capacity
              # error from EC2 while launching instances, retrying!" (spot starvation) vs "Downloading input
              # data" (normal). Decides wait-it-out vs switch instance/on-demand. Show the last few w/ times.
              for tr in d.get("SecondaryStatusTransitions", [])[-4:]:
                  st = tr.get("StartTime")
                  print(f"    [{tr.get('Status')}] {tr.get('StatusMessage','')} "
                        f"(since {st.isoformat() if st else '?'})")
              if d.get("FailureReason"):
                  print(f"  FAILURE: {d['FailureReason'][:300]}")
              if d["TrainingJobStatus"] == "Failed" and first_failed is None:
                  first_failed = j["TrainingJobName"]
          if first_failed:
              print("\n" + "#" * 80)
              print(f"# CloudWatch stdout for first failed job: {first_failed}")
              print("#" * 80)
              try:
                  grp = "/aws/sagemaker/TrainingJobs"
                  streams = logs.describe_log_streams(logGroupName=grp,
                              logStreamNamePrefix=first_failed).get("logStreams", [])
                  if not streams:
                      print("  (no log stream found)")
                  import re
                  # Signal-only filter so the 657KB LEaP water-dump doesn't bury the real error. Prints the
                  # lines that actually locate a failure (which leg, which yank stage, the exception).
                  sig = re.compile(r"(error|complex pme|solvent pme|exiting leap|setup log|traceback|"
                                   r"fatal|could not find|went wrong|nan|openbabel|openff|antechamber|"
                                   r"platform|opencl|assert|\[fep\]|ΔG|dg_bind|iteration|trailblaz|"
                                   r"minimiz|alchemical|reached|MBAR|restraint)", re.I)
                  for s in streams[:1]:
                      ev = logs.get_log_events(logGroupName=grp, logStreamName=s["logStreamName"],
                                               startFromHead=False, limit=2000).get("events", [])
                      matched = [e["message"].rstrip() for e in ev if sig.search(e["message"])]
                      print(f"  (filtered {len(matched)}/{len(ev)} CloudWatch lines to failure-signal)")
                      for m in matched[-200:]:
                          print("  " + m)
              except Exception as e:
                  print(f"  could not fetch CloudWatch logs: {e}")
          print("\n=== JOB SUMMARY (name / status / instance) ===")
          for _line in _summary:
              print("  " + _line)
          PY
