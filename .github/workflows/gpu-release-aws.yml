name: NR4A3 unbiased release MD (AWS SageMaker)

# Gate-3 disambiguation: unbiased "release" MD seeded from the metad-opened conformer to test whether
# the druggable open pocket is metastable (persists) or bias-induced strain (collapses). Mounts the
# metad outputs (s3://<bucket>/nr4a3-metad); GPU job; defaults under GitHub's 6 h job cap. REQUIRES
# secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN (region is a workflow input).

on:
  workflow_dispatch:
    inputs:
      ns:
        description: "ns per replica (3 replicas; collapse is fast so short is fine)"
        default: "5"
        required: false
      n_rep:
        description: "number of unbiased replicas (different velocity seeds)"
        default: "3"
        required: false
      target_rg:
        description: "seed-frame CV Rg (nm): 0.717 = low-energy DRUGGABLE state (default); ~0.48 = CLOSED seed (open-from-closed test); <=0 = max-Rg frontier (legacy)"
        default: "0.717"
        required: false
      run_tag:
        description: "output namespace / resume key (e.g. 'openfromclosed'); a re-dispatch with the same tag+prefix RESUMES + extends"
        default: "release"
        required: false
      output_prefix:
        description: "S3 output prefix (bump per experiment so runs don't collide; resume mounts this)"
        default: "nr4a3-release"
        required: false
      checkpoint_every:
        description: "blocks (×50 ps) between continuous state checkpoints"
        default: "10"
        required: false
      max_runtime:
        description: "SageMaker MaxRuntime seconds (scale to NS; a timeout just checkpoints and you re-dispatch to resume)"
        default: "18000"
        required: false
      instance:
        description: "SageMaker instance type"
        default: "ml.g5.xlarge"
        required: false
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false
      git_ref:
        description: "repo ref the job clones + runs"
        default: "main"
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3
      - name: Submit SageMaker release job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          INSTANCE: ${{ inputs.instance }}
          NS: ${{ inputs.ns }}
          N_REP: ${{ inputs.n_rep }}
          TARGET_RG: ${{ inputs.target_rg }}
          RUN_TAG: ${{ inputs.run_tag }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
          CHECKPOINT_EVERY: ${{ inputs.checkpoint_every }}
          MAX_RUNTIME: ${{ inputs.max_runtime }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first. See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_md_release_sagemaker.py
