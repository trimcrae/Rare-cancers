name: GCP GPU — Ternary cooperativity FEP on L4 (valB_mini PROTAC 2->cis; WIF keyless)

# The GCP port of the ternary-cooperativity FEP (nr4a3_ternary_fep.py) for the reviewer-approved valB_mini edge
# Wurz compound 1 -> compound 4 (SMARCA2-VHL, staged from 8G1Q; linker pyridine->benzene; ddG_coop_exp=+0.94
# kcal/mol, alpha_SPR). Reuses gpu-rbfe-gcp.yml's proven machinery (WIF auth, zone-fallback Spot L4 create,
# Miniforge+mamba CUDA openmm, env-cache, serial-console reporting, unconditional teardown). The VM SELF-STAGES
# the leg from 8G1Q (ternary_pdb_stage.py; unrestricted internet) INCLUDING the mandated SMARCA4->SMARCA2 model
# substitution+relax, so there is NO S3/GCS input dependency for the smoke.
#
#   mode=smoke : env solve + 8G1Q stage (+SMARCA4->SMARCA2 relax) + ternary assembly + atom-map + hybrid-topology
#                build + the 5-part $0 gate (NO MD). Minutes,
#                ~$1-2. The FIRST-EVER GPU run of the ternary assembly. Runs one leg (default the ternary leg).
#   mode=run   : full 5ns sampling for ONE leg x ONE replica (leg_id + seed), spot-safe re-dispatch, result->GCS.
#                The valB_mini bundle = {binary_vhl, ternary_smarca2} x {solvent} x SEED 0/1/2 (prereg >=3 reps).
#   mode=reduce: CPU — ddG_coop = ternary - binary + replicate-SD + compare to +1.71; cis-endpoint diagnostics.
# NEW workflow -> not API-dispatchable from a feature branch until on the default branch; the smoke auto-runs on
# PUSH (paths = this file + the engine/stager). The paid mode=run needs workflow_dispatch (once on main) or a
# push with run=1 marker.

on:
  workflow_dispatch:
    inputs:
      mode:        { description: "smoke | run | reduce | tail", default: "smoke", required: true }
      leg_id:      { description: "leg to run", default: "calib_hi_to_lo__ternary_vhl", required: false }
      seed:        { description: "replica seed (run: 0/1/2)", default: "0", required: false }
      n_windows:   { description: "lambda windows", default: "12", required: false }
      template_pdb: { description: "crystal template (Wurz 8G1Q for valB_mini cmpd1->cmpd4)", default: "8G1Q", required: false }
      zone:        { description: "GCE zone", default: "us-central1-a", required: false }
      spot_safe:   { description: "1 = re-dispatch resume", default: "0", required: false }
      detach:      { description: "1 = launch VM + exit (multi-hour real legs; monitor via gpu-rbfe-gcp-tail vm=gcp-ternary-<runid>). Auto-on for mode=run", default: "0", required: false }
      charge_method: { description: "am1bcc (field standard, SLOW/stalls on big PROTACs via AmberTools sqm) | nagl (openff-nagl ML charges, fast). MUST match across all valB legs.", default: "am1bcc", required: false }
  # NO push trigger: with GPUS_ALL_REGIONS=1 an auto-smoke on every ternary-file edit STEALS the single GPU from
  # the real serial leg (that is exactly what blocked seed-0 on 2026-07-17 — a push-smoke VM held the quota while
  # the mode=run launcher got 'quota exceeded' for 25 min). The CPU validator (smarca2-model-validate.yml) covers
  # these files for $0; a GPU smoke is dispatched by hand (workflow_dispatch) only when actually wanted.

permissions:
  id-token: write
  contents: read

concurrency:
  group: gcp-gpu-ternary-${{ github.event.inputs.mode || 'smoke' }}
  cancel-in-progress: false

jobs:
  gcp-ternary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ZONE: ${{ github.event.inputs.zone || 'us-central1-a' }}
      MODE: ${{ github.event.inputs.mode || 'smoke' }}
      LEG_ID: ${{ github.event.inputs.leg_id || 'calib_hi_to_lo__ternary_vhl' }}
      SEED: ${{ github.event.inputs.seed || '0' }}
      NWIN: ${{ github.event.inputs.n_windows || '12' }}
      TEMPLATE_PDB: ${{ github.event.inputs.template_pdb || '8G1Q' }}
      SPOT_SAFE: ${{ github.event.inputs.spot_safe || '0' }}
      DETACH: ${{ github.event.inputs.detach || '0' }}
      CHARGE_METHOD: ${{ github.event.inputs.charge_method || 'am1bcc' }}
      GITREF: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        name: Authenticate to GCP (keyless, WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878095411563/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gpu-runner@project-a7ebde30-e2ed-4b8d-9a9.iam.gserviceaccount.com
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve project
        run: |
          set -eo pipefail
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          echo "PROJECT=$PROJECT" >> "$GITHUB_ENV"
          gcloud config set project "$PROJECT"
      - name: Tail / monitor detached ternary VMs (mode=tail)
        if: ${{ github.event.inputs.mode == 'tail' }}
        run: |
          set -eo pipefail
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          BUCKET="${PROJECT}-rbfe-ckpt"; RESULTS="gs://$BUCKET/valB-6hax/results"
          echo "=== live gcp-ternary VMs ==="
          gcloud compute instances list --filter="name~'^gcp-ternary-'" \
            --format="table(name,zone.basename(),status,creationTimestamp)" 2>/dev/null || echo "(none)"
          echo "=== valB-6hax results in GCS ==="
          gcloud storage ls "$RESULTS/" 2>/dev/null || echo "(no results yet)"
          echo "=== per-interval commit census (liveness of the running leg $LEG_ID seed $SEED) ==="
          CB="gs://$BUCKET/valB-6hax/commits/$LEG_ID/$SEED"
          CALL=$(gcloud storage ls --recursive "$CB/" 2>/dev/null || true)
          if [ -n "$CALL" ]; then
            for PH in warmup production; do
              MAX=$(printf '%s\n' "$CALL" | grep -aoE "$PH/iter-[0-9]+" | grep -aoE "[0-9]+$" | sort -n | tail -1)
              [ -n "$MAX" ] && echo "  $PH: furthest committed iteration = $MAX"
            done
            printf '%s\n' "$CALL" | grep -aE "COMMITTED.json" | tail -3
          else
            echo "  (no commits yet — VM still in env-solve/stage/setup, or not provisioned)"
          fi
          echo "=== smoke.json (endpoint-verification: built vs requested SMILES) ==="
          gcloud storage cat "$RESULTS/smoke_${LEG_ID}.json" 2>/dev/null || echo "(no smoke.json for $LEG_ID)"
          echo "=== post-mortem logs (a self-deleted VM uploads /tmp/tfep_run.log here on NORESULT) ==="
          PM=$(gcloud storage ls "gs://$BUCKET/valB-6hax/postmortem/" 2>/dev/null || true)
          if [ -n "$PM" ]; then
            printf '%s\n' "$PM" | tail -6
            NEWEST=$(printf '%s\n' "$PM" | grep -aE "${LEG_ID}_seed${SEED}" | sort | tail -1)
            [ -z "$NEWEST" ] && NEWEST=$(printf '%s\n' "$PM" | sort | tail -1)
            if [ -n "$NEWEST" ]; then
              echo "--- newest post-mortem: $NEWEST (last 60 lines, stripped) ---"
              gcloud storage cat "$NEWEST" 2>/dev/null | sed -e "s/\x1b\[[0-9;]*m//g" | tail -60 || echo "(cat failed)"
            fi
          else
            echo "  (no post-mortem logs — VM either still alive, spot-preempted (abrupt DELETE, no upload), or never provisioned)"
          fi
          VM_IN="${{ github.event.inputs.leg_id }}"   # reuse leg_id slot to pass an explicit VM name for tail
          case "$VM_IN" in gcp-ternary-*) TVM="$VM_IN" ;; *) TVM=$(gcloud compute instances list --filter="name~'^gcp-ternary-'" --format="value(name)" 2>/dev/null | head -1) ;; esac
          if [ -n "$TVM" ]; then
            TZONE=$(gcloud compute instances list --filter="name=$TVM" --format="value(zone.basename())" 2>/dev/null | head -1)
            echo "=== serial tail: $TVM ($TZONE) ==="
            gcloud compute instances get-serial-port-output "$TVM" --zone="$TZONE" 2>/dev/null \
              | grep -aE "boot|nvidia-smi|import:|stage|staged|SMOKE|mapped|assembly|hybrid|equilibr|iteration|Analyzing|LEG DONE|TFEP|error|Error|Traceback|ABORT|missing|self-delet|SETUP|SOLVATED|particles|spot-safe|commit store|barrier|committed" | tail -70 || echo "(no serial yet)"
            # LIVE WINDOW INTO THE RUNNING MD (SSH; non-destructive): the openmmtools MD logger writes per-iteration
            # progress to /tmp/tfep_run.log on the VM, NOT the serial console — so a slow/stuck MD is invisible from
            # serial. SSH in, dump nvidia-smi (is the GPU actually busy? rules out a CPU-fallback bug), the tail of
            # the run log (where is it: minimizing? equilibrating? which iteration?), and any iteration/replica lines.
            if [ "${{ github.event.inputs.mode }}" = "tail" ]; then
              echo "=== SSH live window: nvidia-smi + /tmp/tfep_run.log (where is the MD?) ==="
              timeout 120 gcloud compute ssh "$TVM" --zone="$TZONE" --quiet --command 'echo "--- nvidia-smi ---"; nvidia-smi --query-gpu=utilization.gpu,memory.used,power.draw --format=csv,noheader 2>/dev/null || true; echo "--- FULL run log ---"; sed -e "s/\x1b\[[0-9;]*m//g" /tmp/tfep_run.log 2>/dev/null || echo "(no run log)"; echo "=== nan-error-logs dir ==="; SD=$(ls -d /tmp/tout/*_sim_shared 2>/dev/null | head -1); ls -la "$SD/nan-error-logs" 2>/dev/null || echo "(no nan dir)"; echo "=== minimize/energy/nan lines ==="; grep -aiE "minimi|energ|nan|reinitial|restart|Warning|CRITICAL|Potential" /tmp/tfep_run.log 2>/dev/null || true' 2>&1 | grep -vE "Warning: Permanently added|Updating project ssh|Waiting for SSH key|WARNING:|^$" | tail -140 || echo "(ssh window failed)"
            fi
            if [ "${{ github.event.inputs.detach }}" = 1 ]; then
              echo "deleting $TVM (requested via detach=1 on a tail call)"
              gcloud compute instances delete "$TVM" --zone="$TZONE" --quiet || true
            fi
          fi
      - name: Provision Spot L4 VM + run ternary-FEP
        if: ${{ github.event.inputs.mode != 'tail' }}
        run: |
          set -eo pipefail
          VM="gcp-ternary-${GITHUB_RUN_ID}"
          echo "VM=$VM" >> "$GITHUB_ENV"
          IMG_FAMILY=$(gcloud compute images list --project=deeplearning-platform-release \
            --filter="family~'^common-cu'" --format="value(family)" --sort-by=~creationTimestamp 2>/dev/null | head -1)
          [ -z "$IMG_FAMILY" ] && { echo "::error::no DLVM CUDA image family"; exit 1; }
          BUCKET="${PROJECT}-rbfe-ckpt"
          RESULTS="gs://$BUCKET/valB-6hax/results"
          echo "image=$IMG_FAMILY mode=$MODE leg=$LEG_ID seed=$SEED ref=$GITREF"

          cat > /tmp/startup.sh <<SS
          #!/bin/bash
          exec > >(tee /var/log/tfep.log) 2>&1
          set +e
          echo "=== TFEP boot \$(date -u) mode=$MODE leg=$LEG_ID seed=$SEED ==="
          for i in \$(seq 1 40); do nvidia-smi && break || { echo "waiting for GPU driver..."; sleep 10; }; done
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
          # env-cache (openfe + gemmi + pdbfixer + biopython for the SMARCA4->SMARCA2 staging); distinct key from
          # the RBFE lane. v2 = adds biopython (smarca2_model alignment) -> forces a one-time rebuild.
          ENV_KEY=\$(echo "$IMG_FAMILY|openfe1.12-am1bcc-gemmi-pdbfixer-biopython-cu126-v2" | sha256sum | cut -c1-16)
          ENV_CACHE="gs://$BUCKET/env-cache/ternary-\$ENV_KEY.tar"
          PY=/tmp/mf/envs/rbfe/bin/python
          USED_CACHE=0
          if gcloud storage cp "\$ENV_CACHE" /tmp/env.tar 2>/dev/null; then
            mkdir -p /tmp/mf/envs && tar -C /tmp/mf/envs -xf /tmp/env.tar 2>&1 | tail -1 && USED_CACHE=1; rm -f /tmp/env.tar
          fi
          if [ "\$USED_CACHE" = 1 ] && \$PY -c "import openfe, openmm, gemmi, rdkit, pdbfixer, Bio" 2>/dev/null; then
            echo "--- env-cache HIT ---"
          else
            echo "--- env-cache MISS -> Miniforge+mamba (~8-13 min) ---"
            curl -fsSL -o /tmp/mf.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
            bash /tmp/mf.sh -b -p /tmp/mf 2>&1 | tail -3
            /tmp/mf/bin/mamba create -y -p /tmp/mf/envs/rbfe -c conda-forge \
              python=3.11 "openfe>=1.12" "pydantic>=2" importlib_resources openff-toolkit \
              "ambertools>=23" openmmforcefields openff-nagl openff-nagl-models ocl-icd-system \
              cuda-version=12.6 rdkit lomap2 kartograf gemmi pdbfixer biopython numpy scipy pyyaml netcdf4 google-cloud-storage 2>&1 | tail -20
            if [ -x "\$PY" ] && \$PY -c "import openfe, openmm, gemmi, pdbfixer, Bio" 2>/dev/null; then
              ( cd /tmp/mf/envs && tar -cf - rbfe | gcloud storage cp - "\$ENV_CACHE" 2>&1 | tail -1 ) || echo "(env-cache upload failed; non-fatal)"
            fi
          fi
          [ -x "\$PY" ] || { echo "###TFEPRESULT### TFEP_RESULT status=ENVFAIL ###END###"; sleep 5; exit 0; }
          export PATH=/tmp/mf/envs/rbfe/bin:\$PATH
          echo "import: \$(\$PY -c 'import openfe,openmm,gemmi,rdkit;print(openfe.__version__)' 2>&1)"
          git clone --depth 1 --branch "$GITREF" https://github.com/trimcrae/Rare-cancers /tmp/repo 2>&1 | tail -2
          WORK=/tmp/repo/research/modalities
          IN=/tmp/ternary_in; OUT=/tmp/tout; mkdir -p \$OUT
          # idempotent cross-dispatch skip: a completed real leg already in GCS is not recomputed. The ternary
          # engine is now SPOT-SAFE (execute_hybrid_dag_spot_safe commits MD per-interval to the GCS CommitStore
          # below), so a preempted leg RESUMES from its last committed iteration on re-dispatch — a finished leg
          # is still kept via this skip.
          if [ "$MODE" = run ] && gcloud storage ls $RESULTS/leg_${LEG_ID}_fwd_r${SEED}.json >/dev/null 2>&1; then
            echo "leg ${LEG_ID} seed $SEED already in GCS — idempotent skip"
            for k in \$(seq 1 6); do echo "###TFEPRESULT### TFEP_RESULT status=OK run leg=${LEG_ID} (idempotent-skip) ###END###"; sleep 3; done
            exit 0
          fi
          echo "--- stage $LEG_ID from $TEMPLATE_PDB ---"
          ( cd \$WORK && \$PY ternary_pdb_stage.py --leg-id "$LEG_ID" --template-pdb "$TEMPLATE_PDB" --out \$IN 2>&1 | tail -25 )
          echo "staged tree:"; find \$IN -type f -printf '  %s B  %p\n' 2>/dev/null
          TMODE=smoke; [ "$MODE" = run ] && TMODE=run
          # SPOT-SAFE commit store (mode=run only): the MultiState sampling commits per-interval to this versioned
          # GCS prefix so a re-dispatch on a fresh VM RESUMES from the last committed iteration instead of from
          # zero. Keyed by leg+seed so replicas/legs never collide. Smoke skips it (no MD to checkpoint).
          COMMIT_ENV=""
          if [ "\$TMODE" = run ]; then
            COMMIT_ENV="RBFE_SPOT_COMMIT_GCS=gs://$BUCKET/valB-6hax/commits/$LEG_ID/$SEED RBFE_WARMUP_CKPT_ITERS=20 RBFE_PROD_CKPT_ITERS=40"
            echo "spot-safe commit store: gs://$BUCKET/valB-6hax/commits/$LEG_ID/$SEED"
          fi
          echo "--- ternary-FEP TMODE=\$TMODE leg=$LEG_ID seed=$SEED ---"
          ( cd \$WORK && env MODE=\$TMODE LEG_ID=$LEG_ID SEED=$SEED DIRECTION=fwd N_WINDOWS=$NWIN \
              CHARGE_METHOD=$CHARGE_METHOD \
              OPENMM_REQUIRE_CUDA=1 INPUT_DIR=\$IN OUTPUT_DIR=\$OUT CKPT_DIR=\$OUT \$COMMIT_ENV \
              \$PY nr4a3_ternary_fep.py 2>&1 ) | tee /tmp/tfep_run.log
          # scrape a result + persist
          if [ "\$TMODE" = smoke ] && [ -f \$OUT/smoke.json ]; then
            LINE=\$(\$PY -c "import json;d=json.load(open('\$OUT/smoke.json'));print('TFEP_RESULT status=OK smoke leg=%s env=%s mapped=%s has_protein=%s endpoints=%s->%s match=%s units=%s'%(d.get('leg'),d.get('environment'),d.get('n_mapped_atoms'),d.get('has_protein'),d.get('endpoint_a'),d.get('endpoint_b'),d.get('endpoints_match_requested'),d.get('n_protocol_units')))")
            gcloud storage cp \$OUT/smoke.json $RESULTS/smoke_$LEG_ID.json 2>&1 | tail -1 || true
          elif ls \$OUT/leg_${LEG_ID}_*.json >/dev/null 2>&1; then
            LJ=\$(ls \$OUT/leg_${LEG_ID}_*.json | head -1)
            LINE=\$(\$PY -c "import json;d=json.load(open('\$LJ'));print('TFEP_RESULT status=OK run leg=%s dg_morph=%.3f se=%.3f'%(d.get('leg_id'),d.get('dg_morph_kcal',0),d.get('mbar_se_kcal',0)))")
            gcloud storage cp \$LJ $RESULTS/ 2>&1 | tail -1 || true
          else
            LINE="TFEP_RESULT status=NORESULT leg=$LEG_ID tail=\$(grep -iE 'error|abort|Traceback|missing' /tmp/tfep_run.log | tail -1 | cut -c1-140)"
          fi
          for k in \$(seq 1 6); do echo "###TFEPRESULT### \$LINE ###END###"; sleep 3; done
          echo "=== TFEP-DONE \$LINE ==="
          # SELF-DELETE on BOTH success AND failure so a detached VM never idle-bills to the 7h backstop and,
          # critically, never blocks the single GPUS_ALL_REGIONS=1 quota that every future GCP GPU job needs.
          # On NORESULT we UPLOAD the run log to GCS first (post-mortem is preserved off-VM), then delete — the
          # 2026-07-17 seed-0 setup failure left a VM up ~5h, idle-billing AND blocking the next smoke, because
          # the old logic kept failed VMs "for post-mortem". The serial is already streamed to the GH poller.
          NAME=\$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/name)
          SZ=\$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/zone | awk -F/ '{print \$NF}')
          case "\$LINE" in
            *status=OK*)
              echo "self-deleting \$NAME in \$SZ (result in GCS; avoid idle billing)" ;;
            *)
              echo "NORESULT: uploading post-mortem log to GCS, then self-deleting \$NAME to free the single-GPU quota"
              gcloud storage cp /tmp/tfep_run.log "gs://$BUCKET/valB-6hax/postmortem/${LEG_ID}_seed${SEED}_\$(date +%s).log" 2>/dev/null || echo "log upload no-op" ;;
          esac
          gcloud compute instances delete "\$NAME" --zone="\$SZ" --quiet || echo "self-delete no-op"
          SS

          MACHINES="g2-standard-8 g2-standard-4"
          ZONES="us-central1-a us-central1-b us-central1-c us-central1-f"
          provision() {
            local round M Z
            for round in $(seq 1 8); do
              for M in $MACHINES; do
                for Z in $ZONES; do
                  if gcloud compute instances create "$VM" \
                      --zone="$Z" --machine-type="$M" \
                      --provisioning-model=SPOT --instance-termination-action=DELETE \
                      --max-run-duration=25200s --maintenance-policy=TERMINATE --no-restart-on-failure \
                      --scopes=cloud-platform --image-family="$IMG_FAMILY" --image-project=deeplearning-platform-release \
                      --boot-disk-size=100GB --metadata-from-file=startup-script=/tmp/startup.sh 2>/tmp/cerr; then
                    ZONE="$Z"; echo "ZONE=$Z" >> "$GITHUB_ENV"; echo "provisioned $M in $Z (round $round)"; return 0
                  fi
                  grep -iqE "quota|exceeded" /tmp/cerr && { echo "::error::QUOTA for $M in $Z:"; grep -iE "quota|exceeded" /tmp/cerr | head -1; }
                done
              done
              echo "round $round: L4 Spot stocked out; waiting 120s…"; sleep 120
            done
            return 1
          }
          vm_alive() {
            local st; st=$(gcloud compute instances describe "$VM" --zone="$ZONE" --format="value(status)" 2>/dev/null || echo GONE)
            case "$st" in RUNNING|PROVISIONING|STAGING|REPAIRING) return 0 ;; *) echo "  VM status=$st"; return 1 ;; esac
          }

          # DETACHED launcher (default for mode=run — real legs are multi-hour, past the 90-min GH job): provision
          # ONCE and EXIT; the VM runs independently (7h max-run backstop), streams to serial, writes the leg JSON
          # to GCS results/ on completion. Monitor with gpu-rbfe-gcp-tail (vm=gcp-ternary-<runid>); re-dispatch to
          # resume (idempotent GCS skip above). Teardown is skipped so the VM keeps running.
          DO_DETACH="$DETACH"; [ "$MODE" = run ] && DO_DETACH=1
          if [ "$DO_DETACH" = 1 ]; then
            provision || { echo "::error::no L4 Spot capacity — re-dispatch later (idempotent GCS skip)"; exit 1; }
            echo "DETACHED=1" >> "$GITHUB_ENV"
            echo "DETACHED: $VM launched in $ZONE (7h backstop). Result -> $RESULTS/. Monitor: gpu-rbfe-gcp-tail vm=$VM. This job EXITS now."
            exit 0
          fi

          MAX_ATTEMPTS=1; [ "$SPOT_SAFE" = 1 ] && MAX_ATTEMPTS=3
          POLL_ITERS=90; [ "$MODE" = run ] && POLL_ITERS=680
          RES=""; OUT=""
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if ! vm_alive 2>/dev/null; then
              echo "--- attempt $attempt/$MAX_ATTEMPTS: provisioning $VM ---"
              provision || { echo "::error::no L4 Spot capacity after wait-out budget"; exit 1; }
            fi
            for i in $(seq 1 $POLL_ITERS); do
              OUT=$(gcloud compute instances get-serial-port-output "$VM" --zone="$ZONE" 2>/dev/null || true)
              RES=$(printf '%s' "$OUT" | grep -oE '###TFEPRESULT### .* ###END###' | tail -1 | sed -E 's/^###TFEPRESULT### //; s/ ###END###$//' || true)
              [ -n "$RES" ] && break
              if ! vm_alive; then echo "  VM gone (preempted) attempt $attempt after ~$((i*30))s"; break; fi
              sleep 30
            done
            [ -n "$RES" ] && break
          done
          echo "--- VM serial (filtered tail) ---"
          printf '%s' "$OUT" | grep -aE "import:|nvidia-smi|TFEPRESULT|openfe|OpenMM|mapped|SMOKE|stage|staged|assembly|hybrid|error|Error|Traceback|ABORT|missing" | tail -90 || true
          if [ -z "$RES" ]; then
            echo "::warning::no result marker — serial tail 200:"; printf '%s' "$OUT" | tail -200 || true
            echo "::error::ternary-FEP produced no result"; exit 1
          fi
          echo "RESULT_LINE=$RES" >> "$GITHUB_ENV"
          echo "TFEP RESULT: $RES"

      - name: Teardown (skip for detached — the VM must keep running)
        if: always()
        run: |
          if [ "${DETACHED:-0}" = 1 ]; then echo "detached — leaving $VM up (7h max-run backstop; tail deletes when done)"; exit 0; fi
          if [ -n "$VM" ] && [ -n "$PROJECT" ]; then
            gcloud compute instances delete "$VM" --zone="$ZONE" --quiet 2>/dev/null && echo "deleted $VM" || echo "delete no-op"
          fi
      - name: Result summary
        if: always()
        run: |
          echo "mode=$MODE leg=$LEG_ID"
          if [ "${DETACHED:-0}" = 1 ]; then echo "🚀 DETACHED: $VM running the leg independently -> GCS; monitor via gpu-rbfe-gcp-tail vm=$VM"; exit 0; fi
          echo "RESULT: ${RESULT_LINE:-<none>}"
          case "${RESULT_LINE:-}" in
            *status=OK*smoke*) echo "✅ ternary assembly+map+hybrid-topology built on GCP L4 — valB_mini plumbing PROVEN" ;;
            *status=OK*run*)   echo "✅ ternary FEP leg ran end-to-end on GCP L4" ;;
            *ENVFAIL*)         echo "❌ openfe/gemmi env build failed on the VM" ;;
            *) echo "⚠️ no clean OK result — see serial tail above" ;;
          esac
