name: GCP GPU — Ternary cooperativity FEP on L4 (valB_mini PROTAC 2->cis; WIF keyless)

# The GCP port of the ternary-cooperativity FEP (nr4a3_ternary_fep.py) for the reviewer-approved valB_mini edge
# Wurz compound 1 -> compound 4 (SMARCA2-VHL, staged from 8G1Q; linker pyridine->benzene; ddG_coop_exp=+0.94
# kcal/mol, alpha_SPR). Reuses gpu-rbfe-gcp.yml's proven machinery (WIF auth, zone-fallback Spot L4 create,
# Miniforge+mamba CUDA openmm, env-cache, serial-console reporting, unconditional teardown). The VM SELF-STAGES
# the leg from 8G1Q (ternary_pdb_stage.py; unrestricted internet) INCLUDING the mandated SMARCA4->SMARCA2 model
# substitution+relax, so there is NO S3/GCS input dependency for the smoke.
#
#   mode=smoke : env solve + 8G1Q stage (+SMARCA4->SMARCA2 relax) + ternary assembly + atom-map + hybrid-topology
#                build + the 5-part $0 gate (NO MD). Minutes,
#                ~$1-2. The FIRST-EVER GPU run of the ternary assembly. Runs one leg (default the ternary leg).
#   mode=run   : full 5ns sampling for ONE leg x ONE replica (leg_id + seed), spot-safe re-dispatch, result->GCS.
#                The valB_mini bundle = {binary_vhl, ternary_smarca2} x {solvent} x SEED 0/1/2 (prereg >=3 reps).
#   mode=reduce: CPU — ddG_coop = ternary - binary + replicate-SD + compare to +1.71; cis-endpoint diagnostics.
# NEW workflow -> not API-dispatchable from a feature branch until on the default branch; the smoke auto-runs on
# PUSH (paths = this file + the engine/stager). The paid mode=run needs workflow_dispatch (once on main) or a
# push with run=1 marker.

on:
  workflow_dispatch:
    inputs:
      mode:        { description: "smoke | run | reduce | tail | preequil (plain-MD relax the physical complex -> preequilcache, then run RBFE with use_preequil=1) | endpoint_smoke (exact-Hamiltonian physical-endpoint stability test per ligand, reviewer condition 2/3 step 3)", default: "smoke", required: true }
      preequil_smoke: { description: "1 = PREEQUIL_SMOKE (system-build + 200-step relax sanity, no full ns) for mode=preequil", default: "0", required: false }
      preequil_ns: { description: "production ns after restrained relaxation for mode=preequil", default: "0.5", required: false }
      use_preequil: { description: "1 = for mode=run, restore the pre-equilibrated (relaxed) complex.pdb/ligands.sdf from preequilcache instead of the raw stage cache, and use a pre-equil-keyed setup cache. Requires a prior mode=preequil run.", default: "0", required: false }
      leg_id:      { description: "leg to run", default: "calib_hi_to_lo__ternary_vhl", required: false }
      seed:        { description: "replica seed (run: 0/1/2)", default: "0", required: false }
      n_windows:   { description: "lambda windows", default: "12", required: false }
      template_pdb: { description: "crystal template (Wurz 8G1Q for valB_mini cmpd1->cmpd4)", default: "8G1Q", required: false }
      zone:        { description: "GCE zone", default: "us-central1-a", required: false }
      spot_safe:   { description: "1 = re-dispatch resume", default: "0", required: false }
      detach:      { description: "1 = launch VM + exit (multi-hour real legs; monitor via gpu-rbfe-gcp-tail vm=gcp-ternary-<runid>). Auto-on for mode=run", default: "0", required: false }
      charge_method: { description: "nagl (openff-nagl ML charges, fast; has a warm CPU-primed setup cache — DEFAULT, matches all existing valB legs) | am1bcc (field standard but SLOW on big PROTACs via AmberTools sqm AND has no primed cache -> ~40 min GPU-idle setup; if you need am1bcc, run ternary-setup-prime-cpu.yml charge_method=am1bcc FIRST so the GPU restores the cache instead of re-parameterizing). MUST match across all valB legs.", default: "nagl", required: false }
      timestep_fs: { description: "MD timestep (fs). CORRECTED 2026-07-19: OpenFE leaves the WHOLE alchemical ligand's C-H unconstrained (not just morphing bonds), so the ceiling is a LANE property, not edge chemistry: large ternary assemblies NaN at 4.0 (calib) and run at 2.0; binary warhead RBFE runs at 4.0. With constrain_ligand_ch=1 a larger dt (try 3.0/4.0) may become stable. See ternary-rbfe-runbook.md 1b.", default: "2.0", required: false }
      constrain_ligand_ch: { description: "1 = constrain the NON-alchemical ligand C-H bonds OpenFE leaves flexible (nr4a3_rbfe.constrain_nonalchemical_xh) to enable a larger stable timestep for the ternary lane. NB (2026-07-19): the ligand C-H are ALREADY constrained, so this is a no-op — kept only as a guard. MUST match across ALL legs of a calculation. Keyed into the commit prefix.", default: "0", required: false }
      warmup_timestep_fs: { description: "MD timestep (fs) for the DISCARDED equilibration/warmup only; production runs at timestep_fs. Set smaller than timestep_fs (e.g. 1.5) to survive a rough ternary warmup while producing at the larger dt — equilibration never enters ΔG, so this does not affect the result. Empty = warmup uses the production dt. Keyed into the commit prefix.", default: "", required: false }
      warmup_iters: { description: "override warmup iteration count (RBFE_WARMUP_ITERS). Empty = derive from equilibration_length. Use a small value (e.g. 100) with a reduced warmup_timestep_fs so the reduced-dt relax is short, or for a fast timestep-feasibility test.", default: "", required: false }
      prod_iters: { description: "override production iteration count (RBFE_PROD_ITERS). Empty = full science length. Use a small value (e.g. 120) for a fast timestep-feasibility test (does production survive at timestep_fs).", default: "", required: false }
      provisioning: { description: "spot (default; ~60-90% cheaper, standing rule: wait out capacity) | standard (on-demand; skips the spot-capacity wait). Use 'standard' ONLY when explicitly authorized for a time-sensitive one-off, e.g. confirming a single valB leg.", default: "spot", required: false }
      commit_salt: { description: "Optional suffix appended to the spot commit-store prefix, forcing a FRESH run that does NOT resume prior checkpoints. Use when a code change alters warmup/production behavior but the (dt,clig,wu) prefix would otherwise collide with poisoned checkpoints (e.g. a broken earlier warmup-override attempt wrote to the same wu-keyed prefix). Empty = normal resume.", default: "", required: false }
      refuse_if_vm_live: { description: "FAILOVER GUARD (default 0). When 1, the launcher REFUSES to provision if any gcp-ternary-* VM is already alive, and exits 0 as a no-op. Used to poll an on-demand RESUME safely: while a spot VM holds the single GPU the resume is a fast no-op; the moment spot is killed (GPU freed) the next dispatch provisions and resumes the same-salt checkpoint. Prevents two VMs ever writing one commit prefix, independent of the GPU quota.", default: "0", required: false }
      allow_gpu_setup_build: { description: "Escape hatch (default 0). By default a GPU run FAILS FAST if the setup cache for its (leg,charge) is missing, forcing you to CPU-prime it first (ternary-setup-prime-cpu.yml) instead of burning ~8-40 min of GPU-idle re-parameterization. Set 1 only for a deliberate GPU-side build (the very first prime of a brand-new leg/charge). Sets RBFE_REQUIRE_PRIMED_SETUP=0.", default: "0", required: false }
      min_steps: { description: "L-BFGS minimization steps per replica before warmup (RBFE_MIN_STEPS). Default 5000 (OpenFE standard). Was 25000 which minimizes 12 replicas of the 146k-atom system for ~20-60 min at ~0% GPU for NO NaN benefit (the code comment confirms the NaN survives 25000 steps; the 1 fs warmup is what fixes NaNs). Only raise if a specific system genuinely needs it.", default: "5000", required: false }
      reset_commits: { description: "1 = wipe this leg/seed's committed checkpoints before running (fresh start — use when changing timestep so a new-dt run does not resume a stale-dt trajectory).", default: "0", required: false }
      force_rerun: { description: "1 = bypass the idempotent-skip even if a completed leg result JSON already exists in GCS (the run overwrites it). Use when the pipeline changed (e.g. new pre-equil version) and the old result is stale. Pair with a fresh commit_salt so it does not resume stale checkpoints.", default: "0", required: false }
      autostop_convergence: { description: "1 = STOP production early once the committed trajectory converges (connected MBAR overlap + dG(t) plateau, reviewer condition 4), capped at the 5 ns production_length. Default 0 (run the full cap). Conservative: only checks after RBFE_AUTOSTOP_MIN_FRAC (0.4) of the cap and never stops without real evidence.", default: "0", required: false }
  # NO push trigger: with GPUS_ALL_REGIONS=1 an auto-smoke on every ternary-file edit STEALS the single GPU from
  # the real serial leg (that is exactly what blocked seed-0 on 2026-07-17 — a push-smoke VM held the quota while
  # the mode=run launcher got 'quota exceeded' for 25 min). The CPU validator (smarca2-model-validate.yml) covers
  # these files for $0; a GPU smoke is dispatched by hand (workflow_dispatch) only when actually wanted.

permissions:
  id-token: write
  contents: read

concurrency:
  group: gcp-gpu-ternary-${{ github.event.inputs.mode || 'smoke' }}
  cancel-in-progress: false

jobs:
  gcp-ternary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ZONE: ${{ github.event.inputs.zone || 'us-central1-a' }}
      MODE: ${{ github.event.inputs.mode || 'smoke' }}
      LEG_ID: ${{ github.event.inputs.leg_id || 'calib_hi_to_lo__ternary_vhl' }}
      SEED: ${{ github.event.inputs.seed || '0' }}
      NWIN: ${{ github.event.inputs.n_windows || '12' }}
      TEMPLATE_PDB: ${{ github.event.inputs.template_pdb || '8G1Q' }}
      SPOT_SAFE: ${{ github.event.inputs.spot_safe || '0' }}
      DETACH: ${{ github.event.inputs.detach || '0' }}
      CHARGE_METHOD: ${{ github.event.inputs.charge_method || 'nagl' }}
      TIMESTEP_FS: ${{ github.event.inputs.timestep_fs || '2.0' }}
      CONSTRAIN_LIG: ${{ github.event.inputs.constrain_ligand_ch || '0' }}
      WARMUP_TS: ${{ github.event.inputs.warmup_timestep_fs || '' }}
      WARMUP_ITERS: ${{ github.event.inputs.warmup_iters || '' }}
      PROD_ITERS: ${{ github.event.inputs.prod_iters || '' }}
      SALT: ${{ github.event.inputs.commit_salt || '' }}
      REFUSE_IF_LIVE: ${{ github.event.inputs.refuse_if_vm_live || '0' }}
      REQUIRE_PRIMED: ${{ github.event.inputs.allow_gpu_setup_build == '1' && '0' || '1' }}
      MIN_STEPS: ${{ github.event.inputs.min_steps || '5000' }}
      PE_SMOKE: ${{ github.event.inputs.preequil_smoke || '0' }}
      PE_NS: ${{ github.event.inputs.preequil_ns || '0.5' }}
      USE_PE: ${{ github.event.inputs.use_preequil || '0' }}
      PROVISIONING: ${{ github.event.inputs.provisioning || 'spot' }}
      AUTOSTOP: ${{ github.event.inputs.autostop_convergence || '0' }}
      AUTOSTOP_MIN_FRAC: '0.4'
      FORCE_RERUN: ${{ github.event.inputs.force_rerun || '0' }}
      GITREF: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        name: Authenticate to GCP (keyless, WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878095411563/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gpu-runner@project-a7ebde30-e2ed-4b8d-9a9.iam.gserviceaccount.com
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve project
        run: |
          set -eo pipefail
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          echo "PROJECT=$PROJECT" >> "$GITHUB_ENV"
          gcloud config set project "$PROJECT"
      - name: Tail / monitor detached ternary VMs (mode=tail)
        if: ${{ github.event.inputs.mode == 'tail' }}
        run: |
          set +e   # DIAGNOSTIC step: never exit on a grep-no-match. A warmup-only leg (no production commits yet)
                   # made the production-iter grep return 1, which under `set -e` killed the step BEFORE the serial
                   # tail + SSH run-log window — hiding exactly the MD state we tail for. Read-only, so +e is correct.
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          BUCKET="${PROJECT}-rbfe-ckpt"; RESULTS="gs://$BUCKET/valB-6hax/results"
          echo "=== live gcp-ternary VMs ==="
          VMLIST=$(gcloud compute instances list --filter="name~'^gcp-ternary-'" \
            --format="value(name,zone.basename(),status,creationTimestamp)" 2>/dev/null)
          printf '%s\n' "${VMLIST:-(none)}"
          echo "=== valB-6hax results in GCS ==="
          gcloud storage ls "$RESULTS/" 2>/dev/null || echo "(no results yet)"
          echo "=== per-interval commit census (liveness of the running leg $LEG_ID seed $SEED) ==="
          # leg-level prefix so we find the commits regardless of the seed_dt<X>fs suffix (commit store is now
          # keyed by timestep, and a tail call doesn't know the running leg's dt).
          CB="gs://$BUCKET/valB-6hax/commits/$LEG_ID"
          CALL=$(gcloud storage ls --recursive "$CB/" 2>/dev/null || true)
          if [ -n "$CALL" ]; then
            for PH in warmup production; do
              MAX=$(printf '%s\n' "$CALL" | grep -aoE "$PH/iter-[0-9]+" | grep -aoE "[0-9]+$" | sort -n | tail -1)
              [ -n "$MAX" ] && echo "  $PH: furthest committed iteration = $MAX"
            done
            printf '%s\n' "$CALL" | grep -aE "COMMITTED.json" | tail -3
          else
            echo "  (no commits yet — VM still in env-solve/stage/setup, or not provisioned)"
          fi
          echo "=== smoke.json (endpoint-verification: built vs requested SMILES) ==="
          gcloud storage cat "$RESULTS/smoke_${LEG_ID}.json" 2>/dev/null || echo "(no smoke.json for $LEG_ID)"
          echo "=== endpoint_stability_${LEG_ID}.json (exact-Hamiltonian per-endpoint stability: ff_switch/rmsd/drift) ==="
          gcloud storage cat "$RESULTS/endpoint_stability_${LEG_ID}.json" 2>/dev/null || echo "(no endpoint_stability json for $LEG_ID)"
          echo "=== post-mortem logs (a self-deleted VM uploads /tmp/tfep_run.log here on NORESULT) ==="
          PM=$(gcloud storage ls "gs://$BUCKET/valB-6hax/postmortem/" 2>/dev/null || true)
          if [ -n "$PM" ]; then
            printf '%s\n' "$PM" | tail -6
            NEWEST=$(printf '%s\n' "$PM" | grep -aE "${LEG_ID}_seed${SEED}" | sort | tail -1)
            [ -z "$NEWEST" ] && NEWEST=$(printf '%s\n' "$PM" | sort | tail -1)
            if [ -n "$NEWEST" ]; then
              echo "--- newest post-mortem: $NEWEST ---"
              PMLOG=$(gcloud storage cat "$NEWEST" 2>/dev/null | sed -e "s/\x1b\[[0-9;]*m//g")
              echo "--- config confirm (charge + warmup-dt override) ---"
              printf '%s\n' "$PMLOG" | grep -aE "partial_charge_method|WARMUP timestep|WARMUP from|warmup_target|reduced-dt|overridden|RBFE_CONSTRAIN|forcefield constraints|hydrogen_mass" | tail -20 || echo "(no config lines)"
              echo "--- clash/nan diagnostic lines ---"
              printf '%s\n' "$PMLOG" | grep -aE "clash-diag|nan-diag|minimize|SOLVATED|particles|atoms=|non-bonded|pair \(|coords>|nonfinite|artifacts" | tail -40 || echo "(no diag lines)"
              echo "--- last 20 lines (traceback tail) ---"
              printf '%s\n' "$PMLOG" | tail -20 || echo "(cat failed)"
            fi
          else
            echo "  (no post-mortem logs — VM either still alive, spot-preempted (abrupt DELETE, no upload), or never provisioned)"
          fi
          VM_IN="${{ github.event.inputs.leg_id }}"   # reuse leg_id slot to pass an explicit VM name for tail
          case "$VM_IN" in gcp-ternary-*) TVM="$VM_IN" ;; *) TVM=$(gcloud compute instances list --filter="name~'^gcp-ternary-'" --format="value(name)" 2>/dev/null | head -1) ;; esac
          if [ -n "$TVM" ]; then
            TZONE=$(gcloud compute instances list --filter="name=$TVM" --format="value(zone.basename())" 2>/dev/null | head -1)
            echo "=== serial tail: $TVM ($TZONE) ==="
            SER=$(gcloud compute instances get-serial-port-output "$TVM" --zone="$TZONE" 2>/dev/null)
            printf '%s\n' "$SER" \
              | grep -aE "boot|nvidia-smi|import:|stage|staged|SMOKE|mapped|assembly|hybrid|equilibr|iteration|Analyzing|LEG DONE|TFEP|error|Error|Traceback|ABORT|missing|self-delet|SETUP|SOLVATED|particles|spot-safe|commit store|barrier|committed|clash-diag|nan-diag|minimize|timing|WARMUP timestep|WARMUP from|PRODUCTION created|PRODUCTION from" | tail -90 || echo "(no serial yet)"
            # LIVE WINDOW INTO THE RUNNING MD (SSH; non-destructive): the openmmtools MD logger writes per-iteration
            # progress to /tmp/tfep_run.log on the VM, NOT the serial console — so a slow/stuck MD is invisible from
            # serial. SSH in, dump nvidia-smi (is the GPU actually busy? rules out a CPU-fallback bug), the tail of
            # the run log (where is it: minimizing? equilibrating? which iteration?), and any iteration/replica lines.
            if [ "${{ github.event.inputs.mode }}" = "tail" ]; then
              echo "=== SSH live window: nvidia-smi + /tmp/tfep_run.log (where is the MD?) ==="
              # capture into SSHLOG so the summary fields below read the LIVE VM's own run log (freshest source),
              # not the stale leg-wide postmortem.
              SSHLOG=$(timeout 120 gcloud compute ssh "$TVM" --zone="$TZONE" --quiet --command 'echo "--- nvidia-smi ---"; nvidia-smi --query-gpu=utilization.gpu,memory.used,power.draw --format=csv,noheader 2>/dev/null || true; echo "--- dmon 6s (util/mem/pwr time-series: bursty=working, all-0=idle/stall) ---"; timeout 9 nvidia-smi dmon -c 6 -s um 2>/dev/null || true; echo "--- top CPU procs (python high-%CPU=CPU-bound setup; none=hung) ---"; ps -eo pid,etimes,pcpu,pmem,stat,comm --sort=-pcpu 2>/dev/null | head -8 || true; echo "--- FULL run log ---"; sed -e "s/\x1b\[[0-9;]*m//g" /tmp/tfep_run.log 2>/dev/null || echo "(no run log)"; echo "=== nan-error-logs dir ==="; SD=$(ls -d /tmp/tout/*_sim_shared 2>/dev/null | head -1); ls -la "$SD/nan-error-logs" 2>/dev/null || echo "(no nan dir)"; echo "=== minimize/energy/nan lines ==="; grep -aiE "minimi|energ|nan|reinitial|restart|Warning|CRITICAL|Potential" /tmp/tfep_run.log 2>/dev/null || true' 2>&1 | grep -vE "Warning: Permanently added|Updating project ssh|Waiting for SSH key|WARNING:|^$")
              printf '%s\n' "$SSHLOG" | tail -140 || echo "(ssh window failed)"
            fi
            if [ "${{ github.event.inputs.detach }}" = 1 ]; then
              echo "deleting $TVM (requested via detach=1 on a tail call)"
              gcloud compute instances delete "$TVM" --zone="$TZONE" --quiet || true
            fi
          fi
          # COMPACT FINAL SUMMARY — the LAST lines of the step, so it survives log-retrieval truncation. Gives the
          # two verdicts at a glance: furthest committed warmup/production iteration + whether a NaN was seen.
          WMAX=$(printf '%s\n' "$CALL" | grep -aoE "warmup/iter-[0-9]+" | grep -aoE "[0-9]+$" | sort -n | tail -1)
          PMAX=$(printf '%s\n' "$CALL" | grep -aoE "production/iter-[0-9]+" | grep -aoE "[0-9]+$" | sort -n | tail -1)
          # SOURCE for the verdict fields: when a live VM is running its OWN serial+SSH run log are the truth;
          # the leg-wide postmortem (PMLOG) is a DIFFERENT (dead) run's log and must NOT override a live leg's
          # state (that mixed a stale v2 'setStepSize' NaN into fresh v3 tails). Use PMLOG only when nothing is live.
          LIVE=$(printf '%s\n%s\n' "${SER:-}" "${SSHLOG:-}")
          if printf '%s' "$LIVE" | grep -qaE '[^[:space:]]'; then SRC="$LIVE"; SRCKIND=live; else SRC="${PMLOG:-}"; SRCKIND=postmortem; fi
          NAN=no; printf '%s\n' "$SRC" | grep -qaiE "SimulationNaNError|resulted in a NaN|nan-diag" && NAN=YES
          CHG=$(printf '%s\n' "$SRC" | grep -aoE "partial_charge_method = [a-z0-9]+" | tail -1 | awk '{print $NF}')
          WUD=$(printf '%s\n' "$SRC" | grep -aoE "WARMUP timestep overridden to [0-9.]+ fs" | tail -1)
          NANST=$(printf '%s\n' "$SRC" | grep -aoE "replica [0-9]+ at state [0-9]+ resulted in a NaN|iteration[0-9]+-replica[0-9]+-state[0-9]+" | tail -1)
          RDTW=$(printf '%s\n' "$SRC" | grep -aoE "could not build reduced-dt warmup integrator[^\"]{0,90}" | tail -1)
          VMCOUNT=$(printf '%s\n' "$VMLIST" | grep -c . 2>/dev/null || echo 0)
          VMS1=$(printf '%s\n' "$VMLIST" | tr '\n' ';' | cut -c1-200)
          echo "[PROGRESS-SUMMARY] leg=$LEG_ID seed=$SEED src=$SRCKIND live_vms=$VMCOUNT vms=\"$VMS1\" warmup_committed_iter=${WMAX:-0} production_committed_iter=${PMAX:-0} NaN_seen=$NAN charge=${CHG:-?} warmup_dt_override=\"${WUD:-NONE}\" reduced_dt_warn=\"${RDTW:-none}\" nan_at=\"${NANST:-}\" (committed-iters are leg-wide across salts; verdict fields are from src)"
      - name: Reset committed checkpoints (fresh start on timestep change)
        if: ${{ github.event.inputs.mode != 'tail' && github.event.inputs.reset_commits == '1' }}
        run: |
          set -eo pipefail
          BUCKET="${PROJECT}-rbfe-ckpt"
          CB="gs://$BUCKET/valB-6hax/commits/$LEG_ID/$SEED"
          echo "reset_commits=1 -> wiping $CB (a new-timestep run must not resume a stale-dt trajectory)"
          gcloud storage rm --recursive "$CB/" 2>/dev/null && echo "commits wiped" || echo "(no commits to wipe)"
      - name: Provision Spot L4 VM + run ternary-FEP
        if: ${{ github.event.inputs.mode != 'tail' }}
        run: |
          set -eo pipefail
          VM="gcp-ternary-${GITHUB_RUN_ID}"
          echo "VM=$VM" >> "$GITHUB_ENV"
          IMG_FAMILY=$(gcloud compute images list --project=deeplearning-platform-release \
            --filter="family~'^common-cu'" --format="value(family)" --sort-by=~creationTimestamp 2>/dev/null | head -1)
          [ -z "$IMG_FAMILY" ] && { echo "::error::no DLVM CUDA image family"; exit 1; }
          BUCKET="${PROJECT}-rbfe-ckpt"
          RESULTS="gs://$BUCKET/valB-6hax/results"
          echo "image=$IMG_FAMILY mode=$MODE leg=$LEG_ID seed=$SEED ref=$GITREF"

          cat > /tmp/startup.sh <<SS
          #!/bin/bash
          exec > >(tee /var/log/tfep.log) 2>&1
          set +e
          # BULLETPROOF SELF-DELETE: a trap on EXIT deletes this VM on EVERY exit path — clean finish, NaN, a
          # set-e/pipefail bail, an idempotent-skip exit, or an env-build failure. The startup script runs the leg
          # SYNCHRONOUSLY in the foreground, so EXIT fires only once the leg is truly done — the trap can never kill
          # a still-running leg. This replaces the old "delete only on the happy path at the end" logic (a hard bail
          # before that line left the VM up, idle-billing + blocking the single-GPU quota until the 7h max-run). The
          # max-run-duration + the reap workflow (gcp-reap-vms.yml) are the remaining backstops if even this fails.
          _self_delete() {
            local _N _Z
            _N=\$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/name)
            _Z=\$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/zone | awk -F/ '{print \$NF}')
            echo "=== SELF-DELETE (trap on EXIT): deleting \$_N in \$_Z ==="
            gcloud compute instances delete "\$_N" --zone="\$_Z" --quiet || echo "self-delete no-op (already gone / no perm)"
          }
          trap _self_delete EXIT
          echo "=== TFEP boot \$(date -u) mode=$MODE leg=$LEG_ID seed=$SEED ==="
          for i in \$(seq 1 40); do nvidia-smi && break || { echo "waiting for GPU driver..."; sleep 10; }; done
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
          # env-cache (openfe + gemmi + pdbfixer + biopython for the SMARCA4->SMARCA2 staging); distinct key from
          # the RBFE lane. v2 = adds biopython (smarca2_model alignment) -> forces a one-time rebuild.
          ENV_KEY=\$(echo "$IMG_FAMILY|openfe1.12-am1bcc-gemmi-pdbfixer-biopython-cu126-v2" | sha256sum | cut -c1-16)
          ENV_CACHE="gs://$BUCKET/env-cache/ternary-\$ENV_KEY.tar"
          PY=/tmp/mf/envs/rbfe/bin/python
          USED_CACHE=0
          if gcloud storage cp "\$ENV_CACHE" /tmp/env.tar 2>/dev/null; then
            mkdir -p /tmp/mf/envs && tar -C /tmp/mf/envs -xf /tmp/env.tar 2>&1 | tail -1 && USED_CACHE=1; rm -f /tmp/env.tar
          fi
          if [ "\$USED_CACHE" = 1 ] && \$PY -c "import openfe, openmm, gemmi, rdkit, pdbfixer, Bio" 2>/dev/null; then
            echo "--- env-cache HIT ---"
          else
            echo "--- env-cache MISS -> Miniforge+mamba (~8-13 min) ---"
            curl -fsSL -o /tmp/mf.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
            bash /tmp/mf.sh -b -p /tmp/mf 2>&1 | tail -3
            /tmp/mf/bin/mamba create -y -p /tmp/mf/envs/rbfe -c conda-forge \
              python=3.11 "openfe>=1.12" "pydantic>=2" importlib_resources openff-toolkit \
              "ambertools>=23" openmmforcefields openff-nagl openff-nagl-models ocl-icd-system \
              cuda-version=12.6 rdkit lomap2 kartograf gemmi pdbfixer biopython numpy scipy pyyaml netcdf4 google-cloud-storage 2>&1 | tail -20
            if [ -x "\$PY" ] && \$PY -c "import openfe, openmm, gemmi, pdbfixer, Bio" 2>/dev/null; then
              ( cd /tmp/mf/envs && tar -cf - rbfe | gcloud storage cp - "\$ENV_CACHE" 2>&1 | tail -1 ) || echo "(env-cache upload failed; non-fatal)"
            fi
          fi
          [ -x "\$PY" ] || { echo "###TFEPRESULT### TFEP_RESULT status=ENVFAIL ###END###"; sleep 5; exit 0; }
          export PATH=/tmp/mf/envs/rbfe/bin:\$PATH
          echo "import: \$(\$PY -c 'import openfe,openmm,gemmi,rdkit;print(openfe.__version__)' 2>&1)"
          git clone --depth 1 --branch "$GITREF" https://github.com/trimcrae/Rare-cancers /tmp/repo 2>&1 | tail -2
          WORK=/tmp/repo/research/modalities
          IN=/tmp/ternary_in; OUT=/tmp/tout; mkdir -p \$OUT
          # idempotent cross-dispatch skip: a completed real leg already in GCS is not recomputed. The ternary
          # engine is now SPOT-SAFE (execute_hybrid_dag_spot_safe commits MD per-interval to the GCS CommitStore
          # below), so a preempted leg RESUMES from its last committed iteration on re-dispatch — a finished leg
          # is still kept via this skip.
          if [ "$MODE" = run ] && [ "$FORCE_RERUN" != 1 ] && gcloud storage ls $RESULTS/leg_${LEG_ID}_fwd_r${SEED}.json >/dev/null 2>&1; then
            echo "leg ${LEG_ID} seed $SEED already in GCS — idempotent skip"
            for k in \$(seq 1 6); do echo "###TFEPRESULT### TFEP_RESULT status=OK run leg=${LEG_ID} (idempotent-skip) ###END###"; sleep 3; done
            exit 0
          fi
          [ "$MODE" = run ] && [ "$FORCE_RERUN" = 1 ] && echo "force_rerun=1: bypassing idempotent-skip; a stale leg result (if any) will be overwritten"
          # STAGE CACHE (2026-07-18): staging (RCSB fetch + SMARCA4->SMARCA2 model + assembly) is ~15 min of CPU and
          # runs on every GPU VM before the engine — the last big un-skipped step in the preemption window. It is
          # deterministic per (leg, template, seed) [seed picks the SMARCA2 model: model_idx = seed % n_models], so
          # cache the staged tree to GCS and RESTORE it here. A CPU pre-bake (ternary-setup-prime-cpu.yml) or the
          # first GPU run populates it; every later run downloads it in seconds. Bump v1 if staging code changes.
          mkdir -p \$IN
          # NOTE the backslash escapes: \$STAGE_CACHE must be evaluated ON THE VM. Unescaped ($STAGE_CACHE) the
          # startup heredoc expanded it to EMPTY on the runner, so every restore/upload hit an empty path and the
          # cache silently never worked (every VM re-staged ~9 min with the GPU idle — a pure spot-cost leak).
          STAGE_CACHE="gs://$BUCKET/valB-6hax/stagecache/${LEG_ID}__${TEMPLATE_PDB}__seed${SEED}__v1.tar"
          if gcloud storage cp "\$STAGE_CACHE" /tmp/stage.tar 2>/dev/null && tar -C \$IN -xf /tmp/stage.tar 2>/dev/null; then
            rm -f /tmp/stage.tar
            echo "--- stage-cache HIT: restored \$(find \$IN -type f | wc -l) files (skipped ~15min RCSB+SMARCA2-model staging) ---"
          else
            echo "--- stage $LEG_ID from $TEMPLATE_PDB (stage-cache miss) ---"
            ( cd \$WORK && \$PY ternary_pdb_stage.py --leg-id "$LEG_ID" --template-pdb "$TEMPLATE_PDB" --out \$IN 2>&1 | tail -25 )
            # FILE-based upload + verify (the old 'tar -cf - . | gcloud storage cp -' stdin-stream broke with a
            # partial-write/broken-pipe and never created the object; setup-cache uses file uploads and works). The
            # VM's default compute SA can write the bucket, so this self-populates; later VMs then HIT and skip staging.
            if ( cd \$IN && tar -cf /tmp/stage.tar . ) && gcloud storage cp /tmp/stage.tar "\$STAGE_CACHE" && gcloud storage ls "\$STAGE_CACHE" >/dev/null 2>&1; then
              echo "--- stage-cache WRITTEN + verified: \$STAGE_CACHE ---"
            else
              echo "::warning::stage-cache upload/verify FAILED — next VM will re-stage"
            fi
            rm -f /tmp/stage.tar
          fi
          echo "staged tree:"; find \$IN -type f -printf '  %s B  %p\n' 2>/dev/null
          # v2 (2026-07-19): pre-equil output changed under reviewer conditions 1/2/3 — core-transplant endpoint
          # alignment, exact-FF conditioning, and per-seed independent snapshots. v1 caches (O3A overlay,
          # generator-default charges, shared snapshot) are STALE and must NOT be reused; the version bump
          # forces a clean regenerate per seed.
          PE_CACHE="gs://$BUCKET/valB-6hax/preequilcache/${LEG_ID}__${TEMPLATE_PDB}__seed${SEED}__v2.tar"

          # ===== mode=preequil: plain-MD relax the physical complex -> preequilcache (fixes the softcore warmup NaN) =====
          if [ "$MODE" = preequil ]; then
            echo "--- PRE-EQUIL leg=$LEG_ID charge=$CHARGE_METHOD ns=$PE_NS smoke=$PE_SMOKE seed=$SEED (exact-FF, seeded per replicate) ---"
            ( cd \$WORK && env LEG_ID=$LEG_ID SEED=$SEED CHARGE_METHOD=$CHARGE_METHOD PREEQUIL_NS=$PE_NS PREEQUIL_SMOKE=$PE_SMOKE \
                PREEQUIL_EXACT_FF=1 OPENMM_PLATFORM=CUDA INPUT_DIR=\$IN OUTPUT_DIR=\$OUT \
                \$PY ternary_preequil.py 2>&1 ) | tee /tmp/tfep_run.log
            if [ -f \$OUT/$LEG_ID/preequil_marker.json ]; then
              if [ "$PE_SMOKE" = 1 ]; then
                LINE="TFEP_RESULT status=OK preequil-smoke leg=$LEG_ID (system built + parameterized + relaxed OK; not cached)"
              elif ( cd \$OUT/$LEG_ID && tar -cf /tmp/pe.tar complex.pdb ligands.sdf preequil_marker.json ) \
                   && gcloud storage cp /tmp/pe.tar "\$PE_CACHE" && gcloud storage ls "\$PE_CACHE" >/dev/null 2>&1; then
                LINE="TFEP_RESULT status=OK preequil leg=$LEG_ID cached -> \$PE_CACHE"
              else
                LINE="TFEP_RESULT status=NORESULT preequil leg=$LEG_ID (relaxed but cache upload failed)"
              fi
            else
              LINE="TFEP_RESULT status=NORESULT preequil leg=$LEG_ID tail=\$(grep -iE 'error|abort|Traceback|ABORT' /tmp/tfep_run.log | tail -1 | cut -c1-140)"
            fi
            for k in \$(seq 1 6); do echo "###TFEPRESULT### \$LINE ###END###"; sleep 3; done
            echo "=== PREEQUIL-DONE \$LINE ==="
            exit 0    # EXIT trap self-deletes the VM
          fi

          # ===== use_preequil: overlay the relaxed complex.pdb/ligands.sdf over the raw staged tree (mode=run/endpoint_smoke) =====
          SETUP_VER=v1
          if [ "$USE_PE" = 1 ] && { [ "$MODE" = run ] || [ "$MODE" = endpoint_smoke ]; }; then
            RAW=\$(dirname \$(find \$IN -name complex.pdb | head -1) 2>/dev/null)
            if [ -n "\$RAW" ] && gcloud storage cp "\$PE_CACHE" /tmp/pe.tar 2>/dev/null && tar -C "\$RAW" -xf /tmp/pe.tar 2>/dev/null; then
              SETUP_VER=v2pe   # v2pe: setup built from the v2 (transplant + exact-FF + seeded) pre-equil; v1pe is stale
              echo "--- USE_PREEQUIL: overlaid relaxed complex.pdb/ligands.sdf from \$PE_CACHE into \$RAW; setup cache ver -> \$SETUP_VER ---"
            else
              echo "::error::use_preequil=1 but no preequilcache at \$PE_CACHE (run mode=preequil first)"; exit 1
            fi
          fi

          # ===== mode=endpoint_smoke: EXACT-Hamiltonian physical-endpoint stability test (reviewer condition 2/3, step 3) =====
          if [ "$MODE" = endpoint_smoke ]; then
            echo "--- ENDPOINT-SMOKE leg=$LEG_ID charge=$CHARGE_METHOD (use_preequil=$USE_PE, setup_ver=\$SETUP_VER) ---"
            ( cd \$WORK && env MODE=endpoint_smoke LEG_ID=$LEG_ID SEED=$SEED CHARGE_METHOD=$CHARGE_METHOD \
                OPENMM_PLATFORM=CUDA OPENMM_REQUIRE_CUDA=1 INPUT_DIR=\$IN OUTPUT_DIR=\$OUT CKPT_DIR=\$OUT \
                ENDPOINT_SMOKE_STEPS=\${ENDPOINT_SMOKE_STEPS:-25000} \
                \$PY nr4a3_ternary_fep.py 2>&1 ) | tee /tmp/tfep_run.log
            ESJ=\$OUT/endpoint_stability_${LEG_ID}.json
            if [ -f \$ESJ ]; then
              LINE=\$(\$PY -c "import json;d=json.load(open('\$ESJ'));print('TFEP_RESULT status=OK endpoint_smoke leg=%s all_stable=%s eps=%s'%(d.get('leg_id'),d.get('all_endpoints_stable'),list(d.get('endpoints',{}).keys())))")
              gcloud storage cp \$ESJ $RESULTS/ 2>&1 | tail -1 || true
            else
              LINE="TFEP_RESULT status=NORESULT endpoint_smoke leg=$LEG_ID tail=\$(grep -iE 'error|abort|Traceback|ABORT|NaN' /tmp/tfep_run.log | tail -1 | cut -c1-140)"
              gcloud storage cp /tmp/tfep_run.log "gs://$BUCKET/valB-6hax/postmortem/endpoint_${LEG_ID}_\$(date +%s).log" 2>/dev/null || true
            fi
            for k in \$(seq 1 6); do echo "###TFEPRESULT### \$LINE ###END###"; sleep 3; done
            echo "=== ENDPOINT-SMOKE-DONE \$LINE ==="
            exit 0    # EXIT trap self-deletes the VM
          fi

          TMODE=smoke; [ "$MODE" = run ] && TMODE=run
          # SPOT-SAFE commit store (mode=run only): the MultiState sampling commits per-interval to this versioned
          # GCS prefix so a re-dispatch on a fresh VM RESUMES from the last committed iteration instead of from
          # zero. Keyed by leg+seed+TIMESTEP: MD checkpoints are timestep-specific (OpenFE refuses to resume a
          # checkpoint whose protocol timestep differs — "Sampler in checkpoint does not match Protocol settings"),
          # so a dt change must use a FRESH prefix. This makes changing the timestep automatically start clean
          # (no wipe needed — the runner's gpu-runner@ SA can't delete GCS anyway), the old-dt commits just sit
          # unused. (The setup-cache is NOT dt-keyed: the built System is identical across timesteps.)
          COMMIT_ENV=""
          if [ "\$TMODE" = run ]; then
            COMMIT_ENV="RBFE_SPOT_COMMIT_GCS=gs://$BUCKET/valB-6hax/commits/$LEG_ID/${SEED}_dt${TIMESTEP_FS}fs_clig${CONSTRAIN_LIG}_wu${WARMUP_TS}${SALT:+_$SALT} RBFE_WARMUP_CKPT_ITERS=8 RBFE_PROD_CKPT_ITERS=20 RBFE_SETUP_CACHE_GCS=gs://$BUCKET/valB-6hax/setupcache"
            echo "spot-safe commit store: gs://$BUCKET/valB-6hax/commits/$LEG_ID/$SEED"
          fi
          echo "--- ternary-FEP TMODE=\$TMODE leg=$LEG_ID seed=$SEED ---"
          ( cd \$WORK && env MODE=\$TMODE LEG_ID=$LEG_ID SEED=$SEED DIRECTION=fwd N_WINDOWS=$NWIN \
              CHARGE_METHOD=$CHARGE_METHOD RBFE_TIMESTEP_FS=$TIMESTEP_FS RBFE_CONSTRAIN_LIGAND_CH=$CONSTRAIN_LIG RBFE_WARMUP_TIMESTEP_FS=$WARMUP_TS \
              RBFE_WARMUP_ITERS=$WARMUP_ITERS RBFE_PROD_ITERS=$PROD_ITERS RBFE_REQUIRE_PRIMED_SETUP=$REQUIRE_PRIMED RBFE_MIN_STEPS=$MIN_STEPS SETUP_CACHE_VERSION=\$SETUP_VER \
              RBFE_AUTOSTOP_CONVERGENCE=$AUTOSTOP RBFE_AUTOSTOP_MIN_FRAC=$AUTOSTOP_MIN_FRAC \
              OPENMM_REQUIRE_CUDA=1 INPUT_DIR=\$IN OUTPUT_DIR=\$OUT CKPT_DIR=\$OUT \$COMMIT_ENV \
              \$PY nr4a3_ternary_fep.py 2>&1 ) | tee /tmp/tfep_run.log
          # scrape a result + persist
          if [ "\$TMODE" = smoke ] && [ -f \$OUT/smoke.json ]; then
            LINE=\$(\$PY -c "import json;d=json.load(open('\$OUT/smoke.json'));print('TFEP_RESULT status=OK smoke leg=%s env=%s mapped=%s has_protein=%s endpoints=%s->%s match=%s units=%s'%(d.get('leg'),d.get('environment'),d.get('n_mapped_atoms'),d.get('has_protein'),d.get('endpoint_a'),d.get('endpoint_b'),d.get('endpoints_match_requested'),d.get('n_protocol_units')))")
            gcloud storage cp \$OUT/smoke.json $RESULTS/smoke_$LEG_ID.json 2>&1 | tail -1 || true
          elif ls \$OUT/leg_${LEG_ID}_*.json >/dev/null 2>&1; then
            LJ=\$(ls \$OUT/leg_${LEG_ID}_*.json | head -1)
            LINE=\$(\$PY -c "import json;d=json.load(open('\$LJ'));print('TFEP_RESULT status=OK run leg=%s dg_morph=%.3f se=%.3f'%(d.get('leg_id'),d.get('dg_morph_kcal',0),d.get('mbar_se_kcal',0)))")
            gcloud storage cp \$LJ $RESULTS/ 2>&1 | tail -1 || true
          else
            LINE="TFEP_RESULT status=NORESULT leg=$LEG_ID tail=\$(grep -iE 'error|abort|Traceback|missing' /tmp/tfep_run.log | tail -1 | cut -c1-140)"
          fi
          for k in \$(seq 1 6); do echo "###TFEPRESULT### \$LINE ###END###"; sleep 3; done
          echo "=== TFEP-DONE \$LINE ==="
          # On NORESULT, preserve the post-mortem log off-VM (GCS) BEFORE the EXIT trap deletes the instance — the
          # serial is already streamed to the GH poller, but the full run log is only on the VM. The actual VM
          # deletion is now owned by the _self_delete EXIT trap installed at the top, so it happens on EVERY exit
          # path (including a bail before this point), not just here.
          case "\$LINE" in
            *status=OK*) echo "result in GCS; EXIT trap will delete the VM (avoid idle billing)" ;;
            *) echo "NORESULT: uploading post-mortem log to GCS before the EXIT trap deletes the VM"
               gcloud storage cp /tmp/tfep_run.log "gs://$BUCKET/valB-6hax/postmortem/${LEG_ID}_seed${SEED}_\$(date +%s).log" 2>/dev/null || echo "log upload no-op" ;;
          esac
          SS

          # SETUP (openff interchange parameterizing the 146k-atom ternary) is CPU+RAM-bound. g2-standard-4
          # (4 vCPU / 16 GB) ran it ~4x slower (~30 min vs ~8 min) than g2-standard-8 (8 vCPU / 32 GB) — 16 GB
          # is marginal for this system and swaps — and that long setup window is what spot kept preempting.
          # Pin to >=8 vCPU / 32 GB (all still exactly 1x L4, same GPU cost); list a few sizes for spot capacity.
          MACHINES="g2-standard-8 g2-standard-12 g2-standard-16"
          ZONES="us-central1-a us-central1-b us-central1-c us-central1-f"
          # Provisioning model: SPOT by default (standing rule: wait out capacity). 'standard' = on-demand, used
          # ONLY when explicitly authorized for a time-sensitive one-off (skips the spot-capacity wait). On-demand
          # cannot use --instance-termination-action (spot-only), and needs no long capacity-wait, so fewer rounds.
          if [ "$PROVISIONING" = standard ]; then
            PROV_FLAGS="--provisioning-model=STANDARD"; PROV_ROUNDS=4
            echo "PROVISIONING=standard (ON-DEMAND — authorized one-off; skips spot-capacity wait)"
          else
            PROV_FLAGS="--provisioning-model=SPOT --instance-termination-action=DELETE"; PROV_ROUNDS=22
          fi
          provision() {
            local round M Z
            for round in $(seq 1 $PROV_ROUNDS); do   # spot: ~55 min capacity-probe (wait it out); on-demand: fail fast on quota
              for M in $MACHINES; do
                for Z in $ZONES; do
                  if gcloud compute instances create "$VM" \
                      --zone="$Z" --machine-type="$M" \
                      $PROV_FLAGS \
                      --max-run-duration=25200s --maintenance-policy=TERMINATE --no-restart-on-failure \
                      --scopes=cloud-platform --image-family="$IMG_FAMILY" --image-project=deeplearning-platform-release \
                      --boot-disk-size=100GB --metadata-from-file=startup-script=/tmp/startup.sh 2>/tmp/cerr; then
                    ZONE="$Z"; echo "ZONE=$Z" >> "$GITHUB_ENV"; echo "provisioned $M in $Z (round $round)"; return 0
                  fi
                  grep -iqE "quota|exceeded" /tmp/cerr && { echo "::error::QUOTA for $M in $Z:"; grep -iE "quota|exceeded" /tmp/cerr | head -1; }
                done
              done
              echo "round $round: L4 Spot stocked out; waiting 120s…"; sleep 120
            done
            return 1
          }
          vm_alive() {
            local st; st=$(gcloud compute instances describe "$VM" --zone="$ZONE" --format="value(status)" 2>/dev/null || echo GONE)
            case "$st" in RUNNING|PROVISIONING|STAGING|REPAIRING) return 0 ;; *) echo "  VM status=$st"; return 1 ;; esac
          }

          # DETACHED launcher (default for mode=run — real legs are multi-hour, past the 90-min GH job): provision
          # ONCE and EXIT; the VM runs independently (7h max-run backstop), streams to serial, writes the leg JSON
          # to GCS results/ on completion. Monitor with gpu-rbfe-gcp-tail (vm=gcp-ternary-<runid>); re-dispatch to
          # resume (idempotent GCS skip above). Teardown is skipped so the VM keeps running.
          DO_DETACH="$DETACH"; [ "$MODE" = run ] && DO_DETACH=1
          if [ "$DO_DETACH" = 1 ]; then
            # FAILOVER GUARD: refuse to provision while another ternary VM is alive, so an on-demand RESUME poll can
            # never double-write the commit prefix a live spot VM owns. Only provisions once the GPU is genuinely
            # free (spot killed). Independent of the GPU quota — a belt to the quota's suspenders.
            if [ "${REFUSE_IF_LIVE:-0}" = 1 ]; then
              LIVE=$(gcloud compute instances list --filter="name~'^gcp-ternary-' AND (status=RUNNING OR status=PROVISIONING OR status=STAGING OR status=REPAIRING)" --format="value(name)" 2>/dev/null | head -3 | tr '\n' ' ')
              if [ -n "$LIVE" ]; then
                echo "refuse_if_vm_live=1 and a ternary VM is already alive ($LIVE) — no-op (the running leg still owns the checkpoint; will resume only once it's gone)"
                exit 0
              fi
              echo "refuse_if_vm_live=1: no live ternary VM -> safe to provision an on-demand resume of the same-salt checkpoint"
            fi
            provision || { echo "::error::no L4 Spot capacity — re-dispatch later (idempotent GCS skip)"; exit 1; }
            echo "DETACHED=1" >> "$GITHUB_ENV"
            echo "DETACHED: $VM launched in $ZONE (7h backstop). Result -> $RESULTS/. Monitor: gpu-rbfe-gcp-tail vm=$VM. This job EXITS now."
            exit 0
          fi

          MAX_ATTEMPTS=1; [ "$SPOT_SAFE" = 1 ] && MAX_ATTEMPTS=3
          POLL_ITERS=90; [ "$MODE" = run ] && POLL_ITERS=680
          RES=""; OUT=""
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if ! vm_alive 2>/dev/null; then
              echo "--- attempt $attempt/$MAX_ATTEMPTS: provisioning $VM ---"
              provision || { echo "::error::no L4 Spot capacity after wait-out budget"; exit 1; }
            fi
            for i in $(seq 1 $POLL_ITERS); do
              OUT=$(gcloud compute instances get-serial-port-output "$VM" --zone="$ZONE" 2>/dev/null || true)
              RES=$(printf '%s' "$OUT" | grep -oE '###TFEPRESULT### .* ###END###' | tail -1 | sed -E 's/^###TFEPRESULT### //; s/ ###END###$//' || true)
              [ -n "$RES" ] && break
              if ! vm_alive; then echo "  VM gone (preempted) attempt $attempt after ~$((i*30))s"; break; fi
              sleep 30
            done
            [ -n "$RES" ] && break
          done
          echo "--- VM serial (filtered tail) ---"
          printf '%s' "$OUT" | grep -aE "import:|nvidia-smi|TFEPRESULT|openfe|OpenMM|mapped|SMOKE|stage|staged|assembly|hybrid|error|Error|Traceback|ABORT|missing" | tail -90 || true
          if [ -z "$RES" ]; then
            echo "::warning::no result marker — serial tail 200:"; printf '%s' "$OUT" | tail -200 || true
            echo "::error::ternary-FEP produced no result"; exit 1
          fi
          echo "RESULT_LINE=$RES" >> "$GITHUB_ENV"
          echo "TFEP RESULT: $RES"

      - name: Teardown (skip for detached — the VM must keep running)
        if: ${{ always() && github.event.inputs.mode != 'tail' }}
        run: |
          if [ "${DETACHED:-0}" = 1 ]; then echo "detached — leaving $VM up (7h max-run backstop; tail deletes when done)"; exit 0; fi
          if [ -n "$VM" ] && [ -n "$PROJECT" ]; then
            gcloud compute instances delete "$VM" --zone="$ZONE" --quiet 2>/dev/null && echo "deleted $VM" || echo "delete no-op"
          fi
      - name: Result summary
        if: ${{ always() && github.event.inputs.mode != 'tail' }}
        run: |
          echo "mode=$MODE leg=$LEG_ID"
          if [ "${DETACHED:-0}" = 1 ]; then echo "🚀 DETACHED: $VM running the leg independently -> GCS; monitor via gpu-rbfe-gcp-tail vm=$VM"; exit 0; fi
          echo "RESULT: ${RESULT_LINE:-<none>}"
          case "${RESULT_LINE:-}" in
            *status=OK*smoke*)          echo "✅ ternary assembly+map+hybrid-topology built on GCP L4 — valB_mini plumbing PROVEN" ;;
            *status=OK*preequil*)       echo "✅ pre-equilibration (exact-FF conditioner + core-transplant endpoints) relaxed + cached" ;;
            *status=OK*endpoint_smoke*) echo "✅ exact-Hamiltonian physical-endpoint stability test ran (see all_stable in the result line)" ;;
            *status=OK*run*)            echo "✅ ternary FEP leg ran end-to-end on GCP L4" ;;
            *ENVFAIL*)                  echo "❌ openfe/gemmi env build failed on the VM" ;;
            *) echo "⚠️ no clean OK result — see serial tail above" ;;
          esac
