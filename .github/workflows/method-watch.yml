name: Method-watch

# Periodic digest of the in-silico capabilities we are waiting on (virtual-cell /
# perturbation prediction, AF3-class ternary modelling, de-novo binder design, cryptic
# pockets, and in-silico oligo/nanoparticle tumour-DELIVERY prediction, + direct NR4A3
# advances). Runs scripts/method-watch.mjs and publishes the dated digest to the
# `method-watch-cache` branch. Read it with:
#   git fetch origin method-watch-cache
#   git show origin/method-watch-cache:research/method-watch-digest.md
# The watch config + capability->action trigger table is tracked at research/method-watch.md.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "send (generate digest + email) | dry_run (generate + publish digest, no email — used by the summary-writer Routine)"
        default: "send"
        required: false
  schedule:
    - cron: "0 11 * * 5"   # 11:00 UTC Fridays = 7:00 AM ET (weekly newsletter; UTC-based, no DST tracking)

permissions:
  contents: write

concurrency:
  group: method-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate method-watch digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/method-watch.mjs research/method-watch-digest.md

      # Pick up a Claude-written newsletter summary (the "LLM filter") if a scheduled Claude session
      # committed a fresh one to email-outbox. Weekly cadence, so accept up to ~2 days old. Mirrors the
      # daily email's "Pick up today's Claude-written summary" step.
      - name: Pick up Claude-written newsletter summary (from email-outbox, if fresh)
        id: sum
        run: |
          git fetch origin email-outbox --depth=1 2>/dev/null || true
          if git cat-file -e origin/email-outbox:newsletter-summary.md 2>/dev/null; then
            last=$(git log -1 --format=%cI origin/email-outbox -- newsletter-summary.md 2>/dev/null || echo "")
            now=$(date -u +%s)
            lastsec=$(date -u -d "$last" +%s 2>/dev/null || echo 0)
            age_days=$(( (now - lastsec) / 86400 ))
            if [ "$lastsec" -gt 0 ] && [ "$age_days" -le 2 ]; then
              git show origin/email-outbox:newsletter-summary.md > "$RUNNER_TEMP/newsletter-summary.md"
              echo "Using Claude-written newsletter summary from email-outbox (age ${age_days}d)."
              echo "file=$RUNNER_TEMP/newsletter-summary.md" >> "$GITHUB_OUTPUT"
            else
              echo "email-outbox newsletter summary is stale (age ${age_days}d); using generated summary."
            fi
          else
            echo "No email-outbox newsletter summary; using generated summary."
          fi

      - name: Email the digest (bite-sized summary + full digest)
        if: ${{ vars.NEWSLETTER_EMAIL != 'off' && (github.event_name == 'schedule' || inputs.mode != 'dry_run') }}
        env:
          DIGEST_FILE: research/method-watch-digest.md
          DIGEST_TITLE: "Method-watch newsletter"
          SUMMARY_OVERRIDE_FILE: ${{ steps.sum.outputs.file }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          pip install boto3 >/dev/null 2>&1 || true
          python3 research/modalities/email_digest.py

      - name: Publish digest to method-watch-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/method-watch-digest.md "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin method-watch-cache || true
          rm -f research/method-watch-digest.md
          if git show-ref --verify --quiet refs/remotes/origin/method-watch-cache; then
            git checkout -B method-watch-cache origin/method-watch-cache
          else
            git checkout --orphan method-watch-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research
          cp "$RUNNER_TEMP/res/method-watch-digest.md" research/ 2>/dev/null || true
          git add research/method-watch-digest.md
          git commit -m "Method-watch digest $(date -u +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          git push origin method-watch-cache
