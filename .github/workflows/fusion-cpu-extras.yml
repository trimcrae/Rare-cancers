name: Fusion CPU extras (IDR/LLPS features + junction siRNA)

# Two internet-needing, CPU-only analyses the dev sandbox can't run (it blocks UniProt/NCBI):
#   1. fusion_idr_features.py  — sequence-based LLPS/low-complexity descriptors of the EWS/TAF15
#      LC domains vs folded + non-prion controls (condensate paper's deferred first-party step)
#   2. junction_sirna.py       — junction-spanning siRNA designs (GC-tolerant alternative to the
#      GC-rich gapmers; ASO paper)
# Pure stdlib (urllib only); no pip, no AWS/GPU. Results pushed to the `modalities-cache` branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/

on:
  workflow_dispatch:
    inputs:
      task:
        description: "which task to run"
        type: choice
        options: [fusion, vast_smoke, nrv04_cys, nrv04_md_smoke, nrv04_build_smoke, nrv04_build_env, nrv04_charge_cache, nrv04_ffcache_status, nrv04_bake, fep_bake, nrv04_vast_launch, bioemu_bake, bioemu_run, bioemu_collect]
        default: fusion
      vast_launch:
        description: "vast_smoke only: actually rent+destroy a GPU (spends a few cents)"
        type: boolean
        default: false
      vast_launch_mode:
        description: "nrv04_vast_launch: discover | stage_test | collect | monitor | diag | stop_all | dry | pilot | full | probe_offers | bench | bench_collect"
        type: choice
        options: [discover, stage_test, collect, monitor, diag, stop_all, dry, pilot, full, probe_offers, bench, bench_collect, firm, firm_collect, firm_stop]
        default: discover
      vast_ckpt_bucket:
        description: "nrv04_vast_launch: reused S3 bucket holding the co-fold outputs + checkpoints"
        default: "sagemaker-us-east-2-646605541856"
      cofold_prefix:
        description: "nrv04_vast_launch: S3 prefix of the EXISTING NR-V04 co-fold to reuse (ValB output)"
        default: "nrv04-descriptive-v3"
      md_mode:
        description: "nrv04_vast_launch pilot/full: smoke (minimize+500 steps, cents) | run (5ns, priced)"
        type: choice
        options: [smoke, run]
        default: smoke
      vast_image:
        description: "nrv04_vast_launch: override the Vast boot image (blank = launcher default = baked image)"
        default: ""
      vast_gpu:
        description: "nrv04_vast_launch pilot: GPU model override (blank=rtx3090; e.g. rtx8000/rtx4090 for a $/ns bench)"
        default: ""
      pilot_seed:
        description: "nrv04_vast_launch pilot: which seed of cov_nr4a1 to run (distinguishes parallel bench runs)"
        default: "0"
      bench_edge_nm:
        description: "bench mode: TIP3P box edge (nm). 7.1≈36k atoms (RBFE leg); 9.5≈86k (ternary); 16.5≈460k (covalent)"
        default: "7.1"
      bench_steps:
        description: "bench mode: timed production steps (4000≈16ps @4fs; enough for a stable ns/day)"
        default: "4000"
      bench_grid:
        description: "bench mode: comma-sep gpu:edge_nm pairs to launch in ONE dispatch (e.g. rtx4090:9.5,rtx3090:9.5). Blank = single leg from vast_gpu+bench_edge_nm"
        default: ""
      firm_kind:
        description: "firm mode: which real alchemical edge(s) to run on the nr4a3fep 4090 image — rbfe | ternary | rbfe,ternary"
        default: "rbfe,ternary"
      firm_n_iter:
        description: "firm mode: MBAR iterations per window (short = fast throughput read; blank = per-kind default 150/120)"
        default: ""
      bioemu_num_samples:
        description: "bioemu_run: number of BioEmu samples (blank = 200 real / 5 smoke). Uses md_mode: run=real NR4A3, smoke=chignolin plumbing"
        default: ""
      bioemu_batch:
        description: "bioemu_run: BioEmu batch_size_100 (lower if the 24GB 4090 OOMs; blank = default)"
        default: ""

permissions:
  contents: write

# Per-TASK concurrency so independent tasks (e.g. nrv04_build_env + nrv04_charge_cache) run in PARALLEL instead
# of cancelling each other — a plain `fusion-cpu-extras` group would serialize every dispatch of this workflow.
concurrency:
  # Include vast_launch_mode so a bench / bench_collect dispatch is NOT cancelled by a (possibly cross-session)
  # covalent collect/monitor/full dispatch of the same task — they share task=nrv04_vast_launch and, with a
  # task-only group + cancel-in-progress, kept killing each other. Mode-scoped groups keep same-mode dedupe.
  group: fusion-cpu-extras-${{ github.event.inputs.task }}-${{ github.event.inputs.vast_launch_mode }}
  cancel-in-progress: true

jobs:
  vast_smoke:
    if: ${{ github.event.inputs.task == 'vast_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      VAST_SMOKE_LAUNCH: ${{ github.event.inputs.vast_launch == 'true' && '1' || '0' }}
      VAST_SMOKE_DUMP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Vast.ai adapter smoke (auth + offer search; opt-in rent+destroy)
        run: python research/compute/vast_smoke.py

  nrv04_cys:
    if: ${{ github.event.inputs.task == 'nrv04_cys' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: NR-V04 covalent Leg 0 — celastrol-Cys551 conservation across NR4A1/2/3 (UniProt)
        working-directory: research/modalities
        run: python nrv04_cys_conservation.py
      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp research/modalities/nrv04-cys-conservation.json "$RUNNER_TEMP/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache; git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP/nrv04-cys-conservation.json" research/modalities/ 2>/dev/null || true
          git add research/modalities/nrv04-cys-conservation.json 2>/dev/null || true
          git commit -m "NR-V04 Leg 0: celastrol-Cys551 conservation across NR4A1/2/3" || { echo "no changes"; exit 0; }
          git push origin modalities-cache

  nrv04_md_smoke:
    if: ${{ github.event.inputs.task == 'nrv04_md_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + rdkit + gemmi)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy
          condarc: |
            channels:
              - conda-forge
      - name: NR-V04 MD-env + celastrol-param + restraint mechanics smoke (vacuum, CPU)
        working-directory: research/modalities
        run: python nrv04_md_env_smoke.py

  nrv04_build_env:
    # Build the MD conda env ONCE, conda-pack it, cache in S3 (mdenv/nrv04md.tar.gz). Vast instances then
    # extract this in ~1-2 min instead of each solving the ~25-min conda create (the diagnosed boot bottleneck).
    if: ${{ github.event.inputs.task == 'nrv04_build_env' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      # Target CUDA 12.6 so the solver picks CUDA-12 openmm/pytorch builds (PTX runs on all >=12.6 host drivers).
      # The unpinned/CUDA-13 openmm PTX-crashed on every Vast host. This virtual-package override is the reliable
      # mechanism (a `cuda-version=…` spec did not resolve in micromamba).
      CONDA_OVERRIDE_CUDA: "12.6"
    steps:
      - uses: actions/checkout@v4
      - name: Build the MD env (same stack as the Vast job + the CPU smoke)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 awscli pdbfixer openff-nagl openff-nagl-models
          condarc: |
            channels:
              - conda-forge
      - name: Ensure pdbfixer + openff-nagl are really in the env (setup-micromamba can restore a stale cache)
        run: |
          set -eo pipefail
          # The env step has restored stale caches (77s) that predated new packages -> the packed tarball lacked
          # them and the baked image crashed every leg. Verify the imports the driver uses; install if stale.
          # NB: pdbfixer exposes no __version__ — probe the real import (from pdbfixer import PDBFixer).
          micromamba run -n nrv04md python -c "from pdbfixer import PDBFixer" \
            || micromamba install -n nrv04md -y -c conda-forge pdbfixer
          # NAGL (ligand charges) — the driver imports the toolkit wrapper; the model package must be present too.
          micromamba run -n nrv04md python -c "from openff.toolkit.utils.nagl_wrapper import NAGLToolkitWrapper; import openff.nagl_models" \
            || micromamba install -n nrv04md -y -c conda-forge openff-nagl openff-nagl-models
          micromamba run -n nrv04md python -c "from pdbfixer import PDBFixer; from openff.toolkit.utils.nagl_wrapper import NAGLToolkitWrapper; import openff.nagl_models; print('pdbfixer + nagl import OK')"
      - name: conda-pack the env and upload to S3
        run: |
          set -eo pipefail
          python -m pip install -q conda-pack awscli
          ENV_PREFIX="$MAMBA_ROOT_PREFIX/envs/nrv04md"
          [ -d "$ENV_PREFIX" ] || ENV_PREFIX=$(micromamba env list | awk '/nrv04md/{print $NF; exit}')
          echo "packing $ENV_PREFIX"
          conda-pack -p "$ENV_PREFIX" -o nrv04md.tar.gz --format tar.gz --n-threads -1 --ignore-missing-files
          ls -lh nrv04md.tar.gz
          aws s3 cp nrv04md.tar.gz "s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz"
          echo "uploaded s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz"

  nrv04_charge_cache:
    # Pre-compute AM1-BCC charges for the 3 distinct panel ligands ONCE (free CPU) and upload the shared
    # openmmforcefields cache to s3://.../nrv04-ffcache/ffcache.json, so no GPU leg pays the ~40-min single-core
    # sqm charge of the 166-atom recruiter (root-caused from build_smoke #2). Generous timeout: ~40 min each for
    # nrv04 + nrv04_epimer, plus a few for celastrol; the cache checkpoints to S3 after each ligand (resumable).
    if: ${{ github.event.inputs.task == 'nrv04_charge_cache' }}
    runs-on: ubuntu-latest
    timeout-minutes: 210
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + ambertools + rdkit + boto3)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 pdbfixer
          condarc: |
            channels:
              - conda-forge
      - name: Charge the distinct panel ligands once and cache to S3 (CPU, no GPU)
        working-directory: research/modalities
        run: python nrv04_charge_cache.py

  nrv04_build_smoke:
    # FREE CPU validation: build the full solvated OpenMM system from the REAL co-fold (PDBFixer prep ->
    # addSolvent -> createSystem -> covalent restraint). Catches the missing-hydrogens/capping class of bug that
    # crashed every leg, before any GPU spend. Loads the pre-computed FF charge cache from S3 so it also VALIDATES
    # that the cache eliminates the ~40-min sqm charge (build now finishes in ~1-2 min). No Vast.
    if: ${{ github.event.inputs.task == 'nrv04_build_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      NRV04_COFOLD_PREFIX: ${{ github.event.inputs.cofold_prefix }}
      CONDA_OVERRIDE_CUDA: "12.6"   # match build_env: CUDA-12 builds so this CPU validation mirrors the Vast env
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + rdkit + gemmi + boto3 + nagl)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 pdbfixer openff-nagl openff-nagl-models
          condarc: |
            channels:
              - conda-forge
      - name: Build the full solvated system from the real co-fold (CPU, no MD; NAGL charges — no sqm)
        working-directory: research/modalities
        run: python nrv04_build_smoke.py

  nrv04_ffcache_status:
    # Fast diagnostic (~30s): print the ffcache object's LastModified + size so we can tell whether charge_cache
    # is progressing (recent mtime = a ligand just finished) or hung on one ligand's sqm (stale mtime).
    if: ${{ github.event.inputs.task == 'nrv04_ffcache_status' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
    steps:
      - name: Head the ffcache object + list the prefix
        run: |
          python3 -m pip install -q awscli >/dev/null 2>&1 || pip install -q awscli >/dev/null 2>&1 || true
          echo "=== s3://${VAST_CKPT_BUCKET}/nrv04-ffcache/ ==="
          aws s3 ls "s3://${VAST_CKPT_BUCKET}/nrv04-ffcache/" --recursive --human-readable || echo "(empty/none)"
          echo "=== head-object ffcache.json ==="
          aws s3api head-object --bucket "${VAST_CKPT_BUCKET}" --key nrv04-ffcache/ffcache.json \
            --query '{LastModified:LastModified,SizeBytes:ContentLength}' --output json || echo "(no ffcache.json yet)"

  fep_bake:
    # Prebake the OpenFE ("rbfe") env into a Vast boot image -> Docker Hub (triskit23/nr4a3fep:latest). This is
    # the enabler for running nr4a3_rbfe.py (step1 RBFE) + nr4a3_ternary_fep.py (valB/retrospective/matrix) on
    # Vast: the nrv04vast image has the covalent MD env only (OpenMM, no OpenFE). Build env -> conda-pack ->
    # docker build (Dockerfile.nr4a3fep) -> push, in one job (no S3 round-trip). Make the Docker Hub repo PUBLIC.
    if: ${{ github.event.inputs.task == 'fep_bake' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    defaults:
      run:
        shell: bash -el {0}
    env:
      DOCKERHUB_USER: triskit23
      # Force CUDA-12 openmm builds (PTX runs on all >=12.6 host drivers) — mirrors nrv04_build_env; a CUDA-13
      # openmm PTX-crashed on every Vast host.
      CONDA_OVERRIDE_CUDA: "12.6"
    steps:
      - uses: actions/checkout@v4
      - name: Reclaim runner disk (image + env are multi-GB)
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: Build the OpenFE (rbfe) conda env
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: research/modalities/sagemaker_src/environment-rbfe.yml
          environment-name: rbfe
      - name: Verify openfe + openmm + ambertools import (the point of the image)
        run: |
          set -eo pipefail
          micromamba run -n rbfe python -c "import openfe; from openfe.protocols import openmm_rfe; print('openfe', openfe.__version__)"
          micromamba run -n rbfe python -c "import openmm; print('openmm', openmm.version.version)"
          micromamba run -n rbfe python -c "import openff.toolkit, rdkit, lomap, kartograf; print('mapping stack OK')"
          micromamba run -n rbfe bash -lc "command -v antechamber >/dev/null && command -v sqm >/dev/null && echo 'ambertools (am1bcc) OK'"
      - name: conda-pack the env into the Docker build context
        run: |
          set -eo pipefail
          python -m pip install -q conda-pack
          ENV_PREFIX="$MAMBA_ROOT_PREFIX/envs/rbfe"
          [ -d "$ENV_PREFIX" ] || ENV_PREFIX=$(micromamba env list | awk '/rbfe/{print $NF; exit}')
          echo "packing $ENV_PREFIX"
          conda-pack -p "$ENV_PREFIX" -o research/compute/rbfe.tar.gz --format tar.gz --n-threads -1 --ignore-missing-files
          ls -lh research/compute/rbfe.tar.gz
      - name: Log in to Docker Hub
        shell: bash
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - name: Build + push the OpenFE Vast image
        shell: bash
        run: |
          set -eo pipefail
          IMG="docker.io/${DOCKERHUB_USER}/nr4a3fep:latest"
          docker build -f research/compute/Dockerfile.nr4a3fep -t "$IMG" research/compute/
          docker push "$IMG"
          echo "PUSHED $IMG — ensure the Docker Hub repo is PUBLIC so Vast pulls it unauthenticated."

  nrv04_bake:
    # Build the pre-provisioned Vast boot image (ssh/python/git/systemd + the MD conda env all baked, so Vast's
    # slow boot-time apt is a no-op) and push it to Docker Hub (public repo -> Vast pulls unauthenticated).
    if: ${{ github.event.inputs.task == 'nrv04_bake' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      DOCKERHUB_USER: triskit23
    steps:
      - uses: actions/checkout@v4
      - name: Fetch the pre-packed MD env from S3 into the build context
        run: |
          python3 -m pip install -q awscli >/dev/null 2>&1 || true
          aws s3 cp "s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz" research/compute/nrv04md.tar.gz
          ls -lh research/compute/nrv04md.tar.gz
      - name: Verify the env tarball contains pdbfixer AND openff-nagl (the point of the rebuild)
        run: |
          set -eo pipefail
          LIST=$(tar tzf research/compute/nrv04md.tar.gz)
          # grep -c reads all input -> no early-exit SIGPIPE that would false-fail under `pipefail` (the `grep -q`
          # form did exactly that and reported MISSING even though the package was present). Match a package dir
          # OR its dist-info/conda-meta record (path layout varies).
          check() {
            local name="$1" pat="$2"
            echo "--- $name paths (diagnostic) ---"; printf '%s\n' "$LIST" | grep -im 8 -E "$pat" || echo "(none)"
            local cnt; cnt=$(printf '%s\n' "$LIST" | grep -icE "$pat" || true)
            if [ "${cnt:-0}" -gt 0 ]; then echo "$name PRESENT ($cnt paths)"; else
              echo "::error::$name MISSING from nrv04md.tar.gz — re-run nrv04_build_env before baking."; exit 1; fi
          }
          check pdbfixer '/pdbfixer/|pdbfixer-[0-9].*(dist-info|\.json)'
          check openff-nagl '/openff/nagl/|openff.?nagl-[0-9].*(dist-info|\.json)|nagl_models'
          echo "tarball verified — baking."
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - name: Build + push the Vast boot image
        run: |
          set -eo pipefail
          IMG="docker.io/${DOCKERHUB_USER}/nrv04vast:latest"
          docker build -f research/compute/Dockerfile.nrv04vast -t "$IMG" research/compute/
          docker push "$IMG"
          echo "PUSHED $IMG (ensure the Docker Hub repo is PUBLIC so Vast can pull it unauthenticated)"

  nrv04_vast_launch:
    if: ${{ github.event.inputs.task == 'nrv04_vast_launch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      NRV04_COFOLD_PREFIX: ${{ github.event.inputs.cofold_prefix }}
      GIT_BRANCH: ${{ github.ref_name }}
      MODE: ${{ github.event.inputs.md_mode }}
      VAST_IMAGE: ${{ github.event.inputs.vast_image }}
      PILOT_ONLY: ${{ github.event.inputs.vast_launch_mode == 'full' && '0' || '1' }}
      DRY_RUN: ${{ github.event.inputs.vast_launch_mode == 'dry' && '1' || '0' }}
      DISCOVER: ${{ github.event.inputs.vast_launch_mode == 'discover' && '1' || '0' }}
      STAGE_TEST: ${{ github.event.inputs.vast_launch_mode == 'stage_test' && '1' || '0' }}
      COLLECT: ${{ github.event.inputs.vast_launch_mode == 'collect' && '1' || '0' }}
      MONITOR: ${{ github.event.inputs.vast_launch_mode == 'monitor' && '1' || '0' }}
      STOP_ALL: ${{ github.event.inputs.vast_launch_mode == 'stop_all' && '1' || '0' }}
      DIAG: ${{ github.event.inputs.vast_launch_mode == 'diag' && '1' || '0' }}
      PROBE_OFFERS: ${{ github.event.inputs.vast_launch_mode == 'probe_offers' && '1' || '0' }}
      BENCH: ${{ github.event.inputs.vast_launch_mode == 'bench' && '1' || '0' }}
      BENCH_COLLECT: ${{ github.event.inputs.vast_launch_mode == 'bench_collect' && '1' || '0' }}
      BENCH_EDGE_NM: ${{ github.event.inputs.bench_edge_nm }}
      BENCH_STEPS: ${{ github.event.inputs.bench_steps }}
      BENCH_GRID: ${{ github.event.inputs.bench_grid }}
      FIRM: ${{ github.event.inputs.vast_launch_mode == 'firm' && '1' || '0' }}
      FIRM_COLLECT: ${{ (github.event.inputs.vast_launch_mode == 'firm_collect' || github.event.inputs.vast_launch_mode == 'firm_stop') && '1' || '0' }}
      FIRM_STOP: ${{ github.event.inputs.vast_launch_mode == 'firm_stop' && '1' || '0' }}
      FIRM_STOP_KIND: ${{ github.event.inputs.firm_kind }}
      FIRM_KIND: ${{ github.event.inputs.firm_kind }}
      N_ITER: ${{ github.event.inputs.firm_n_iter }}
      VAST_GPU_MODEL: ${{ github.event.inputs.vast_gpu }}
      PILOT_SEED: ${{ github.event.inputs.pilot_seed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Launch NR-V04 covalent panel on Vast (discover/stage_test/dry/pilot/full)
        working-directory: research/modalities
        run: |
          set -o pipefail
          pip install -q boto3 >/dev/null 2>&1 || echo "boto3 install failed"
          if [ "${{ github.event.inputs.vast_launch_mode }}" = "stage_test" ]; then
            pip install -q gemmi rdkit >/dev/null 2>&1 || echo "gemmi/rdkit install failed"
          fi
          python nrv04_vast_launch.py
      - name: Upload Vast handles
        if: ${{ always() && (github.event.inputs.vast_launch_mode == 'pilot' || github.event.inputs.vast_launch_mode == 'full') }}
        uses: actions/upload-artifact@v4
        with:
          name: nrv04-vast-handles
          path: research/modalities/nrv04-vast-handles.json
          if-no-files-found: ignore

  run:
    if: ${{ github.event.inputs.task == 'fusion' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: IDR / LLPS sequence-feature analysis (UniProt)
        working-directory: research/modalities
        run: python fusion_idr_features.py || echo "idr-features failed (continuing)"

      - name: Junction-spanning siRNA design (NCBI)
        working-directory: research/modalities
        run: python junction_sirna.py || echo "sirna design failed (continuing)"

      - name: EMC cell-line data probe (Europe PMC IHC markers + GEO/SRA deposited data)
        working-directory: research/modalities
        run: python emc_line_data_probe.py || echo "emc-line-data-probe failed (continuing)"

      - name: GSE4303 cross-check (surrogate surfaceome shortlist vs real EMC tumour expression)
        working-directory: research/modalities
        run: python emc_gse4303_crosscheck.py || echo "gse4303 cross-check failed (continuing)"

      - name: Surface-antigen normal-tissue therapeutic-window (HPA)
        working-directory: research/modalities
        run: python emc_surface_normal_window.py || echo "normal-window failed (continuing)"

      - name: Layer-1 VHL panel dossier (RCSB + Europe PMC; ternary-coop calibration)
        working-directory: research/modalities
        run: python layer1_vhl_fetch.py || echo "layer1-vhl-fetch failed (continuing)"

      - name: SMARCA2 SI-PDF IC50/cooperativity table extraction (pdfplumber)
        working-directory: research/modalities
        run: |
          pip install pdfplumber >/dev/null 2>&1 || echo "pdfplumber install failed"
          python extract_smarca2_ic50.py || echo "ic50-extract failed (continuing)"

      - name: Safe-2025 NR4A3-selective series primary-source verification (Europe PMC)
        working-directory: research/modalities
        run: python safe2025_verify.py || echo "safe2025-verify failed (continuing)"

      - name: Zaienne-2022 anchor paralogue-counter-screen check (Europe PMC)
        working-directory: research/modalities
        run: python zaienne_selectivity_verify.py || echo "zaienne-selectivity-verify failed (continuing)"

      - name: Publish results to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/fusion-idr-features.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-sirna-designs.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-line-data-probe.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-gse4303-crosscheck.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-surface-normal-window.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/layer1-vhl-dossier.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/smarca2-ic50-extract.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/safe2025-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/zaienne-selectivity-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/fusion-idr-features.json 2>/dev/null || true
          git add research/modalities/junction-sirna-designs.json 2>/dev/null || true
          git add research/modalities/emc-line-data-probe.json 2>/dev/null || true
          git add research/modalities/emc-gse4303-crosscheck.json 2>/dev/null || true
          git add research/modalities/emc-surface-normal-window.json 2>/dev/null || true
          git add research/modalities/layer1-vhl-dossier.json 2>/dev/null || true
          git add research/modalities/smarca2-ic50-extract.json 2>/dev/null || true
          git add research/modalities/safe2025-verify.json 2>/dev/null || true
          git add research/modalities/zaienne-selectivity-verify.json 2>/dev/null || true
          git commit -m "Fusion CPU extras: IDR/LLPS features + junction siRNA + EMC-line data probe + Layer-1 VHL dossier + Safe-2025 verify" || { echo "no changes"; exit 0; }
          git push origin modalities-cache

  # ---- NR4A3 BioEmu cryptic-pocket cross-check (method-watch trigger, BioEmu v1.4.0) --------------------------
  # Folded here so it dispatches off a feature branch (ref=<branch>) without a new on-main workflow file. Bakes
  # the bioemu Vast image, runs the sample->sidechain->renumber->fpocket chain on one Vast host, collects the
  # result. See research/modalities/nr4a3_bioemu_vast_launch.py + Dockerfile.bioemu.
  bioemu_bake:
    if: ${{ github.event.inputs.task == 'bioemu_bake' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOCKERHUB_USER: triskit23
    steps:
      - uses: actions/checkout@v4
      - name: Reclaim runner disk (the CUDA + torch image is multi-GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - name: Build + push the BioEmu Vast image
        run: |
          set -eo pipefail
          IMG="docker.io/${DOCKERHUB_USER}/bioemu:latest"
          docker build -f research/compute/Dockerfile.bioemu -t "$IMG" research/compute/
          docker push "$IMG"
          echo "PUSHED $IMG — ensure the Docker Hub repo is PUBLIC so Vast pulls it unauthenticated."

  bioemu_run:
    if: ${{ github.event.inputs.task == 'bioemu_run' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      GIT_BRANCH: ${{ github.ref_name }}
      VAST_IMAGE: ${{ github.event.inputs.vast_image }}
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      # md_mode: run => real 254-residue NR4A3 LBD; smoke => chignolin plumbing test
      BIOEMU_MODE: ${{ github.event.inputs.md_mode == 'run' && 'real' || 'smoke' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Submit the Vast instance
        run: |
          set -eo pipefail
          python -m pip install -q awscli || true
          ARGS="--mode $BIOEMU_MODE"
          [ -n "${{ github.event.inputs.bioemu_num_samples }}" ] && ARGS="$ARGS --num-samples ${{ github.event.inputs.bioemu_num_samples }}"
          [ -n "${{ github.event.inputs.bioemu_batch }}" ] && ARGS="$ARGS --batch-size-100 ${{ github.event.inputs.bioemu_batch }}"
          echo "launching: nr4a3_bioemu_vast_launch.py $ARGS"
          python research/modalities/nr4a3_bioemu_vast_launch.py $ARGS
          echo "Instance submitted. Poll via task=bioemu_collect (reads S3 phase.txt + result JSON)."

  bioemu_collect:
    if: ${{ github.event.inputs.task == 'bioemu_collect' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Pull the result JSON (+ phase log) from S3 and commit it to the branch
        run: |
          set -eo pipefail
          python3 -m pip install -q awscli >/dev/null 2>&1 || true
          B="${BUCKET:-sagemaker-us-east-2-646605541856}"
          PREFIX="s3://${B}/nr4a3-bioemu-crosscheck/nr4a3-bioemu-crosscheck"
          echo "=== phase.txt ==="; aws s3 cp "$PREFIX/phase.txt" - 2>/dev/null || echo "(no phase.txt yet)"
          if aws s3 cp "$PREFIX/bioemu-crosscheck.json" research/modalities/nr4a3-bioemu-crosscheck.json 2>/dev/null; then
            echo "=== result ==="; cat research/modalities/nr4a3-bioemu-crosscheck.json
            git config user.name "Claude"; git config user.email "noreply@anthropic.com"
            if ! git diff --quiet -- research/modalities/nr4a3-bioemu-crosscheck.json; then
              git add research/modalities/nr4a3-bioemu-crosscheck.json
              git commit -m "bioemu: capture NR4A3 cryptic-pocket cross-check result from Vast run"
              git push origin HEAD:${{ github.ref_name }}
            else
              echo "no change to commit"
            fi
          else
            echo "::warning::no result JSON yet — the run may still be sampling. Re-run bioemu_collect later."
          fi
