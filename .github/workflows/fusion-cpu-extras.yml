name: Fusion CPU extras (IDR/LLPS features + junction siRNA)

# Two internet-needing, CPU-only analyses the dev sandbox can't run (it blocks UniProt/NCBI):
#   1. fusion_idr_features.py  — sequence-based LLPS/low-complexity descriptors of the EWS/TAF15
#      LC domains vs folded + non-prion controls (condensate paper's deferred first-party step)
#   2. junction_sirna.py       — junction-spanning siRNA designs (GC-tolerant alternative to the
#      GC-rich gapmers; ASO paper)
# Pure stdlib (urllib only); no pip, no AWS/GPU. Results pushed to the `modalities-cache` branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/

on:
  workflow_dispatch:
    inputs:
      task:
        description: "which task to run"
        type: choice
        options: [fusion, vast_smoke, nrv04_cys, nrv04_md_smoke, nrv04_build_smoke, nrv04_build_env, nrv04_charge_cache, nrv04_bake, nrv04_vast_launch]
        default: fusion
      vast_launch:
        description: "vast_smoke only: actually rent+destroy a GPU (spends a few cents)"
        type: boolean
        default: false
      vast_launch_mode:
        description: "nrv04_vast_launch: discover | stage_test | collect | monitor | diag | stop_all | dry | pilot | full"
        type: choice
        options: [discover, stage_test, collect, monitor, diag, stop_all, dry, pilot, full]
        default: discover
      vast_ckpt_bucket:
        description: "nrv04_vast_launch: reused S3 bucket holding the co-fold outputs + checkpoints"
        default: "sagemaker-us-east-2-646605541856"
      cofold_prefix:
        description: "nrv04_vast_launch: S3 prefix of the EXISTING NR-V04 co-fold to reuse (ValB output)"
        default: "nrv04-descriptive-v3"
      md_mode:
        description: "nrv04_vast_launch pilot/full: smoke (minimize+500 steps, cents) | run (5ns, priced)"
        type: choice
        options: [smoke, run]
        default: smoke
      vast_image:
        description: "nrv04_vast_launch: override the Vast boot image (blank = launcher default = baked image)"
        default: ""

permissions:
  contents: write

# Per-TASK concurrency so independent tasks (e.g. nrv04_build_env + nrv04_charge_cache) run in PARALLEL instead
# of cancelling each other — a plain `fusion-cpu-extras` group would serialize every dispatch of this workflow.
concurrency:
  group: fusion-cpu-extras-${{ github.event.inputs.task }}
  cancel-in-progress: true

jobs:
  vast_smoke:
    if: ${{ github.event.inputs.task == 'vast_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      VAST_SMOKE_LAUNCH: ${{ github.event.inputs.vast_launch == 'true' && '1' || '0' }}
      VAST_SMOKE_DUMP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Vast.ai adapter smoke (auth + offer search; opt-in rent+destroy)
        run: python research/compute/vast_smoke.py

  nrv04_cys:
    if: ${{ github.event.inputs.task == 'nrv04_cys' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: NR-V04 covalent Leg 0 — celastrol-Cys551 conservation across NR4A1/2/3 (UniProt)
        working-directory: research/modalities
        run: python nrv04_cys_conservation.py
      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp research/modalities/nrv04-cys-conservation.json "$RUNNER_TEMP/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache; git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP/nrv04-cys-conservation.json" research/modalities/ 2>/dev/null || true
          git add research/modalities/nrv04-cys-conservation.json 2>/dev/null || true
          git commit -m "NR-V04 Leg 0: celastrol-Cys551 conservation across NR4A1/2/3" || { echo "no changes"; exit 0; }
          git push origin modalities-cache

  nrv04_md_smoke:
    if: ${{ github.event.inputs.task == 'nrv04_md_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + rdkit + gemmi)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy
          condarc: |
            channels:
              - conda-forge
      - name: NR-V04 MD-env + celastrol-param + restraint mechanics smoke (vacuum, CPU)
        working-directory: research/modalities
        run: python nrv04_md_env_smoke.py

  nrv04_build_env:
    # Build the MD conda env ONCE, conda-pack it, cache in S3 (mdenv/nrv04md.tar.gz). Vast instances then
    # extract this in ~1-2 min instead of each solving the ~25-min conda create (the diagnosed boot bottleneck).
    if: ${{ github.event.inputs.task == 'nrv04_build_env' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
    steps:
      - uses: actions/checkout@v4
      - name: Build the MD env (same stack as the Vast job + the CPU smoke)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 awscli pdbfixer
          condarc: |
            channels:
              - conda-forge
      - name: Ensure pdbfixer is really in the env (setup-micromamba can restore a stale pre-pdbfixer cache)
        run: |
          set -eo pipefail
          # The env step restored a 77s cache once that predated pdbfixer -> the packed tarball lacked it and the
          # baked image crashed every leg. Verify the import; install into the env if the cache was stale.
          # NB: pdbfixer exposes no __version__ — probe the actual import the driver uses (from pdbfixer import PDBFixer).
          micromamba run -n nrv04md python -c "from pdbfixer import PDBFixer" \
            || micromamba install -n nrv04md -y -c conda-forge pdbfixer
          micromamba run -n nrv04md python -c "from pdbfixer import PDBFixer; print('pdbfixer import OK')"
      - name: conda-pack the env and upload to S3
        run: |
          set -eo pipefail
          python -m pip install -q conda-pack awscli
          ENV_PREFIX="$MAMBA_ROOT_PREFIX/envs/nrv04md"
          [ -d "$ENV_PREFIX" ] || ENV_PREFIX=$(micromamba env list | awk '/nrv04md/{print $NF; exit}')
          echo "packing $ENV_PREFIX"
          conda-pack -p "$ENV_PREFIX" -o nrv04md.tar.gz --format tar.gz --n-threads -1 --ignore-missing-files
          ls -lh nrv04md.tar.gz
          aws s3 cp nrv04md.tar.gz "s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz"
          echo "uploaded s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz"

  nrv04_charge_cache:
    # Pre-compute AM1-BCC charges for the 3 distinct panel ligands ONCE (free CPU) and upload the shared
    # openmmforcefields cache to s3://.../nrv04-ffcache/ffcache.json, so no GPU leg pays the ~40-min single-core
    # sqm charge of the 166-atom recruiter (root-caused from build_smoke #2). Generous timeout: ~40 min each for
    # nrv04 + nrv04_epimer, plus a few for celastrol; the cache checkpoints to S3 after each ligand (resumable).
    if: ${{ github.event.inputs.task == 'nrv04_charge_cache' }}
    runs-on: ubuntu-latest
    timeout-minutes: 210
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + ambertools + rdkit + boto3)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 pdbfixer
          condarc: |
            channels:
              - conda-forge
      - name: Charge the distinct panel ligands once and cache to S3 (CPU, no GPU)
        working-directory: research/modalities
        run: python nrv04_charge_cache.py

  nrv04_build_smoke:
    # FREE CPU validation: build the full solvated OpenMM system from the REAL co-fold (PDBFixer prep ->
    # addSolvent -> createSystem -> covalent restraint). Catches the missing-hydrogens/capping class of bug that
    # crashed every leg, before any GPU spend. Loads the pre-computed FF charge cache from S3 so it also VALIDATES
    # that the cache eliminates the ~40-min sqm charge (build now finishes in ~1-2 min). No Vast.
    if: ${{ github.event.inputs.task == 'nrv04_build_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      NRV04_COFOLD_PREFIX: ${{ github.event.inputs.cofold_prefix }}
      NRV04_FFCACHE: /tmp/nrv04_ffcache.json
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + rdkit + gemmi + boto3)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy boto3 pdbfixer
          condarc: |
            channels:
              - conda-forge
      - name: Fetch the pre-computed FF charge cache (skip if absent — build will just charge in-process)
        run: |
          python3 -m pip install -q awscli >/dev/null 2>&1 || pip install -q awscli >/dev/null 2>&1 || true
          aws s3 cp "s3://${VAST_CKPT_BUCKET}/nrv04-ffcache/ffcache.json" "$NRV04_FFCACHE" \
            || echo "no ffcache yet — build_smoke will charge in-process (slow; may hit the 40-min timeout)"
      - name: Build the full solvated system from the real co-fold (CPU, no MD)
        working-directory: research/modalities
        run: python nrv04_build_smoke.py

  nrv04_bake:
    # Build the pre-provisioned Vast boot image (ssh/python/git/systemd + the MD conda env all baked, so Vast's
    # slow boot-time apt is a no-op) and push it to Docker Hub (public repo -> Vast pulls unauthenticated).
    if: ${{ github.event.inputs.task == 'nrv04_bake' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      DOCKERHUB_USER: triskit23
    steps:
      - uses: actions/checkout@v4
      - name: Fetch the pre-packed MD env from S3 into the build context
        run: |
          python3 -m pip install -q awscli >/dev/null 2>&1 || true
          aws s3 cp "s3://${VAST_CKPT_BUCKET}/mdenv/nrv04md.tar.gz" research/compute/nrv04md.tar.gz
          ls -lh research/compute/nrv04md.tar.gz
      - name: Verify the env tarball actually contains pdbfixer (the whole point of the rebuild)
        run: |
          set -eo pipefail
          LIST=$(tar tzf research/compute/nrv04md.tar.gz)
          echo "--- pdbfixer-matching paths in the tarball (diagnostic) ---"
          printf '%s\n' "$LIST" | grep -im 20 pdbfixer || echo "(none)"
          echo "----------------------------------------------------------"
          # COUNT (grep -c reads all input -> no early-exit SIGPIPE that would false-fail under `pipefail`; the
          # `grep -q` form did exactly that and reported MISSING even though pdbfixer was present). Match the
          # package dir OR its dist-info/conda-meta record (path layout varies).
          CNT=$(printf '%s\n' "$LIST" | grep -icE '/pdbfixer/|pdbfixer-[0-9].*(dist-info|\.json)' || true)
          if [ "${CNT:-0}" -gt 0 ]; then
            echo "pdbfixer PRESENT in the tarball ($CNT paths) — baking."
          else
            echo "::error::pdbfixer MISSING from nrv04md.tar.gz — re-run nrv04_build_env before baking."
            exit 1
          fi
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - name: Build + push the Vast boot image
        run: |
          set -eo pipefail
          IMG="docker.io/${DOCKERHUB_USER}/nrv04vast:latest"
          docker build -f research/compute/Dockerfile.nrv04vast -t "$IMG" research/compute/
          docker push "$IMG"
          echo "PUSHED $IMG (ensure the Docker Hub repo is PUBLIC so Vast can pull it unauthenticated)"

  nrv04_vast_launch:
    if: ${{ github.event.inputs.task == 'nrv04_vast_launch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      NRV04_COFOLD_PREFIX: ${{ github.event.inputs.cofold_prefix }}
      GIT_BRANCH: ${{ github.ref_name }}
      MODE: ${{ github.event.inputs.md_mode }}
      VAST_IMAGE: ${{ github.event.inputs.vast_image }}
      PILOT_ONLY: ${{ github.event.inputs.vast_launch_mode == 'full' && '0' || '1' }}
      DRY_RUN: ${{ github.event.inputs.vast_launch_mode == 'dry' && '1' || '0' }}
      DISCOVER: ${{ github.event.inputs.vast_launch_mode == 'discover' && '1' || '0' }}
      STAGE_TEST: ${{ github.event.inputs.vast_launch_mode == 'stage_test' && '1' || '0' }}
      COLLECT: ${{ github.event.inputs.vast_launch_mode == 'collect' && '1' || '0' }}
      MONITOR: ${{ github.event.inputs.vast_launch_mode == 'monitor' && '1' || '0' }}
      STOP_ALL: ${{ github.event.inputs.vast_launch_mode == 'stop_all' && '1' || '0' }}
      DIAG: ${{ github.event.inputs.vast_launch_mode == 'diag' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Launch NR-V04 covalent panel on Vast (discover/stage_test/dry/pilot/full)
        working-directory: research/modalities
        run: |
          set -o pipefail
          pip install -q boto3 >/dev/null 2>&1 || echo "boto3 install failed"
          if [ "${{ github.event.inputs.vast_launch_mode }}" = "stage_test" ]; then
            pip install -q gemmi rdkit >/dev/null 2>&1 || echo "gemmi/rdkit install failed"
          fi
          python nrv04_vast_launch.py
      - name: Upload Vast handles
        if: ${{ always() && (github.event.inputs.vast_launch_mode == 'pilot' || github.event.inputs.vast_launch_mode == 'full') }}
        uses: actions/upload-artifact@v4
        with:
          name: nrv04-vast-handles
          path: research/modalities/nrv04-vast-handles.json
          if-no-files-found: ignore

  run:
    if: ${{ github.event.inputs.task == 'fusion' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: IDR / LLPS sequence-feature analysis (UniProt)
        working-directory: research/modalities
        run: python fusion_idr_features.py || echo "idr-features failed (continuing)"

      - name: Junction-spanning siRNA design (NCBI)
        working-directory: research/modalities
        run: python junction_sirna.py || echo "sirna design failed (continuing)"

      - name: EMC cell-line data probe (Europe PMC IHC markers + GEO/SRA deposited data)
        working-directory: research/modalities
        run: python emc_line_data_probe.py || echo "emc-line-data-probe failed (continuing)"

      - name: GSE4303 cross-check (surrogate surfaceome shortlist vs real EMC tumour expression)
        working-directory: research/modalities
        run: python emc_gse4303_crosscheck.py || echo "gse4303 cross-check failed (continuing)"

      - name: Surface-antigen normal-tissue therapeutic-window (HPA)
        working-directory: research/modalities
        run: python emc_surface_normal_window.py || echo "normal-window failed (continuing)"

      - name: Layer-1 VHL panel dossier (RCSB + Europe PMC; ternary-coop calibration)
        working-directory: research/modalities
        run: python layer1_vhl_fetch.py || echo "layer1-vhl-fetch failed (continuing)"

      - name: SMARCA2 SI-PDF IC50/cooperativity table extraction (pdfplumber)
        working-directory: research/modalities
        run: |
          pip install pdfplumber >/dev/null 2>&1 || echo "pdfplumber install failed"
          python extract_smarca2_ic50.py || echo "ic50-extract failed (continuing)"

      - name: Safe-2025 NR4A3-selective series primary-source verification (Europe PMC)
        working-directory: research/modalities
        run: python safe2025_verify.py || echo "safe2025-verify failed (continuing)"

      - name: Zaienne-2022 anchor paralogue-counter-screen check (Europe PMC)
        working-directory: research/modalities
        run: python zaienne_selectivity_verify.py || echo "zaienne-selectivity-verify failed (continuing)"

      - name: Publish results to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/fusion-idr-features.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-sirna-designs.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-line-data-probe.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-gse4303-crosscheck.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-surface-normal-window.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/layer1-vhl-dossier.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/smarca2-ic50-extract.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/safe2025-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/zaienne-selectivity-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/fusion-idr-features.json 2>/dev/null || true
          git add research/modalities/junction-sirna-designs.json 2>/dev/null || true
          git add research/modalities/emc-line-data-probe.json 2>/dev/null || true
          git add research/modalities/emc-gse4303-crosscheck.json 2>/dev/null || true
          git add research/modalities/emc-surface-normal-window.json 2>/dev/null || true
          git add research/modalities/layer1-vhl-dossier.json 2>/dev/null || true
          git add research/modalities/smarca2-ic50-extract.json 2>/dev/null || true
          git add research/modalities/safe2025-verify.json 2>/dev/null || true
          git add research/modalities/zaienne-selectivity-verify.json 2>/dev/null || true
          git commit -m "Fusion CPU extras: IDR/LLPS features + junction siRNA + EMC-line data probe + Layer-1 VHL dossier + Safe-2025 verify" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
