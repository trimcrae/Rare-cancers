name: Fusion CPU extras (IDR/LLPS features + junction siRNA)

# Two internet-needing, CPU-only analyses the dev sandbox can't run (it blocks UniProt/NCBI):
#   1. fusion_idr_features.py  — sequence-based LLPS/low-complexity descriptors of the EWS/TAF15
#      LC domains vs folded + non-prion controls (condensate paper's deferred first-party step)
#   2. junction_sirna.py       — junction-spanning siRNA designs (GC-tolerant alternative to the
#      GC-rich gapmers; ASO paper)
# Pure stdlib (urllib only); no pip, no AWS/GPU. Results pushed to the `modalities-cache` branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/

on:
  workflow_dispatch:
    inputs:
      task:
        description: "which task to run"
        type: choice
        options: [fusion, vast_smoke, nrv04_cys, nrv04_md_smoke, nrv04_vast_launch]
        default: fusion
      vast_launch:
        description: "vast_smoke only: actually rent+destroy a GPU (spends a few cents)"
        type: boolean
        default: false
      vast_launch_mode:
        description: "nrv04_vast_launch: discover (list reusable co-fold CIFs) | dry | pilot (1 leg) | full (18)"
        type: choice
        options: [discover, dry, pilot, full]
        default: discover
      vast_ckpt_bucket:
        description: "nrv04_vast_launch: reused S3 bucket holding the co-fold outputs + checkpoints"
        default: "sagemaker-us-east-2-646605541856"
      cofold_prefix:
        description: "nrv04_vast_launch: S3 prefix of the EXISTING NR-V04 co-fold to reuse (ValB output)"
        default: "nrv04-descriptive-v3"

permissions:
  contents: write

concurrency:
  group: fusion-cpu-extras
  cancel-in-progress: true

jobs:
  vast_smoke:
    if: ${{ github.event.inputs.task == 'vast_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      VAST_SMOKE_LAUNCH: ${{ github.event.inputs.vast_launch == 'true' && '1' || '0' }}
      VAST_SMOKE_DUMP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Vast.ai adapter smoke (auth + offer search; opt-in rent+destroy)
        run: python research/compute/vast_smoke.py

  nrv04_cys:
    if: ${{ github.event.inputs.task == 'nrv04_cys' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: NR-V04 covalent Leg 0 — celastrol-Cys551 conservation across NR4A1/2/3 (UniProt)
        working-directory: research/modalities
        run: python nrv04_cys_conservation.py
      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp research/modalities/nrv04-cys-conservation.json "$RUNNER_TEMP/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache; git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP/nrv04-cys-conservation.json" research/modalities/ 2>/dev/null || true
          git add research/modalities/nrv04-cys-conservation.json 2>/dev/null || true
          git commit -m "NR-V04 Leg 0: celastrol-Cys551 conservation across NR4A1/2/3" || { echo "no changes"; exit 0; }
          git push origin modalities-cache

  nrv04_md_smoke:
    if: ${{ github.event.inputs.task == 'nrv04_md_smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MD env (openmm + openff + openmmforcefields + rdkit + gemmi)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: nrv04md
          create-args: >-
            python=3.11 openmm openff-toolkit openmmforcefields ambertools rdkit gemmi numpy
          condarc: |
            channels:
              - conda-forge
      - name: NR-V04 MD-env + celastrol-param + restraint mechanics smoke (vacuum, CPU)
        working-directory: research/modalities
        run: python nrv04_md_env_smoke.py

  nrv04_vast_launch:
    if: ${{ github.event.inputs.task == 'nrv04_vast_launch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
      VAST_CKPT_BUCKET: ${{ github.event.inputs.vast_ckpt_bucket }}
      NRV04_COFOLD_PREFIX: ${{ github.event.inputs.cofold_prefix }}
      GIT_BRANCH: ${{ github.ref_name }}
      MODE: run
      PILOT_ONLY: ${{ github.event.inputs.vast_launch_mode == 'full' && '0' || '1' }}
      DRY_RUN: ${{ github.event.inputs.vast_launch_mode == 'dry' && '1' || '0' }}
      DISCOVER: ${{ github.event.inputs.vast_launch_mode == 'discover' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Launch NR-V04 covalent panel on Vast (discover/dry/pilot/full)
        working-directory: research/modalities
        run: |
          pip install -q boto3 >/dev/null 2>&1 || echo "boto3 install failed"
          python nrv04_vast_launch.py
      - name: Upload Vast handles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrv04-vast-handles
          path: research/modalities/nrv04-vast-handles.json
          if-no-files-found: ignore

  run:
    if: ${{ github.event.inputs.task == 'fusion' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: IDR / LLPS sequence-feature analysis (UniProt)
        working-directory: research/modalities
        run: python fusion_idr_features.py || echo "idr-features failed (continuing)"

      - name: Junction-spanning siRNA design (NCBI)
        working-directory: research/modalities
        run: python junction_sirna.py || echo "sirna design failed (continuing)"

      - name: EMC cell-line data probe (Europe PMC IHC markers + GEO/SRA deposited data)
        working-directory: research/modalities
        run: python emc_line_data_probe.py || echo "emc-line-data-probe failed (continuing)"

      - name: GSE4303 cross-check (surrogate surfaceome shortlist vs real EMC tumour expression)
        working-directory: research/modalities
        run: python emc_gse4303_crosscheck.py || echo "gse4303 cross-check failed (continuing)"

      - name: Surface-antigen normal-tissue therapeutic-window (HPA)
        working-directory: research/modalities
        run: python emc_surface_normal_window.py || echo "normal-window failed (continuing)"

      - name: Layer-1 VHL panel dossier (RCSB + Europe PMC; ternary-coop calibration)
        working-directory: research/modalities
        run: python layer1_vhl_fetch.py || echo "layer1-vhl-fetch failed (continuing)"

      - name: SMARCA2 SI-PDF IC50/cooperativity table extraction (pdfplumber)
        working-directory: research/modalities
        run: |
          pip install pdfplumber >/dev/null 2>&1 || echo "pdfplumber install failed"
          python extract_smarca2_ic50.py || echo "ic50-extract failed (continuing)"

      - name: Safe-2025 NR4A3-selective series primary-source verification (Europe PMC)
        working-directory: research/modalities
        run: python safe2025_verify.py || echo "safe2025-verify failed (continuing)"

      - name: Zaienne-2022 anchor paralogue-counter-screen check (Europe PMC)
        working-directory: research/modalities
        run: python zaienne_selectivity_verify.py || echo "zaienne-selectivity-verify failed (continuing)"

      - name: Publish results to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/fusion-idr-features.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-sirna-designs.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-line-data-probe.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-gse4303-crosscheck.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/emc-surface-normal-window.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/layer1-vhl-dossier.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/smarca2-ic50-extract.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/safe2025-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/zaienne-selectivity-verify.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/fusion-idr-features.json 2>/dev/null || true
          git add research/modalities/junction-sirna-designs.json 2>/dev/null || true
          git add research/modalities/emc-line-data-probe.json 2>/dev/null || true
          git add research/modalities/emc-gse4303-crosscheck.json 2>/dev/null || true
          git add research/modalities/emc-surface-normal-window.json 2>/dev/null || true
          git add research/modalities/layer1-vhl-dossier.json 2>/dev/null || true
          git add research/modalities/smarca2-ic50-extract.json 2>/dev/null || true
          git add research/modalities/safe2025-verify.json 2>/dev/null || true
          git add research/modalities/zaienne-selectivity-verify.json 2>/dev/null || true
          git commit -m "Fusion CPU extras: IDR/LLPS features + junction siRNA + EMC-line data probe + Layer-1 VHL dossier + Safe-2025 verify" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
