name: Published warhead registry (RDKit, CPU)

# Phase-1 / Workstream-B deliverable of the NR4A3-selective-degrader master brief (deliverables 30-33):
# the versioned machine-readable catalog of published, experimentally anchored NR4A chemistry the program
# benchmarks against (Zaienne NOR-1 series, NR4A1/Nur77 + NR4A2/Nurr1 anti-target panels, NR-V04 reference
# degrader + controls, VHL/CRBN E3 handles). Structures are resolved + cross-checked from ChEMBL / PubChem /
# NCI CACTUS on the runner (the dev sandbox has neither internet nor RDKit). No GPU / no AWS.
#
# Result published to the modalities-cache branch:
#   git fetch origin modalities-cache
#   git checkout modalities-cache -- research/modalities/published-warhead-registry.json

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: published-warhead-registry
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RDKit
        run: |
          python -m pip install --upgrade pip
          pip install rdkit

      - name: Self-test the pure structure-agreement logic
        working-directory: research/modalities
        run: |
          pip install pytest
          python -m pytest tests/test_published_warhead_registry.py -q

      - name: Build the published warhead registry
        working-directory: research/modalities
        run: python published_warhead_registry.py

      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/published-warhead-registry.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/published-warhead-registry.json 2>/dev/null || true
          git commit -m "Published warhead registry (RDKit; ChEMBL/PubChem/CACTUS cross-check)" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
