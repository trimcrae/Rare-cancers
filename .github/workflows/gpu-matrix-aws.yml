name: NR4A selectivity matrix (AWS SageMaker)

# Docks one candidate library into the metad-OPENED conformer of NR4A3 + NR4A1 + NR4A2 (state-matched)
# and classifies each candidate's selectivity fingerprint across the family. Runs nr4a3_matrix.py as a
# managed SageMaker Processing job, mounting all three s3://<bucket>/*-metad opened ensembles. CPU work;
# defaults to ml.g5.xlarge to reuse the GPU quota. REQUIRES secrets: AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN. Run ONLY after all three *-metad runs have populated S3.

on:
  workflow_dispatch:
    inputs:
      instance:
        description: "SageMaker instance type (g5.xlarge reuses the GPU quota; CPU type if you have that quota)"
        default: "ml.g5.xlarge"
        required: false
      region:
        description: "AWS region — must match where the stack + ensembles live"
        default: "us-east-2"
        required: false
      output_prefix:
        description: "S3 prefix for the matrix results"
        default: "nr4a3-matrix"
        required: false
      git_ref:
        description: "repo ref the job clones + runs (branch/tag/sha)"
        default: "main"
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3   # v2 SDK (v3 dropped FrameworkProcessor/PyTorch)
      - name: Submit SageMaker matrix job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          INSTANCE: ${{ inputs.instance }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first. See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_matrix_sagemaker.py
