name: GCP validate — auth + L4 spot quota + provision/teardown smoke (WIF keyless)

# Validate-first for the GCP spot-L4 backend (cheapest free-credit workhorse; quota approved 2026-07-13) BEFORE
# running real RBFE legs on it. Keyless auth via Workload Identity Federation (no service-account JSON key — the
# org policy iam.disableServiceAccountKeyCreation blocks keys). Proves: (1) WIF auth works; (2) project resolves;
# (3) L4 spot quota in us-central1; (4) a Spot L4 GCE VM provisions + has a GPU (nvidia-smi); (5) tears down.
#
# Needs two repo VARIABLES (Settings -> Secrets and variables -> Actions -> Variables), NOT secrets:
#   GCP_WIF_PROVIDER = the workload-identity provider resource name
#                      (projects/<NUM>/locations/global/workloadIdentityPools/github-pool/providers/github-provider)
#   GCP_SA_EMAIL     = gpu-runner@<PROJECT_ID>.iam.gserviceaccount.com
# Both are non-secret (WIF issues short-lived tokens per run; nothing durable is stored).

on:
  workflow_dispatch:
    inputs:
      zone:    { description: "GCE zone (L4 = g2 family)", default: "us-central1-a", required: false }
      machine: { description: "machine type (1x L4)", default: "g2-standard-4", required: false }
  push:
    branches: [claude/nr4a3-ternary-coop-prereg-5ml7r2]
    paths:
      - .github/workflows/gcp-smoke.yml

permissions:
  id-token: write      # required for the GitHub OIDC token WIF consumes
  contents: read

concurrency:
  group: gcp-smoke
  cancel-in-progress: false

jobs:
  gcp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ZONE: ${{ github.event.inputs.zone || 'us-central1-a' }}
      MACHINE: ${{ github.event.inputs.machine || 'g2-standard-4' }}
    steps:
      - id: auth
        name: Authenticate to GCP (keyless, WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878095411563/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gpu-runner@project-a7ebde30-e2ed-4b8d-9a9.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve project + confirm identity
        run: |
          set -eo pipefail
          PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          echo "PROJECT=$PROJECT" >> "$GITHUB_ENV"
          gcloud config set project "$PROJECT"
          echo "project: $PROJECT ; authenticated as: $(gcloud config get-value account 2>/dev/null)"

      - name: Check L4 availability + GPU quota in the region
        run: |
          set -eo pipefail
          echo "=== L4 accelerator zones in us-central1 ==="
          gcloud compute accelerator-types list --filter="name=nvidia-l4 AND zone~us-central1" --format="table(zone,name)" || true
          echo "=== GPU quota (region us-central1) ==="
          gcloud compute regions describe us-central1 --format="json(quotas)" \
            | python3 -c "import sys,json;[print(q['metric'],q['limit']) for q in json.load(sys.stdin)['quotas'] if 'GPU' in q['metric'] or 'PREEMPTIBLE' in q['metric']]" || true

      - name: Provision Spot L4 VM + nvidia-smi smoke
        run: |
          set -eo pipefail
          VM="gcp-smoke-${GITHUB_RUN_ID}"
          echo "VM=$VM" >> "$GITHUB_ENV"
          # resolve a CURRENT Deep-Learning-VM GPU image family (names churn: common-cuXXX-debianYY)
          IMG_FAMILY=$(gcloud compute images list --project=deeplearning-platform-release \
            --filter="family~'^common-cu'" --format="value(family)" --sort-by=~creationTimestamp 2>/dev/null | head -1)
          [ -z "$IMG_FAMILY" ] && IMG_FAMILY=$(gcloud compute images list --project=deeplearning-platform-release \
            --filter="family~'gpu'" --format="value(family)" --sort-by=~creationTimestamp 2>/dev/null | head -1)
          echo "using DLVM image family: ${IMG_FAMILY:-<none-found>}"
          [ -z "$IMG_FAMILY" ] && { echo "::error::no Deep-Learning-VM GPU image family found"; exit 1; }
          cat > /tmp/startup.sh <<'SS'
          #!/bin/bash
          echo "=== GCP-SMOKE start $(date -u) ==="
          for i in $(seq 1 30); do nvidia-smi && break || { echo "waiting for driver..."; sleep 10; }; done
          nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv
          echo "=== GCP-SMOKE-DONE ==="
          SS
          gcloud compute instances create "$VM" \
            --zone="$ZONE" --machine-type="$MACHINE" \
            --provisioning-model=SPOT --instance-termination-action=DELETE \
            --maintenance-policy=TERMINATE \
            --image-family="$IMG_FAMILY" --image-project=deeplearning-platform-release \
            --boot-disk-size=50GB --no-restart-on-failure \
            --metadata-from-file=startup-script=/tmp/startup.sh \
            --metadata=install-nvidia-driver=True
          echo "VM $VM created in $ZONE; polling serial console for the smoke sentinel..."
          ok=0
          for i in $(seq 1 24); do
            OUT=$(gcloud compute instances get-serial-port-output "$VM" --zone="$ZONE" 2>/dev/null || true)
            if echo "$OUT" | grep -q "GCP-SMOKE-DONE"; then
              echo "=== nvidia-smi from the L4 VM ==="
              echo "$OUT" | grep -iE "NVIDIA L4|driver_version|L4," | head
              ok=1; break
            fi
            sleep 20
          done
          [ "$ok" = 1 ] && echo "GCP L4 SPOT SMOKE: PASS" || { echo "::error::smoke did not report GPU in time (spot capacity or driver delay)"; exit 1; }

      - name: Teardown (always — no idle billing)
        if: always()
        run: |
          if [ -n "$VM" ] && [ -n "$PROJECT" ]; then
            gcloud compute instances delete "$VM" --zone="$ZONE" --quiet 2>/dev/null && echo "deleted $VM" || echo "delete no-op (already gone / never created)"
          fi
