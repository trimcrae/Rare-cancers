# Deploys the zero-build static site to GitHub Pages.
# One-time setup (repo owner): Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, every push to main publishes the site.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate data files
        run: node scripts/validate.mjs
      - name: Smoke-test that every page renders
        run: node scripts/smoke-render.mjs
      - name: Assemble site (static files only)
        run: |
          mkdir -p _site
          cp index.html 404.html _site/
          cp -r assets data cancers _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
