name: ASO off-target screen + uncapped full-transcriptome eval (junction gapmers)

# Two transcriptome-wide specificity analyses for the fusion-junction gapmer ASOs, at a
# breakpoint chosen via the workflow inputs (blank = canonical):
#   1. junction_aso_offtarget.py — BLASTs each fusion-specific gapmer's target window against
#      human RefSeq RNA (NCBI BLAST URL API), resolving gap-spanning (RNase-H cleavage) vs
#      wing-only (affinity) liabilities to the gap-mismatch level.
#   2. aso_insilico.py — UNCAPPED full-RefSeq (186k-transcript) off-target scan + ViennaRNA
#      target-site accessibility + siRNA-seed module, removing the BLAST HITLIST-50 over-call.
# Internet-only — the dev sandbox can't reach NCBI, so this runs on a GitHub-hosted runner.
# Result JSON is pushed to the `modalities-cache` branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/junction-aso-offtarget.json
# CPU only; no AWS/SageMaker/GPU.

on:
  workflow_dispatch:
    inputs:
      ews_keep:
        description: "EWSR1 kept codons (breakpoint); blank = canonical 264"
        required: false
      nr4_from:
        description: "NR4A3 start codon (breakpoint); blank = canonical 2"
        required: false
      out_suffix:
        description: "Output filename suffix, e.g. -bp200-8"
        required: false
      real_junctions:
        description: "Space-separated REAL exon junctions EWSR1exon:NR4A3exon (e.g. '12:3 7:3'). If set, runs the real-junction pipeline (design + gap-resolved BLAST + uncapped eval + junction siRNA) and skips the codon-space screen."
        required: false
      sirna_only_junctions:
        description: "Space-separated REAL exon junctions EWSR1exon:NR4A3exon for which to run ONLY the (fast, no-BLAST) siRNA design — e.g. junctions whose gapmer pipeline is already done ('7:3 12:3')."
        required: false
      oligo_len:
        description: "Gapmer length (default 16 = 5-6-5; set 20 for 5-10-5)"
        required: false
      wing:
        description: "Gapmer wing length (default 5)"
        required: false
      suffix_tag:
        description: "Extra suffix appended to real-junction outputs, e.g. -20mer (avoids overwriting the 16-mer files)"
        required: false

permissions:
  contents: write

concurrency:
  group: aso-offtarget
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Transcriptome-wide off-target screen (NCBI BLAST, stdlib only)
        if: ${{ inputs.real_junctions == '' }}
        working-directory: research/modalities
        env:
          EWSR1_KEEP_AA: ${{ inputs.ews_keep }}
          NR4A3_KEEP_AA_FROM: ${{ inputs.nr4_from }}
          OUT_SUFFIX: ${{ inputs.out_suffix }}
        run: python junction_aso_offtarget.py

      - name: Install ViennaRNA (for target-site accessibility)
        run: pip install ViennaRNA

      - name: Real-junction pipeline (Ensembl exon junctions; design + gap-resolved BLAST + uncapped eval + siRNA)
        if: ${{ inputs.real_junctions != '' }}
        working-directory: research/modalities
        env:
          FUSION_JUNCTION_MODE: real
          JUNCS: ${{ inputs.real_junctions }}
          OLIGO_LEN: ${{ inputs.oligo_len }}
          WING: ${{ inputs.wing }}
          SUFFIX_TAG: ${{ inputs.suffix_tag }}
        run: |
          set -u
          for jpair in $JUNCS; do
            e="${jpair%%:*}"; n="${jpair##*:}"
            sfx="-e${e}n${n}${SUFFIX_TAG}"
            echo "::group::real junction EWSR1 e${e} :: NR4A3 e${n} (suffix ${sfx}; len=${OLIGO_LEN:-16})"
            EWSR1_EXON_END="$e" NR4A3_EXON_START="$n" OUT_SUFFIX="$sfx" python junction_aso.py          || echo "design failed e${e} n${n}"
            EWSR1_EXON_END="$e" NR4A3_EXON_START="$n" OUT_SUFFIX="$sfx" python junction_aso_offtarget.py || echo "offtarget failed e${e} n${n}"
            EWSR1_EXON_END="$e" NR4A3_EXON_START="$n" OUT_SUFFIX="$sfx" python aso_insilico.py           || echo "insilico failed e${e} n${n}"
            echo "::endgroup::"
          done

      - name: siRNA-only for already-screened real junctions (fast; no BLAST/FASTA)
        if: ${{ inputs.sirna_only_junctions != '' }}
        working-directory: research/modalities
        env:
          FUSION_JUNCTION_MODE: real
          JUNCS: ${{ inputs.sirna_only_junctions }}
        run: |
          set -u
          for jpair in $JUNCS; do
            e="${jpair%%:*}"; n="${jpair##*:}"
            sfx="-e${e}n${n}"
            echo "::group::siRNA-only EWSR1 e${e} :: NR4A3 e${n} (suffix ${sfx})"
            EWSR1_EXON_END="$e" NR4A3_EXON_START="$n" OUT_SUFFIX="$sfx" python junction_sirna.py || echo "sirna failed e${e} n${n}"
            echo "::endgroup::"
          done

      - name: Uncapped full-transcriptome evaluation (off-target + accessibility + siRNA seed)
        if: ${{ inputs.real_junctions == '' }}
        working-directory: research/modalities
        env:
          EWSR1_KEEP_AA: ${{ inputs.ews_keep }}
          NR4A3_KEEP_AA_FROM: ${{ inputs.nr4_from }}
          OUT_SUFFIX: ${{ inputs.out_suffix }}
        run: python aso_insilico.py

      - name: Publish result to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/junction-aso-designs*.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-aso-offtarget*.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/aso-insilico-evaluation*.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/junction-sirna-designs*.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          git add research/modalities/junction-aso-designs*.json 2>/dev/null || true
          git add research/modalities/junction-aso-offtarget*.json 2>/dev/null || true
          git add research/modalities/aso-insilico-evaluation*.json 2>/dev/null || true
          git add research/modalities/junction-sirna-designs*.json 2>/dev/null || true
          git commit -m "ASO real/reference junction screens: design + gap-resolved BLAST + uncapped eval + siRNA" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
