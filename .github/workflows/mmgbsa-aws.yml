name: NR4A MM-GBSA endpoint rescoring (AWS SageMaker)

# Re-scores the selectivity-matrix docked poses with single-snapshot 1-trajectory MM-GBSA (enthalpy +
# GBn2; no entropy/ensemble) to test whether the docking-level NR4A3-selectivity survives a physics-based
# energy model. Reuses s3://<bucket>/nr4a3-matrix (receptors + docked_*.sdf) — NO re-docking, NO MD, so
# ~13 candidates x 3 targets, minutes on a GPU. Defaults to ml.g5.xlarge (A10G): run 8 proved CPU is
# ~48 min/ligand, so the compute needs the GPU and there is NO CPU fallback (the job fails fast in seconds
# if no GPU platform loads). Watch a running job with tail-cloudwatch-aws.yml. REQUIRES secrets:
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN. Run only after the matrix populated
# s3://<bucket>/nr4a3-matrix.

on:
  workflow_dispatch:
    inputs:
      instance:
        description: "SageMaker instance type (GPU required; ml.g5.xlarge default — no CPU fallback)"
        default: "ml.g5.xlarge"
        required: false
      spot:
        description: "1 = managed spot Training (~60-70% cheaper, parallel quota; safe — resumes per-ligand); 0 = on-demand"
        default: "1"
        required: false
      max_runtime:
        description: "per-attempt wall cap (s); a timeout just checkpoints and you re-dispatch to resume"
        default: "43200"
        required: false
      region:
        description: "AWS region — must match where the matrix outputs live"
        default: "us-east-2"
        required: false
      input_prefix:
        description: "S3 prefix holding the matrix outputs (receptors + docked_*.sdf)"
        default: "nr4a3-matrix"
        required: false
      output_prefix:
        description: "S3 prefix for the MM-GBSA results"
        default: "nr4a3-mmgbsa"
        required: false
      compute_timeout:
        description: "overall compute wall-clock seconds (raise for >13 candidates; 20x3 needs ~3600). Empty = entry default 1800."
        default: ""
        required: false
      multisnapshot:
        description: "1 = multi-snapshot de-noising tier (short GB MD; ΔG averaged + SD). Empty = single-snapshot."
        default: ""
        required: false
      candidate_filter:
        description: "comma-separated label whitelist (e.g. denovo_393,denovo_401) — only score these"
        default: ""
        required: false
      frames:
        description: "multi-snapshot frame count (default 10)"
        default: ""
        required: false
      target_timeout:
        description: "per-(ligand,target) wall-clock cap seconds (raise for multi-snapshot, e.g. 1800)"
        default: ""
        required: false
      git_ref:
        description: "repo ref the job clones + runs (branch/tag/sha)"
        default: "main"
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3
      - name: Submit SageMaker MM-GBSA job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          INSTANCE: ${{ inputs.instance }}
          SPOT: ${{ inputs.spot }}
          MAX_RUNTIME: ${{ inputs.max_runtime }}
          INPUT_PREFIX: ${{ inputs.input_prefix }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
          COMPUTE_TIMEOUT: ${{ inputs.compute_timeout }}
          MULTISNAPSHOT: ${{ inputs.multisnapshot }}
          CANDIDATE_FILTER: ${{ inputs.candidate_filter }}
          MMGBSA_FRAMES: ${{ inputs.frames }}
          MMGBSA_TARGET_TIMEOUT: ${{ inputs.target_timeout }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first. See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_mmgbsa_sagemaker.py
