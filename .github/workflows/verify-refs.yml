name: Verify external references

# Reviewer-grade verification of claims we cannot check offline (the egress allowlist blocks
# Crossref/EuropePMC from the dev sandbox; CI has full internet). Verifies external DOIs via
# Crossref, pulls Bangerter 2023 full text from Europe PMC to confirm the named drugs, and
# searches for primary pazopanib/sunitinib EMC reports. Prints to the run log; commits nothing.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify DOIs, Bangerter full text, and pazopanib/sunitinib EMC reports
        run: |
          set +e
          echo "===== 1) Crossref: DOI -> title / journal / year ====="
          for entry in \
            "10.1038/s41591-024-03233-x#TxGNN (expect: foundation model, clinician-centered drug repurposing; Nat Med 2024)" \
            "10.1016/S0140-6736(23)02268-7#KEYNOTE-942 (expect: mRNA-4157/V940 + pembrolizumab, melanoma; Lancet 2024)" \
            "10.1038/s12276-023-01086-x#LNP review (expect: immunogenicity of lipid nanoparticles; Exp Mol Med 2023)" \
            "10.1093/nar/gkaa1084#DGIdb (expect: Drug-Gene Interaction Database 4.0; NAR 2021)" \
            "10.1093/nar/gkz1029#AFND 2020 (expect: Allele Frequency Net Database 2020 update; NAR 2020)" \
            "10.1186/1471-2105-7-153#IEDB population coverage (expect: Bui 2006, T-cell epitope population coverage; BMC Bioinformatics 2006)"; do
            doi="${entry%%#*}"; note="${entry#*#}"
            echo "  DOI $doi"
            echo "    expect: $note"
            curl -s -m 30 -A "rare-cancers-verify/1.0 (mailto:trimcrae@gmail.com)" "https://api.crossref.org/works/$doi" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const m=JSON.parse(s).message;console.log("    crossref: "+((m.title||[])[0]||"?")+" | "+((m["container-title"]||[])[0]||"?")+" | "+(((m.published||m.issued||{})["date-parts"]||[[ "?" ]])[0][0]));}catch(e){console.log("    PARSE-ERR "+s.slice(0,80))}})'
          done
          echo
          echo "===== 2) Bangerter 2023 (PMC9813045) full text — try multiple sources ====="
          echo "  -- 2a) PMC open-access service (is full text freely available?) --"
          curl -s -m 30 "https://www.ncbi.nlm.nih.gov/pmc/utils/oa/oa.fcgi?id=PMC9813045" | head -c 500; echo
          echo "  -- 2b) Europe PMC isOpenAccess flag --"
          curl -s -m 30 "https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=PMC9813045&format=json&resultType=core" \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const r=JSON.parse(s).resultList.result[0]||{};console.log("    isOpenAccess:",r.isOpenAccess,"| inEPMC:",r.inEPMC,"| inPMC:",r.inPMC,"| hasTextMinedTerms:",r.hasTextMinedTerms);}catch(e){console.log("    parse-err",s.slice(0,120))}})'
          echo "  -- 2c) NCBI efetch PMC XML --"
          curl -s -m 60 "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pmc&id=9813045&rettype=xml" -o b.xml
          echo "    bytes: $(wc -c < b.xml)"
          for drug in venetoclax carfilzomib doxorubicin bortezomib panobinostat romidepsin brigatinib synerg; do
            n=$(grep -io "$drug" b.xml | wc -l); [ "$n" -gt 0 ] && echo "    $drug: $n"
          done
          echo "    sentences naming the drugs:"; grep -ioE "[^.<>]*\b(venetoclax|carfilzomib|doxorubicin)\b[^.<>]*" b.xml | sed 's/<[^>]*>//g' | sort -u | head -10
          echo "  -- 2d) Europe PMC text-mined chemicals for PMC9813045 --"
          curl -s -m 30 "https://www.ebi.ac.uk/europepmc/webservices/rest/PMC9813045/textMinedTerms?format=json" \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const j=JSON.parse(s);const ch=((j.semanticTypeList&&j.semanticTypeList.semanticType)||[]).find(t=>/chem/i.test(t.name));console.log("    chemicals:",ch?ch.tmSummary.map(x=>x.term).join(", "):"none/none-OA");}catch(e){console.log("    none/parse-err")}})'
          echo
          echo "===== 3) Europe PMC: primary pazopanib/sunitinib EMC reports ====="
          curl -s -m 40 -G "https://www.ebi.ac.uk/europepmc/webservices/rest/search" \
            --data-urlencode 'query="extraskeletal myxoid chondrosarcoma" AND (pazopanib OR sunitinib OR anti-angiogenic OR antiangiogenic)' \
            --data-urlencode 'format=json' --data-urlencode 'pageSize=25' --data-urlencode 'resultType=lite' -o pz.json
          echo "  raw head: $(head -c 120 pz.json)"
          node -e 'const fs=require("fs");try{const j=JSON.parse(fs.readFileSync("./pz.json","utf8"));console.log("  hitCount:",j.hitCount);const r=(j.resultList&&j.resultList.result)||[];r.forEach(x=>console.log("   ",(x.pmid||x.id||"?"),"|",x.pubYear||"?","|",(x.title||"").replace(/\s+/g," ").slice(0,95)));}catch(e){console.log("  PARSE-ERR",e.message)}'
          echo
          echo "===== 4) Crossref bibliographic search: resolve DOIs for novel-modalities refs ====="
          # Find the DOI for each cited title so the manuscript can cite verified DOIs (not memorised ones).
          while IFS='#' read -r q note; do
            [ -z "$q" ] && continue
            echo "  query: $q"
            echo "    expect: $note"
            curl -s -m 30 -A "rare-cancers-verify/1.0 (mailto:trimcrae@gmail.com)" -G "https://api.crossref.org/works" \
              --data-urlencode "query.bibliographic=$q" --data-urlencode "filter=type:journal-article" --data-urlencode "rows=3" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const items=JSON.parse(s).message.items||[];const m=items.find(x=>!/Faculty Opinions/i.test(((x["container-title"]||[])[0]||""))) || items[0] || {};console.log("    -> DOI:",m.DOI,"|",((m.title||[])[0]||"?").slice(0,80),"|",((m["container-title"]||[])[0]||"?"),"|",(((m.published||m.issued||{})["date-parts"]||[["?"]])[0][0]));}catch(e){console.log("    PARSE-ERR")}})'
          done <<'REFS'
          Structure and function of Nurr1 identifies a class of ligand-independent nuclear receptors#Wang 2003 Nature, Nurr1 LBD no classical pocket
          Cancer-specific retargeting of BAF complexes by a prion-like domain#Boulay 2017 Cell, EWS-FLI1 prion-like domain
          Phase transition of a disordered nuage protein generates environmentally responsive membraneless organelles#Kwon 2013 Cell, low-complexity domain phase transition
          Highly accurate protein structure prediction with AlphaFold#Jumper 2021 Nature, AlphaFold
          AlphaFold Protein Structure Database massively expanding the structural coverage of protein-sequence space#Varadi 2022 NAR, AFDB
          Fpocket an open source platform for ligand pocket detection#Le Guilloux 2009 BMC Bioinformatics
          MHCflurry 2.0 improved pan-allele prediction of MHC class I-presented peptides#O'Donnell 2020 Cell Systems
          PROTAC targeted protein degraders the past is prologue#Bekes Crews 2022 Nat Rev Drug Discov
          The dTAG system for immediate and target-specific protein degradation#Nabet 2018 Nat Chem Biol
          Antisense technology an overview and prospectus#Crooke 2021 Nat Rev Drug Discov
          REFS
          echo
          echo "===== 5) Targeted resolution for the 2 stragglers (author + title; print top 5) ====="
          # Boulay 2017 Cell and Jumper 2021 Nature returned near-title decoys (an AACR
          # abstract; a 2023 assembly paper). Constrain by author + title and print the
          # top journal-article candidates with container + year so the right DOI is picked.
          while IFS='#' read -r title author note; do
            [ -z "$title" ] && continue
            echo "  >>> $note"
            echo "      title=\"$title\" author=\"$author\""
            curl -s -m 30 -A "rare-cancers-verify/1.0 (mailto:trimcrae@gmail.com)" -G "https://api.crossref.org/works" \
              --data-urlencode "query.bibliographic=$title" --data-urlencode "query.author=$author" \
              --data-urlencode "filter=type:journal-article" --data-urlencode "rows=5" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const items=JSON.parse(s).message.items||[];items.forEach((m,i)=>console.log("      ["+i+"] DOI:",m.DOI,"|",((m.title||[])[0]||"?").slice(0,70),"|",((m["container-title"]||[])[0]||"?"),"|",(((m.published||m.issued||{})["date-parts"]||[["?"]])[0][0])))}catch(e){console.log("      PARSE-ERR")}})'
          done <<'STRAG'
          Cancer-specific retargeting of BAF complexes by a prion-like domain#Boulay#Boulay 2017 Cell (want container=Cell, year 2017, NOT an Abstract)
          Highly accurate protein structure prediction with AlphaFold#Jumper#Jumper 2021 Nature (want container=Nature, year 2021)
          STRAG
          echo
          echo "===== 6) Treatment-precedent refs for the personalised-immunotherapy framing ====="
          while IFS='#' read -r title author note; do
            [ -z "$title" ] && continue
            echo "  >>> $note"
            curl -s -m 30 -A "rare-cancers-verify/1.0 (mailto:trimcrae@gmail.com)" -G "https://api.crossref.org/works" \
              --data-urlencode "query.bibliographic=$title" --data-urlencode "query.author=$author" \
              --data-urlencode "filter=type:journal-article" --data-urlencode "rows=5" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const items=JSON.parse(s).message.items||[];items.forEach((m,i)=>console.log("      ["+i+"] DOI:",m.DOI,"|",((m.title||[])[0]||"?").slice(0,72),"|",((m["container-title"]||[])[0]||"?"),"|",(((m.published||m.issued||{})["date-parts"]||[["?"]])[0][0])))}catch(e){console.log("      PARSE-ERR")}})'
          done <<'TREAT'
          Individualised neoantigen therapy mRNA-4157 V940 plus pembrolizumab in resected melanoma#Weber#mRNA-4157/KEYNOTE-942 melanoma (Lancet 2024)
          Personalized RNA neoantigen vaccines stimulate T cells in pancreatic cancer#Rojas#autogene cevumeran, pancreatic (Nature 2023)
          TREAT
          echo
          echo "===== 7) NR4A3 DEGRADER manuscript refs (verify cited IDs + resolve [to-confirm]) ====="
          echo "  -- 7a) Europe PMC core for cited PMIDs/PMCIDs (author | title | journal | year | DOI) --"
          for id in 30664630 30416039 17515897 PMC6341107 PMC7864866 PMC4535767 PMC8006468 PMC7565926; do
            echo -n "    $id -> "
            curl -s -m 30 -G "https://www.ebi.ac.uk/europepmc/webservices/rest/search" \
              --data-urlencode "query=$id" --data-urlencode "format=json" --data-urlencode "resultType=core" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const r=JSON.parse(s).resultList.result[0]||{};console.log((r.authorString||"?").split(",")[0],"|",(r.title||"?").slice(0,66),"|",((r.journalInfo||{}).journal||{}).title||r.bookOrReportDetails||"?","|",r.pubYear||"?","| DOI:",r.doi||"?");}catch(e){console.log("parse-err")}})'
          done
          echo "  -- 7b) Crossref resolve the [to-confirm] titles to DOI | journal | year --"
          while IFS='#' read -r q note; do
            [ -z "$q" ] && continue
            echo "    [$note]"
            curl -s -m 30 -A "rare-cancers-verify/1.0 (mailto:trimcrae@gmail.com)" -G "https://api.crossref.org/works" \
              --data-urlencode "query.bibliographic=$q" --data-urlencode "filter=type:journal-article" --data-urlencode "rows=2" \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const m=(JSON.parse(s).message.items||[])[0]||{};console.log("      -> DOI:",m.DOI,"|",((m.title||[])[0]||"?").slice(0,72),"|",((m["container-title"]||[])[0]||"?"),"|",(((m.published||m.issued||{})["date-parts"]||[["?"]])[0][0]));}catch(e){console.log("      PARSE-ERR")}})'
          done <<'NR4A'
          In Silico Adoption of an Orphan Nuclear Receptor NR4A1#PMC4535767 Nur77 cryptic pocket MD
          Assessment of NR4A Ligands that Directly Bind and Modulate the Orphan Nuclear Receptor Nurr1#Munoz-Tello amodiaquine NMR
          Oncogenic orphan nuclear receptor NR4A3 interacts and cooperates with MYB in acinic cell carcinoma#Haller 2020 NR4A3-MYB AciCC
          NR4A transcription factors limit CAR T cell function in solid tumours#Chen 2019 Nature triple-NR4A
          NR4A