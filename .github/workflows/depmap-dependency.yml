name: DepMap — sarcoma dependency transfer prior

# Tests whether the chromatin/transcriptional machinery the EWSR1 prion-like domain recruits
# (BRD9/ncBAF, BET, CDK9, p300) is selectively essential across DepMap sarcoma lineages — a
# transfer prior for EWSR1::NR4A3 EMC, which has no DepMap line. Internet-only (the dev sandbox
# can't reach figshare/DepMap). Results JSON + chart are pushed to the `modalities-cache` branch:
#   git fetch origin modalities-cache && git checkout modalities-cache -- research/modalities/

on:
  workflow_dispatch:
  push:
    branches: [claude/rare-cancer-info-hub-vb8uui]
    paths:
      - research/modalities/depmap_sarcoma_dependency.py
      - .github/workflows/depmap-dependency.yml

permissions:
  contents: write

concurrency:
  group: depmap-dependency
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandas + matplotlib + biopython
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib biopython

      - name: DepMap sarcoma dependency transfer prior (+ fusion-addiction proxy)
        run: python research/modalities/depmap_sarcoma_dependency.py

      - name: DepMap target-expression mining (surface/CTA/effector targets)
        run: python research/modalities/depmap_target_expression.py

      - name: NR4A safety genetics (gnomAD constraint + IMPC single-KO + HPA expression)
        if: always()
        run: python research/modalities/nr4a_safety_genetics.py || echo "safety-genetics soft-fail (network); non-blocking"

      - name: NR4A3 resistance / escape-liability map (pocket-residue conservation)
        if: always()
        run: python research/modalities/nr4a3_resistance_map.py || echo "resistance-map soft-fail (network); non-blocking"

      - name: CRBN E3-machinery tissue expression (degrader-completeness E6)
        if: always()
        run: python research/modalities/nr4a3_e3_expression.py || echo "e3-expression soft-fail (network); non-blocking"

      - name: Publish results to modalities-cache branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/res"
          cp research/modalities/depmap-sarcoma-dependency.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/depmap-sarcoma-dependency.png "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/depmap-target-expression.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/depmap-target-expression.png "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/nr4a-safety-genetics.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/nr4a-resistance-map.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          cp research/modalities/nr4a-e3-expression.json "$RUNNER_TEMP/res/" 2>/dev/null || true
          git fetch origin modalities-cache || true
          rm -f research/modalities/*.json research/modalities/*.png
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP"/res/*.json research/modalities/ 2>/dev/null || true
          cp "$RUNNER_TEMP"/res/*.png research/modalities/ 2>/dev/null || true
          git add research/modalities/depmap-sarcoma-dependency.json 2>/dev/null || true
          git add research/modalities/depmap-sarcoma-dependency.png 2>/dev/null || true
          git add research/modalities/depmap-target-expression.json 2>/dev/null || true
          git add research/modalities/depmap-target-expression.png 2>/dev/null || true
          git add research/modalities/nr4a-safety-genetics.json 2>/dev/null || true
          git add research/modalities/nr4a-resistance-map.json 2>/dev/null || true
          git add research/modalities/nr4a-e3-expression.json 2>/dev/null || true
          git commit -m "DepMap + NR4A safety-genetics + resistance-map + E3-expression compute" || { echo "no changes"; exit 0; }
          git push origin modalities-cache
