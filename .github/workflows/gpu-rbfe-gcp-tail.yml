name: GCP RBFE — tail live serial (monitor a running L4 VM)

# The GCP analog of tail-cloudwatch: reads the LIVE serial console of a running gpu-rbfe-gcp VM so we can watch
# MD progress (λ-window / openmmtools iteration / spot-driver checkpoint commits) WITHOUT waiting for the main
# job's in-progress logs (GitHub 404s those). Auto-finds the running gcp-rbfe-* instance (or pass vm+zone).
# Read-only: dumps a filtered + raw serial tail, then exits. No teardown (never touches the running job's VM).

on:
  workflow_dispatch:
    inputs:
      vm:     { description: "instance name (blank = auto-find the running gcp-rbfe-*)", default: "", required: false }
      zone:   { description: "zone (blank = auto)", default: "", required: false }
      grep:   { description: "extra serial grep filter", default: "", required: false }
      delete: { description: "1 = DELETE the found VM after showing status (cleanup a finished detached leg)", default: "0", required: false }

permissions:
  id-token: write
  contents: read

jobs:
  tail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878095411563/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gpu-runner@project-a7ebde30-e2ed-4b8d-9a9.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Tail serial
        env:
          VM_IN: ${{ github.event.inputs.vm }}
          ZONE_IN: ${{ github.event.inputs.zone }}
          GREP_IN: ${{ github.event.inputs.grep }}
          DELETE_IN: ${{ github.event.inputs.delete }}
        run: |
          set -eo pipefail
          export CLOUDSDK_CORE_PROJECT=project-a7ebde30-e2ed-4b8d-9a9
          VM="$VM_IN"; ZONE="$ZONE_IN"
          if [ -z "$VM" ]; then
            echo "--- auto-finding running gpu-rbfe VM ---"
            LINE=$(gcloud compute instances list --filter="name~'^gcp-rbfe-' AND status=RUNNING" \
              --format="csv[no-heading](name,zone.basename(),status)" 2>/dev/null | head -1)
            echo "found: ${LINE:-<none>}"
            VM=$(echo "$LINE" | cut -d, -f1); ZONE=$(echo "$LINE" | cut -d, -f2)
          fi
          [ -z "$VM" ] && { echo "::warning::no running gpu-rbfe VM found"; exit 0; }
          echo "VM=$VM ZONE=$ZONE"
          gcloud compute instances describe "$VM" --zone="$ZONE" \
            --format="value(status,machineType.basename(),lastStartTimestamp)" 2>/dev/null || true
          OUT=$(gcloud compute instances get-serial-port-output "$VM" --zone="$ZONE" 2>/dev/null || true)
          echo "=================== RBFE PROGRESS (filtered) ==================="
          # openmmtools MultiState logs the iteration ('Iteration N/M'); the spot-driver logs warmup/barrier
          # commits; analyze/setup mark phase boundaries. This tells us exactly how far the MD has gotten.
          FILT="Iteration [0-9]|iteration [0-9]|spot-driver|barrier|committed checkpoint|WARMUP|PRODUCTION|\[rbfe\]|analyze|OpenMM platform|mapped|Solving|Replica|mixing|ns/day|estimated|equilibrat|ETA|Traceback|Error|error|nan|NaN"
          [ -n "$GREP_IN" ] && FILT="$FILT|$GREP_IN"
          printf '%s' "$OUT" | grep -aE "$FILT" | tail -40 || echo "(no progress markers yet — still in env build?)"
          echo "=================== RAW SERIAL TAIL (last 20) ==================="
          printf '%s' "$OUT" | tail -20 || true
          # The REAL liveness signal (the leg run captures MD output into a shell var, so serial goes quiet mid-run):
          # the spot-safe driver commits a checkpoint to GCS every ~20 iterations. Latest COMMITTED.json + its
          # timestamp = MD alive + how far it's gotten (the GCP analog of the AWS ckpt census / mode=forensic).
          echo "=================== GCS CHECKPOINT CENSUS (liveness) ==================="
          B=gs://project-a7ebde30-e2ed-4b8d-9a9-rbfe-ckpt/valA-tyk2
          echo "--- FULL recursive listing of $B/ (robust; no glob) ---"
          ALL=$(gcloud storage ls --recursive "$B/" 2>&1 || true)
          printf '%s\n' "$ALL" | tail -40
          echo "--- object count under $B/ ---"
          printf '%s\n' "$ALL" | grep -ac "gs://" || echo 0
          echo "--- FURTHEST checkpoint per leg/phase (the live progress) ---"
          for LG in complex solvent; do
            for PH in warmup production; do
              MAX=$(printf '%s\n' "$ALL" | grep -aoE "valA-tyk2/$LG/$PH/iter-[0-9]+" | grep -aoE "[0-9]+\$" | sort -n | tail -1)
              [ -n "$MAX" ] && echo "  $LG/$PH: furthest committed iteration = $MAX"
            done
          done
          printf '%s\n' "$ALL" | grep -aoE "valA-tyk2/(complex|solvent)/(warmup|production)/iter-[0-9]+" | sort -u | wc -l | xargs echo "total committed boundaries:"
          echo "--- completed leg results ---"
          printf '%s\n' "$ALL" | grep -aE "results/.*\.json" || echo "(no completed leg JSONs persisted)"
          if [ "$DELETE_IN" = 1 ] && [ -n "$VM" ]; then
            echo "--- DELETE requested: tearing down $VM in $ZONE ---"
            gcloud compute instances delete "$VM" --zone="$ZONE" --quiet 2>/dev/null && echo "deleted $VM" || echo "delete failed / already gone"
          fi
          # ===== CHECKPOINT TIMING PROBE: interval between commits = MD + commit overhead per 20 iters =====
          echo "=================== CHECKPOINT TIMING PROBE (complex/production) ==================="
          echo "commit timestamps (gap between consecutive = wall time per 20-iter chunk incl. validate+sha256+upload):"
          gcloud storage ls -l "$B/complex/production/**/COMMITTED.json" 2>/dev/null \
            | grep -aE "gs://.*COMMITTED.json" | tail -12 || echo "(no production commits yet)"
          echo "--- latest complex checkpoint FILE SIZES (growing = growing per-commit overhead) ---"
          LATEST=$(printf '%s\n' "$ALL" | grep -aoE "valA-tyk2/complex/production/iter-[0-9]+" | sort -u | tail -1)
          [ -n "$LATEST" ] && gcloud storage ls -l "gs://project-a7ebde30-e2ed-4b8d-9a9-rbfe-ckpt/$LATEST/**" 2>/dev/null | grep -aE "\.chk|\.nc" | tail -4
