name: GPU — NR4A3 ternary (Boltz, AWS SageMaker)

# Runs the NR4A3–PROTAC–E3 ternary Boltz-2 prediction as a managed AWS SageMaker Processing job:
# AWS provisions a GPU, enforces a hard MaxRuntime cap, and tears the instance down on completion.
# Manual-dispatch. REQUIRES the same repo secrets as the MD job:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN  (region is a workflow input)
# New AWS accounts need a GPU service-quota increase first — see deploy/aws-sagemaker-setup.md.
#
# With no protac_smiles, only the checkable CRBN+lenalidomide control runs. Supply a PROTAC SMILES
# (once a selective NR4A3 warhead is designed) to run the real NR4A3-LBD+CRBN+PROTAC ternary.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "ternary (NR4A+CRBN+PROTAC) | binary (NR4A-LBD + warhead co-fold, AF3-class pose cross-check)"
        default: "ternary"
        required: false
      ligand_sdf_key:
        description: "binary mode: S3 key of the docked SDF to read the warhead SMILES from"
        default: "nr4a3-denovo-matrix-v2/docked_nr4a3.sdf"
        required: false
      ligand_name:
        description: "binary mode: ligand record name in the SDF"
        default: "denovo_401"
        required: false
      protac_smiles:
        description: "PROTAC SMILES for the real ternary (blank = run CRBN+ligand control only)"
        default: ""
        required: false
      instance:
        description: "SageMaker GPU instance type (account has ml.g5.xlarge quota; ml.g5.2xlarge is 0)"
        default: "ml.g5.xlarge"
        required: false
      region:
        description: "AWS region — must match where you deployed the stack + got the GPU quota"
        default: "us-east-2"
        required: false
      ternary_script:
        description: "science script to run (default nr4a3_ternary.py = CRBN; nrv04_ternary.py = NR-V04/VHL benchmark)"
        default: ""
        required: false
      ternary_extra_args:
        description: "extra args for the script, e.g. '--pilot' (NR-V04 single-leg-first: control + NR4A1 only)"
        default: ""
        required: false
      seeds:
        description: "NR-V04 benchmark: comma-sep diffusion seeds = the ternary ensemble per system"
        default: ""
        required: false
      output_prefix:
        description: "S3 output prefix override (e.g. nrv04-ternary-pilot)"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3 rdkit   # v3 SDK dropped the FrameworkProcessor paths this uses; rdkit = binary-mode SMILES extraction
      - name: Submit SageMaker ternary job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          INSTANCE: ${{ inputs.instance }}
          PROTAC_SMILES: ${{ inputs.protac_smiles }}
          TERNARY_MODE: ${{ inputs.mode }}
          LIGAND_SDF_KEY: ${{ inputs.ligand_sdf_key }}
          LIGAND_NAME: ${{ inputs.ligand_name }}
          TERNARY_SCRIPT: ${{ inputs.ternary_script }}
          TERNARY_EXTRA_ARGS: ${{ inputs.ternary_extra_args }}
          SEEDS: ${{ inputs.seeds }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first (region is a workflow input). See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_ternary_sagemaker.py
