name: Verify metad S3 outputs (AWS)

# Read-only check of what the metad runs produced: lists s3://<default-bucket>/*-metad/ and reports the
# recent SageMaker processing jobs' status (Completed vs Stopped/MaxRuntimeExceeded). Used to confirm an
# opened ensemble actually uploaded before launching the matrix. REQUIRES secrets: AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY (region is a workflow input). Commits nothing.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3
      - name: List metad S3 outputs + job statuses
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY repo secrets first."
            exit 1
          fi
          python research/modalities/verify_metad_outputs.py
