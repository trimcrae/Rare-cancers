name: ABFE progress snapshot (per-replicate iteration progress)

# Lightweight LIVE progress view for the running ABFE diagnostic: lists each replicate's per-window checkpoints
# in S3, computes each leg's completion (MIN window iteration / target — the reducible depth), and renders a
# progress bar chart. Publishes to modalities-cache (like abfe-plot-aws). NO reduce/MBAR — just iteration counts,
# so it updates meaningfully every hour even mid-run (unlike the convergence plot, which needs all windows even).
# REQUIRES secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "comma-separated replicate tags"
        default: "nr4a3-abfe,nr4a3-abfe-r2,nr4a3-abfe-r3"
        required: false
      target:
        description: "target n_iter (full bar)"
        default: "2000"
        required: false
      windows:
        description: "λ-windows per leg (12 = standard schedule, 16 = dense NR4A2 λ-repair)"
        default: "12"
        required: false
      state_key:
        description: "S3 key for the last-hour Δ-shading state (unique per tag-group so groups don't clobber)"
        default: "nr4a3-abfe/progress_state.json"
        required: false
      out_name:
        description: "PNG filename published to modalities-cache"
        default: "abfe_progress.png"
        required: false
      region:
        description: "AWS region"
        default: "us-east-2"
        required: false

permissions:
  contents: write

concurrency:
  # scope by output PNG so different tag-groups (8xtt vs nr4a2rep) don't cancel each other; only
  # back-to-back renders of the SAME group serialize (they share a state_key).
  group: abfe-progress-${{ inputs.out_name || 'abfe_progress.png' }}
  cancel-in-progress: true

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install matplotlib boto3
      - name: Gather progress + render
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region || 'us-east-2' }}
          TAGS: ${{ inputs.tags || 'nr4a3-abfe,nr4a3-abfe-r2,nr4a3-abfe-r3' }}
          TARGET: ${{ inputs.target || '2000' }}
          WINDOWS: ${{ inputs.windows || '12' }}
          STATE_KEY: ${{ inputs.state_key || 'nr4a3-abfe/progress_state.json' }}
          OUT_NAME: ${{ inputs.out_name || 'abfe_progress.png' }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then echo "::error::add AWS secrets"; exit 1; fi
          python - <<'PY'
          import os, sys, json, boto3, datetime
          import matplotlib; matplotlib.use("Agg"); import matplotlib.pyplot as plt
          from matplotlib.patches import Patch
          sys.path.insert(0, "research/modalities"); import abfe_eta as ae   # pure ETA math (unit-tested)
          region = os.environ.get("AWS_DEFAULT_REGION", "us-east-2")
          bucket = f"sagemaker-{region}-{boto3.client('sts').get_caller_identity()['Account']}"
          s3 = boto3.client("s3")
          now = datetime.datetime.utcnow()
          STATE_KEY = os.environ.get("STATE_KEY", "nr4a3-abfe/progress_state.json")  # {_ts, tag:{leg:{pct,iters}}}
          try:
              prev = json.loads(s3.get_object(Bucket=bucket, Key=STATE_KEY)["Body"].read())
          except Exception:
              prev = {}
          # elapsed since the prior snapshot (for the iters/hour burn rate); None if no/invalid prior timestamp
          try:
              dt_hours = (now - datetime.datetime.fromisoformat(prev["_ts"])).total_seconds() / 3600.0
          except Exception:
              dt_hours = None
          def _prev_leg(tag, leg):
              """(prev_pct, prev_iters) for a leg, tolerating the OLD schema (bare pct float) and the new
              {pct,iters} dict. Missing -> (None, None)."""
              v = prev.get(tag, {}).get(leg) if isinstance(prev.get(tag), dict) else None
              if isinstance(v, dict):
                  return v.get("pct"), v.get("iters")
              if isinstance(v, (int, float)):
                  return float(v), None
              return None, None
          eta_lines = []                                         # per-leg ETA strings for the workflow log
          target = int(os.environ["TARGET"])
          tags = [t.strip() for t in os.environ["TAGS"].split(",") if t.strip()]
          LEG_ORDER = ["complex-nr4a3", "complex-nr4a1", "complex-nr4a2", "solvent"]
          NW = int(os.environ.get("WINDOWS", "12"))              # λ-windows per leg (12 standard / 16 dense repair)
          data = {}                                              # tag -> {leg -> (capped_total, n_done, deepest_raw)}
          for tag in tags:
              wins = {}                                          # leg -> [linecount per window]
              for page in s3.get_paginator("list_objects_v2").paginate(Bucket=bucket, Prefix=f"{tag}/ckpt/"):
                  for o in page.get("Contents", []):
                      k = o["Key"]
                      if k.endswith(".jsonl") and "/window_" in k:
                          leg = k.split("/ckpt/")[1].split("/")[0]        # complex-nr4a3 | solvent
                          n = s3.get_object(Bucket=bucket, Key=k)["Body"].read().count(b"\n")
                          wins.setdefault(leg, []).append(n)
              legs = {}
              for leg, c in wins.items():                         # missing windows contribute 0
                  # CAP each window at `target` before summing: a window's log can hold MORE than `target`
                  # lines (duplicate iteration-records left by crash/resume/recovery cycles), which would
                  # otherwise inflate the bar past 100% before all windows are actually complete. Capping makes
                  # the % a TRUE completion fraction — it reaches 100% only when every window has ≥ target
                  # samples. `deepest` keeps the raw max so the over-count is still visible for diagnostics.
                  legs[leg] = (sum(min(x, target) for x in c), sum(1 for x in c if x >= target), max(c) if c else 0)
              if legs:
                  data[tag] = legs
          print("progress:", data)

          # render: grouped horizontal bars = TRUE leg %-complete = total iters / (NW × target)
          rows = []
          for tag in tags:
              if tag not in data:
                  rows.append((tag, None, None)); continue       # not started
              for leg in LEG_ORDER:
                  if leg in data[tag]:
                      rows.append((tag, leg, data[tag][leg]))
          fig, ax = plt.subplots(figsize=(11, max(3, 0.5 * len(rows) + 1.5)))
          COL = {"nr4a3-abfe": "#0072B2", "nr4a3-abfe-r2": "#009E73", "nr4a3-abfe-r3": "#CC79A7"}
          NAME = {"nr4a3-abfe": "r1", "nr4a3-abfe-r2": "r2", "nr4a3-abfe-r3": "r3"}
          full = NW * target
          ylabels, y = [], 0
          cur_state = {}                                          # this snapshot's per-leg pct → written back to S3
          for tag, leg, v in rows:
              if leg is None:
                  ylabels.append(f"{NAME.get(tag,tag)}  (not started)")
                  ax.barh(y, 0, color="#ccc"); y += 1; continue
              total, ndone, deepest = v
              pct = 100.0 * total / full
              prev_pct, prev_iters = _prev_leg(tag, leg)
              pp = min(prev_pct if prev_pct is not None else pct, pct)   # last-hour pct (no Δ on first run)
              rate = ae.per_interval_rate(total, prev_iters, dt_hours)   # iters/hour since the last snapshot
              eta_h = ae.hours_to_target(total, full, rate)
              col = COL.get(tag, "#888")
              ax.barh(y, pp, color=col, alpha=0.9)               # progress before this hour (solid)
              if pct - pp > 0.05:                                # gain in the last hour (lighter + hatched)
                  ax.barh(y, pct - pp, left=pp, color=col, alpha=0.35, edgecolor=col, linewidth=0.8, hatch="////")
              dtxt = f"   +{pct-pp:.0f}% ↑" if pct - pp > 0.05 else ""
              etatxt = f"  ETA {ae.fmt_hours(eta_h)}" if eta_h is not None else ""
              ax.text(pct + 1.0, y, f"{pct:.0f}%  ({ndone}/{NW} done, deepest {deepest}){dtxt}{etatxt}",
                      va="center", fontsize=8)
              ylabels.append(f"{NAME.get(tag,tag)} · {leg.replace('complex-','')}")
              eta_lines.append((f"{NAME.get(tag,tag)}·{leg.replace('complex-','')}", pct, total, full, rate, eta_h))
              cur_state.setdefault(tag, {})[leg] = {"pct": round(pct, 3), "iters": int(total)}
              y += 1
          cur_state["_ts"] = now.isoformat()
          try:
              s3.put_object(Bucket=bucket, Key=STATE_KEY, Body=json.dumps(cur_state).encode())
          except Exception as e:
              print("state write failed:", e)
          # ETA summary for the hourly report (UTC finish; the agent converts to ET). Fleet ETA = slowest leg.
          finite = [x for x in eta_lines if x[5] not in (None, float("inf"))]
          print("=== ETA (iters/hour burn rate vs last snapshot) ===")
          if dt_hours is None:
              print("  baseline snapshot — no prior state; ETAs available next hour.")
          for lbl, pct, tot, full_, rate, eta_h in eta_lines:
              rtxt = f"{rate:.0f} it/h" if rate else ("restart/no-gain" if rate == 0 else "n/a")
              fin = (now + datetime.timedelta(hours=eta_h)).strftime("%m-%d %H:%M UTC") if eta_h not in (None, float("inf")) else ""
              print(f"  {lbl:<24} {pct:5.1f}%  {tot}/{full_} it  rate={rtxt:<16} ETA={ae.fmt_hours(eta_h)}  {fin}")
          if finite:
              slow = max(finite, key=lambda x: x[5])
              fleet_fin = (now + datetime.timedelta(hours=slow[5])).strftime("%m-%d %H:%M UTC")
              print(f"  FLEET (slowest leg {slow[0]}): ~{ae.fmt_hours(slow[5])} → {fleet_fin}")
          ax.legend(handles=[Patch(facecolor="#888", alpha=0.9, label="before this hour"),
                             Patch(facecolor="#888", alpha=0.35, hatch="////", label="gained in last hour")],
                    loc="lower right", fontsize=8, frameon=True)
          ax.axvline(100, color="#666", ls="--", lw=1)
          ax.set_yticks(range(len(ylabels))); ax.set_yticklabels(ylabels, fontsize=9)
          ax.set_xlim(0, 118); ax.invert_yaxis()
          ax.set_xlabel(f"leg %-complete = total iterations across all {NW} λ-windows / ({NW} × {target})")
          stamp = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          ax.set_title(f"denovo_401 ABFE — replicate progress toward n_iter={target}  ·  {stamp}")
          ax.grid(axis="x", alpha=0.2)
          fig.tight_layout()
          out_name = os.environ.get("OUT_NAME", "abfe_progress.png")
          fig.savefig(f"research/modalities/{out_name}", dpi=150, bbox_inches="tight")
          print(f"wrote research/modalities/{out_name}")
          PY
      - name: Publish PNG to modalities-cache branch
        if: always()
        env:
          OUT_NAME: ${{ inputs.out_name || 'abfe_progress.png' }}
        run: |
          set -e
          [ -f "research/modalities/$OUT_NAME" ] || { echo "no PNG"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp "research/modalities/$OUT_NAME" "$RUNNER_TEMP/$OUT_NAME"
          rm -f "research/modalities/$OUT_NAME"
          git fetch origin modalities-cache || true
          if git show-ref --verify --quiet refs/remotes/origin/modalities-cache; then
            git checkout -f -B modalities-cache origin/modalities-cache
          else
            git checkout --orphan modalities-cache && git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p research/modalities
          cp "$RUNNER_TEMP/$OUT_NAME" "research/modalities/$OUT_NAME"
          git add "research/modalities/$OUT_NAME"
          git commit -m "ABFE progress snapshot ($OUT_NAME)" || { echo "no change"; exit 0; }
          git push origin modalities-cache
