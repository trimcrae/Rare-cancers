name: Yank env check (free — validate FEP library installs)

# De-risk the Yank dependency BEFORE rewriting the FEP harness around it: build a conda env with yank and
# confirm it imports + exposes ExperimentBuilder, and report which openmm/openmmtools/numpy it pulls (Yank
# ~2020 may or may not solve against a modern stack). Free GitHub runner, no GPU, no AWS.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install miniforge
        run: |
          curl -L -o /tmp/mf.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
          bash /tmp/mf.sh -b -p "$HOME/mf"
          echo "$HOME/mf/bin" >> "$GITHUB_PATH"
      - name: Build the EXACT fep env + deep-import yank (batch-catch import/version issues for free)
        run: |
          # Build the exact env entry_fep.py creates, then FULLY import yank (exercises collections.MutableMapping
          # [py<3.10], pkg_resources [setuptools<81], alchemy._ALCHEMICAL_REGION_ARGS [openmmtools 0.21.2], and
          # the yank YAML machinery). This catches the whole import/version-decay class for free (~10 min) instead
          # of ~$0.20 + 30 min per SageMaker shard. Cannot test GPU/LEaP/HREX — that still needs a real shard.
          set -x
          conda create -y -n fep --override-channels -c conda-forge \
            python=3.9 yank openmmtools=0.21.2 ocl-icd-system openbabel "setuptools<81" || { echo "::error::exact fep env SOLVE FAILED"; exit 1; }
          echo "=== resolved versions ==="
          conda list -n fep | grep -Ei "^(python|yank|openmm|openmmtools|ambertools|setuptools|openbabel|numpy|pymbar) " | awk '{print "  "$1" "$2}'
          echo "=== deep import check ==="
          conda run -n fep python -c "import yank; from yank.experiment import ExperimentBuilder; from openmmtools import alchemy; import openmm; assert hasattr(alchemy,'_ALCHEMICAL_REGION_ARGS'); print('DEEP_IMPORT_OK yank', yank.__version__, 'openmm', openmm.version.version)"
          echo "=== obabel CLI present? ==="
          conda run -n fep bash -c "which obabel && obabel -V" 2>&1 | sed 's/^/  /'
