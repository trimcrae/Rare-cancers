name: Atlas data (GEO reprocess + EuropePMC full-text verify)

# Two internet-needing, CPU-only atlas analyses the dev sandbox can't run (egress proxy blocks
# NCBI/GEO + PMC/EuropePMC):
#   1. expression_reprocess.py — reprocess GSE4303/GSE24369 (rank-based EMC signature, per platform)
#   2. fulltext_verify.py       — pull PRIMARY full text (EuropePMC) for the abstract-level-only claims
# Pure stdlib (urllib); no pip, no AWS/GPU. Results are committed straight back to the TRIGGERING
# branch under research/atlas/_generated/ (this is a feature branch, so that's fine and keeps the
# raw outputs next to the atlas that interprets them).

on:
  workflow_dispatch:
  # Also trigger on push to this feature branch (workflow_dispatch via API needs the file on the
  # default branch; this branch-scoped push trigger does not). paths is limited to the scripts +
  # this workflow so the CI's own commit-back (which only touches _generated/) cannot re-trigger a loop.
  push:
    branches:
      - claude/emc-research-strategy-kdz9kn
    paths:
      - 'research/atlas/expression_reprocess.py'
      - 'research/atlas/fulltext_verify.py'
      - 'research/atlas/panel_dependency.py'
      - 'research/atlas/antigen_expand.py'
      - 'research/atlas/antigen_mhcii.py'
      - '.github/workflows/atlas-data.yml'

permissions:
  contents: write

concurrency:
  group: atlas-data-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Unit 1: the fast, low-memory work (GSE4303 + full-text verify) — committed FIRST so a
      #     later runner kill on the heavy dataset cannot lose it (checkpoint + push-incrementally). ---
      - name: Reprocess GSE4303
        working-directory: research/atlas
        run: python expression_reprocess.py GSE4303 || echo "GSE4303 failed (continuing)"

      - name: Primary full-text verification (EuropePMC)
        working-directory: research/atlas
        run: python fulltext_verify.py || echo "fulltext verify failed (continuing)"

      - name: Commit unit 1 (GSE4303 + full-text verify)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Atlas data (CI): GSE4303 reprocess + EuropePMC full-text verification"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done

      # --- Unit 2: the heavy dataset (GSE24369) — streamed parse keeps memory flat; committed on its own. ---
      - name: Reprocess GSE24369
        working-directory: research/atlas
        run: python expression_reprocess.py GSE24369 || echo "GSE24369 failed (continuing)"

      - name: Commit unit 2 (GSE24369)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Atlas data (CI): GSE24369 reprocess"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done

      # --- Unit 3: validation-panel genetic dependency (DepMap; needs pandas + a large download). ---
      - name: Install pandas
        if: always()
        run: pip install --quiet pandas
      - name: Panel target dependency (DepMap, strategy step E)
        if: always()
        run: python research/atlas/panel_dependency.py || echo "panel dependency failed (continuing)"
      - name: Commit unit 3 (panel dependency)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Atlas data (CI): validation-panel DepMap dependency"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done

      # --- Unit 4: fusion-junction antigen, BOTH subtypes (MHC-I via MHCflurry). ---
      - name: Install MHCflurry + fetch class-I models
        if: always()
        run: |
          pip install --quiet mhcflurry || echo "mhcflurry install failed"
          mhcflurry-downloads fetch models_class1_presentation || echo "model fetch failed"
      - name: Fusion-junction antigen EWSR1 vs TAF15 (MHC-I)
        if: always()
        run: python research/atlas/antigen_expand.py || echo "antigen expand failed (continuing)"
      - name: Commit unit 4 (antigen EWSR1 vs TAF15)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Atlas data (CI): fusion-junction antigen EWSR1 vs TAF15 (MHC-I)"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done

      # --- Unit 5: class-II (CD4 help) junction epitopes, both subtypes. MHCnuggets in an ISOLATED
      #     venv so its TensorFlow pin can't clash with MHCflurry from unit 4. Best-effort. ---
      - name: Class-II (CD4) junction epitopes EWSR1 vs TAF15 (isolated venv)
        if: always()
        run: |
          python -m venv "$RUNNER_TEMP/mnv"
          "$RUNNER_TEMP/mnv/bin/pip" install --quiet mhcnuggets || echo "mhcnuggets install failed"
          "$RUNNER_TEMP/mnv/bin/python" research/atlas/antigen_mhcii.py || echo "class-II predict failed (continuing)"
      - name: Commit unit 5 (class-II antigen)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Atlas data (CI): class-II (CD4) junction epitopes EWSR1 vs TAF15"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done
