name: Atlas data (GEO reprocess + EuropePMC full-text verify)

# Two internet-needing, CPU-only atlas analyses the dev sandbox can't run (egress proxy blocks
# NCBI/GEO + PMC/EuropePMC):
#   1. expression_reprocess.py — reprocess GSE4303/GSE24369 (rank-based EMC signature, per platform)
#   2. fulltext_verify.py       — pull PRIMARY full text (EuropePMC) for the abstract-level-only claims
# Pure stdlib (urllib); no pip, no AWS/GPU. Results are committed straight back to the TRIGGERING
# branch under research/atlas/_generated/ (this is a feature branch, so that's fine and keeps the
# raw outputs next to the atlas that interprets them).

on:
  workflow_dispatch:
  # Also trigger on push to this feature branch (workflow_dispatch via API needs the file on the
  # default branch; this branch-scoped push trigger does not). paths is limited to the scripts +
  # this workflow so the CI's own commit-back (which only touches _generated/) cannot re-trigger a loop.
  push:
    branches:
      - claude/emc-research-strategy-kdz9kn
    paths:
      - 'research/atlas/expression_reprocess.py'
      - 'research/atlas/fulltext_verify.py'
      - '.github/workflows/atlas-data.yml'

permissions:
  contents: write

concurrency:
  group: atlas-data-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reprocess public EMC expression (GSE4303, GSE24369)
        working-directory: research/atlas
        run: python expression_reprocess.py || echo "expression reprocess failed (continuing)"

      - name: Primary full-text verification (EuropePMC)
        working-directory: research/atlas
        run: python fulltext_verify.py || echo "fulltext verify failed (continuing)"

      - name: Commit generated outputs to the triggering branch
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/atlas/_generated/ || true
          if git diff --cached --quiet; then
            echo "no generated changes"; exit 0
          fi
          git commit -m "Atlas data: GEO expression reprocess + EuropePMC full-text verification (CI)"
          for i in 1 2 3 4; do
            git push origin HEAD:${{ github.ref_name }} && break || { echo "push retry $i"; git pull --rebase origin ${{ github.ref_name }} || true; sleep $((2**i)); }
          done
