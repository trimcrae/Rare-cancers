name: GPU — NR4A3 metadynamics (AWS SageMaker)

# Runs NR4A3 LBD well-tempered metadynamics (cryptic-pocket opening on the Pocket-5 Rg CV) as a
# managed SageMaker Processing job: AWS provisions a GPU, enforces a hard MaxRuntime cap, and tears
# the instance down on completion. Manual-dispatch. REQUIRES secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN  (region is a workflow input).
# Validate with a short ns first; the run length sets MaxRuntime needs (default 8 h fits ~30 ns).

on:
  workflow_dispatch:
    inputs:
      ns:
        description: "nanoseconds of biased MD. 5-10 = pipeline validation; 30-50 = production."
        default: "30"
        required: false
      target:
        description: "NR4A3 (default), NR4A1, or NR4A2 — paralogue CV/LBD mapped by alignment to NR4A3"
        default: "NR4A3"
        required: false
      output_prefix:
        description: "S3 output prefix (default <target>-metad, e.g. nr4a1-metad)"
        default: ""
        required: false
      instance:
        description: "SageMaker GPU instance type"
        default: "ml.g5.xlarge"
        required: false
      max_runtime:
        description: "hard MaxRuntime cap (seconds). Raise for longer ns (≈8h per 30ns)."
        default: "28800"
        required: false
      region:
        description: "AWS region — must match where the stack + GPU quota live"
        default: "us-east-2"
        required: false
      git_ref:
        description: "repo ref the GPU job clones + runs (branch/tag/sha)"
        default: "main"
        required: false
      resume_from:
        description: "continue a prior run's bias: '' = fresh, 'auto' = latest output prefix, or an s3:// path"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "sagemaker>=2.200,<3" boto3   # v2 SDK (v3 dropped FrameworkProcessor/PyTorch)
      - name: Submit SageMaker metadynamics job
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          NS: ${{ inputs.ns }}
          TARGET: ${{ inputs.target }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
          INSTANCE: ${{ inputs.instance }}
          MAX_RUNTIME: ${{ inputs.max_runtime }}
          GIT_REF: ${{ inputs.git_ref }}
          RESUME_FROM: ${{ inputs.resume_from }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SAGEMAKER_ROLE_ARN repo secrets first. See deploy/aws-sagemaker-setup.md."
            exit 1
          fi
          python research/modalities/nr4a3_metad_sagemaker.py
